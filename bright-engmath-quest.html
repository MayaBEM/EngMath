<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<title>Bright EngMath: The English Entrance Quest</title>
<meta name="description" content="A story-driven English entrance-exam practice game for Grade 6 students preparing for Grade 7 / Mathayom 1." />
<style>
/* ==========================================================================
   BRIGHT ENGMATH — THE ENGLISH ENTRANCE QUEST
   Single-file interactive learning game. No backend, no external libraries.
   ========================================================================== */

:root{
  --ivory:#faf6ec;
  --ivory-2:#f4edda;
  --paper:#fffdf7;
  --sky:#8ecae6;
  --sky-deep:#4e97b8;
  --sage:#9bbf9b;
  --sage-deep:#5f8f66;
  --gold:#e8c15a;
  --gold-deep:#c99a25;
  --coral:#ef8354;
  --coral-deep:#d9633a;
  --navy:#243a5e;
  --navy-soft:#3d557d;
  --lavender:#c8bfe7;
  --lavender-deep:#8f80c4;
  --line:#e6dcc2;
  --ok:#4c9a63;
  --ok-bg:#e4f2e6;
  --bad:#cf5b48;
  --bad-bg:#f9e6e0;
  --shadow:0 10px 30px -12px rgba(36,58,94,.28);
  --shadow-sm:0 4px 14px -6px rgba(36,58,94,.28);
  --radius:22px;
  --radius-sm:14px;
  --font:'Trebuchet MS','Segoe UI',system-ui,-apple-system,sans-serif;
  --serif:Georgia,'Times New Roman',serif;
  --sp:clamp(16px,4vw,28px);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font);
  color:var(--navy);
  background:
    radial-gradient(1200px 600px at 12% -8%, #fef6de 0%, rgba(254,246,222,0) 60%),
    radial-gradient(1000px 700px at 108% 6%, #e8f4f9 0%, rgba(232,244,249,0) 55%),
    radial-gradient(900px 700px at 50% 120%, #eaf3ea 0%, rgba(234,243,234,0) 60%),
    var(--ivory);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  line-height:1.55;
}
button{font-family:inherit;cursor:pointer}
img{max-width:100%}
h1,h2,h3,h4{line-height:1.15;margin:0 0 .4em;color:var(--navy)}
p{margin:0 0 .8em}
a{color:var(--sky-deep)}
:focus-visible{outline:3px solid var(--sky-deep);outline-offset:2px;border-radius:6px}

/* ---------- Layout scaffolding ---------- */
#app{min-height:100vh;display:flex;flex-direction:column}
.screen{
  flex:1;width:100%;max-width:1080px;margin:0 auto;
  padding:var(--sp);
  animation:fadeUp .5s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.center{display:flex;flex-direction:column;align-items:center;text-align:center}

/* ---------- Top bar ---------- */
.topbar{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  max-width:1080px;margin:0 auto;width:100%;
  padding:14px var(--sp) 0;
}
.brand{display:flex;align-items:center;gap:10px;font-weight:bold;letter-spacing:.3px}
.brand .mark{
  width:38px;height:38px;border-radius:11px;flex:none;
  background:linear-gradient(135deg,var(--gold),var(--coral));
  display:grid;place-items:center;box-shadow:var(--shadow-sm);
}
.brand .name{font-size:1.05rem}
.brand .name small{display:block;font-size:.62rem;font-weight:normal;color:var(--navy-soft);letter-spacing:1.5px;text-transform:uppercase}
.topbar-actions{display:flex;gap:8px;align-items:center}

/* ---------- Buttons ---------- */
.btn{
  border:none;border-radius:999px;padding:13px 26px;font-size:1rem;font-weight:bold;
  color:#fff;background:linear-gradient(135deg,var(--coral),var(--coral-deep));
  box-shadow:0 8px 18px -8px rgba(217,99,58,.7);
  transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
  display:inline-flex;align-items:center;gap:9px;justify-content:center;
}
.btn:hover{transform:translateY(-2px);filter:brightness(1.04)}
.btn:active{transform:translateY(1px) scale(.98)}
.btn.secondary{background:linear-gradient(135deg,var(--sky),var(--sky-deep));box-shadow:0 8px 18px -8px rgba(78,151,184,.7)}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold-deep));box-shadow:0 8px 18px -8px rgba(201,154,37,.7)}
.btn.sage{background:linear-gradient(135deg,var(--sage),var(--sage-deep));box-shadow:0 8px 18px -8px rgba(95,143,102,.7)}
.btn.ghost{
  background:var(--paper);color:var(--navy);border:2px solid var(--line);
  box-shadow:var(--shadow-sm);
}
.btn.ghost:hover{border-color:var(--sky)}
.btn.lg{padding:16px 34px;font-size:1.12rem}
.btn.sm{padding:9px 16px;font-size:.85rem}
.btn.block{display:flex;width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;filter:none}
.iconbtn{
  width:44px;height:44px;border-radius:50%;border:2px solid var(--line);background:var(--paper);
  display:grid;place-items:center;color:var(--navy);box-shadow:var(--shadow-sm);
  transition:transform .12s, border-color .12s;
}
.iconbtn:hover{transform:translateY(-2px);border-color:var(--sky)}
.iconbtn.on{border-color:var(--sage);color:var(--sage-deep)}

/* ---------- Cards ---------- */
.card{
  background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow);padding:clamp(18px,3.5vw,30px);position:relative;
}
.card.pad-sm{padding:16px 18px}
.paper-texture:before{
  content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background-image:radial-gradient(rgba(36,58,94,.035) 1px,transparent 1px);
  background-size:9px 9px;opacity:.6;
}
.chip{
  display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:bold;
  padding:5px 11px;border-radius:999px;background:var(--ivory-2);color:var(--navy-soft);
  border:1px solid var(--line);letter-spacing:.4px;text-transform:uppercase;
}
.chip.sage{background:var(--ok-bg);color:var(--sage-deep);border-color:#cfe6d3}
.chip.sky{background:#e2f1f8;color:var(--sky-deep);border-color:#c9e6f1}
.chip.gold{background:#fbf1d4;color:var(--gold-deep);border-color:#f0e2b5}
.chip.coral{background:var(--bad-bg);color:var(--coral-deep);border-color:#f4d6c9}
.chip.lav{background:#efeaf9;color:var(--lavender-deep);border-color:#e0d8f2}

/* ---------- Landing ---------- */
.hero{
  display:grid;grid-template-columns:1.1fr .9fr;gap:clamp(20px,4vw,44px);align-items:center;
  margin-top:8px;
}
.hero-copy h1{
  font-size:clamp(2rem,5.4vw,3.3rem);letter-spacing:-.5px;
  background:linear-gradient(120deg,var(--navy),var(--sky-deep) 55%,var(--sage-deep));
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.hero-copy .tagline{font-size:clamp(1.05rem,2.4vw,1.35rem);font-weight:bold;color:var(--coral-deep);margin-bottom:.2em}
.hero-copy .lead{font-size:1.05rem;color:var(--navy-soft);max-width:46ch}
.hero-cta{display:flex;flex-wrap:wrap;gap:12px;margin-top:22px}
.hero-stage{position:relative;min-height:340px;display:grid;place-items:center}
.hero-scene{width:100%;max-width:440px}
.float{animation:float 6s ease-in-out infinite}
.float.d1{animation-delay:-1.5s}
.float.d2{animation-delay:-3s}
.float.d3{animation-delay:-4.5s}
@keyframes float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-14px) rotate(2deg)}}
.feature-row{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin-top:34px}
.feature{
  background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-sm);
  padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm);
  min-width:180px;flex:1 1 180px;max-width:260px;
}
.feature .fi{width:40px;height:40px;flex:none;border-radius:11px;display:grid;place-items:center;background:var(--ivory-2)}
.feature b{display:block;font-size:.95rem}
.feature span{font-size:.8rem;color:var(--navy-soft)}

/* ---------- Setup ---------- */
.setup-grid{display:grid;grid-template-columns:1fr;gap:20px;max-width:640px;margin:0 auto}
.field label{display:block;font-weight:bold;margin-bottom:8px}
.input{
  width:100%;padding:14px 16px;border-radius:var(--radius-sm);border:2px solid var(--line);
  background:var(--paper);font-size:1.05rem;color:var(--navy);
}
.input:focus{border-color:var(--sky);outline:none}
.avatars{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:12px}
.avatar-opt{
  background:var(--paper);border:2px solid var(--line);border-radius:var(--radius-sm);
  padding:10px 6px 8px;text-align:center;transition:transform .12s,border-color .12s,box-shadow .12s;
}
.avatar-opt:hover{transform:translateY(-3px);border-color:var(--sky)}
.avatar-opt.sel{border-color:var(--coral);box-shadow:0 0 0 4px rgba(239,131,84,.18)}
.avatar-opt .an{font-size:.78rem;font-weight:bold;margin-top:4px;display:block}
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--paper);border:2px solid var(--line);border-radius:var(--radius-sm);padding:12px 16px}
.switch{width:54px;height:30px;border-radius:999px;background:var(--line);border:none;position:relative;transition:background .2s}
.switch:after{content:"";position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .2s}
.switch.on{background:var(--sage)}
.switch.on:after{left:27px}

/* ---------- Quest map ---------- */
.map-wrap{position:relative;margin-top:10px}
.map-head{display:flex;flex-wrap:wrap;gap:14px;align-items:center;justify-content:space-between;margin-bottom:18px}
.crystal-tray{display:flex;gap:8px;align-items:center}
.crystal-slot{width:34px;height:44px;position:relative;opacity:.35;transition:opacity .4s, transform .4s}
.crystal-slot.filled{opacity:1;animation:pop .5s ease}
@keyframes pop{0%{transform:scale(.4)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.map-track{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.node{
  position:relative;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px 16px;text-align:center;box-shadow:var(--shadow-sm);
  transition:transform .15s, box-shadow .15s;overflow:hidden;
}
.node .scene{height:120px;display:grid;place-items:center;margin-bottom:8px}
.node.unlocked{cursor:pointer}
.node.unlocked:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.node.locked{filter:grayscale(.55);opacity:.75}
.node.current{border-color:var(--coral);box-shadow:0 0 0 3px rgba(239,131,84,.22),var(--shadow)}
.node h3{font-size:1rem;margin-bottom:4px}
.node .sub{font-size:.76rem;color:var(--navy-soft);min-height:2.2em}
.node-badge{position:absolute;top:10px;right:10px}
.progress{height:10px;border-radius:999px;background:var(--ivory-2);overflow:hidden;margin-top:10px;border:1px solid var(--line)}
.progress > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--sage),var(--sage-deep));transition:width .8s ease}
.next-hint{margin-top:16px;display:flex;gap:12px;align-items:center;background:#fff6e6;border:1px dashed var(--gold-deep);border-radius:var(--radius-sm);padding:12px 16px}

/* ---------- Learning page ---------- */
.lesson-hd{display:flex;gap:16px;align-items:center;margin-bottom:8px}
.example-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin:14px 0}
.ex-card{background:var(--ivory);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px 16px}
.ex-card h4{font-size:.9rem;margin-bottom:6px;display:flex;gap:8px;align-items:center}
.hl-sub{background:#e2f1f8;border-bottom:2px solid var(--sky-deep);padding:0 3px;border-radius:4px}
.hl-verb{background:var(--ok-bg);border-bottom:2px solid var(--sage-deep);padding:0 3px;border-radius:4px}
.hl-key{background:#fbf1d4;border-bottom:2px solid var(--gold-deep);padding:0 3px;border-radius:4px}
.hl-err{background:var(--bad-bg);border-bottom:2px solid var(--bad);padding:0 3px;border-radius:4px;text-decoration:line-through}
.tipbox{display:flex;gap:12px;padding:13px 16px;border-radius:var(--radius-sm);margin:10px 0}
.tipbox.tip{background:var(--ok-bg);border:1px solid #cfe6d3}
.tipbox.warn{background:#fdf0e2;border:1px solid #f3ddc0}
.tipbox .ti{flex:none}
.mini{background:var(--paper);border:2px solid var(--line);border-radius:var(--radius-sm);padding:16px;margin-top:14px}
.mini .opts{display:grid;gap:8px;margin-top:10px}
.mini-opt{text-align:left;background:var(--ivory);border:2px solid var(--line);border-radius:12px;padding:11px 14px;font-size:.95rem;transition:border-color .12s,background .12s}
.mini-opt:hover{border-color:var(--sky)}
.mini-opt.right{border-color:var(--ok);background:var(--ok-bg)}
.mini-opt.wrong{border-color:var(--bad);background:var(--bad-bg)}
.mini-fb{margin-top:10px;font-size:.9rem;font-weight:bold}

/* ---------- Quiz ---------- */
.quiz-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.qmeta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.qbar{height:12px;border-radius:999px;background:var(--ivory-2);overflow:hidden;border:1px solid var(--line);margin:12px 0 4px}
.qbar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--sky),var(--sky-deep));transition:width .5s ease}
.q-stage{display:grid;grid-template-columns:96px 1fr;gap:16px;align-items:start;margin-top:14px}
.q-pip{position:sticky;top:12px}
.speech{position:relative;background:var(--ivory);border:1px solid var(--line);border-radius:14px;padding:10px 12px;font-size:.82rem;color:var(--navy-soft);margin-top:8px}
.speech:before{content:"";position:absolute;top:-8px;left:26px;border:7px solid transparent;border-bottom-color:var(--ivory)}
.passage{background:var(--ivory);border:1px solid var(--line);border-left:5px solid var(--sky);border-radius:14px;padding:14px 16px;margin-bottom:14px;font-size:.96rem}
.passage.notice{border-left-color:var(--coral);background:#fff7f2}
.passage.email{border-left-color:var(--lavender-deep);background:#f7f4fc;font-family:var(--serif)}
.passage h4{font-size:.78rem;text-transform:uppercase;letter-spacing:1px;color:var(--navy-soft);margin-bottom:6px}
.q-instruction{font-size:.82rem;color:var(--navy-soft);font-weight:bold;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.q-text{font-size:clamp(1.05rem,2.6vw,1.28rem);font-weight:bold;margin-bottom:14px}
.options{display:grid;gap:10px}
.opt{
  display:flex;gap:12px;align-items:flex-start;text-align:left;
  background:var(--paper);border:2px solid var(--line);border-radius:var(--radius-sm);
  padding:13px 15px;font-size:1rem;transition:border-color .12s,background .12s,transform .1s;
}
.opt:hover:not(.locked){border-color:var(--sky);transform:translateX(2px)}
.opt .key{width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center;font-weight:bold;background:var(--ivory-2);border:1px solid var(--line)}
.opt.sel{border-color:var(--coral);background:#fff3ec}
.opt.sel .key{background:var(--coral);color:#fff;border-color:var(--coral)}
.opt.correct{border-color:var(--ok);background:var(--ok-bg)}
.opt.correct .key{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt.incorrect{border-color:var(--bad);background:var(--bad-bg)}
.opt.incorrect .key{background:var(--bad);color:#fff;border-color:var(--bad)}
.opt.locked{cursor:default}
.opt.dim{opacity:.55}
.quiz-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;align-items:center}
.explain{
  margin-top:14px;border-radius:var(--radius-sm);padding:16px;border:1px solid var(--line);
  animation:fadeUp .35s ease both;
}
.explain.good{background:var(--ok-bg);border-color:#cfe6d3}
.explain.bad{background:#fdf1ec;border-color:#f4d6c9}
.explain h4{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.explain .why{margin:6px 0}
.explain .tiptag{margin-top:8px;font-size:.9rem;background:#fff;border:1px dashed var(--gold-deep);border-radius:10px;padding:9px 12px}
.hintbox{margin-top:12px;background:#fbf4dd;border:1px dashed var(--gold-deep);border-radius:12px;padding:11px 14px;font-size:.92rem;animation:fadeUp .3s ease both}

.shake{animation:shake .45s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.sparkle-layer{position:absolute;inset:0;pointer-events:none;overflow:visible}
.spark{position:absolute;width:12px;height:12px;color:var(--gold);animation:spark .8s ease-out forwards}
@keyframes spark{0%{transform:scale(0) rotate(0);opacity:1}100%{transform:scale(1.3) rotate(140deg) translateY(-40px);opacity:0}}

/* ---------- World complete & results ---------- */
.reward-scene{display:grid;place-items:center;margin:6px auto 4px;max-width:260px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:16px 0}
.stat{background:var(--ivory);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px;text-align:center}
.stat b{display:block;font-size:1.6rem;color:var(--navy)}
.stat span{font-size:.78rem;color:var(--navy-soft)}
.skill-cols{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:12px 0}
.skill-list{list-style:none;margin:0;padding:0;display:grid;gap:6px}
.skill-list li{display:flex;gap:8px;align-items:flex-start;font-size:.9rem;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:8px 11px}
.stars{display:flex;gap:6px;justify-content:center;margin:8px 0}
.star{width:38px;height:38px;color:var(--line)}
.star.on{color:var(--gold);animation:pop .5s ease both}
.cat-bar{margin:10px 0}
.cat-bar .lab{display:flex;justify-content:space-between;font-size:.9rem;font-weight:bold;margin-bottom:5px}
.cat-bar .track{height:14px;border-radius:999px;background:var(--ivory-2);overflow:hidden;border:1px solid var(--line)}
.cat-bar .track > i{display:block;height:100%;border-radius:999px;transition:width 1s ease}
.badges{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:10px}
.badge{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;position:relative}
.badge.locked{opacity:.42;filter:grayscale(.7)}
.badge .bn{font-size:.82rem;font-weight:bold;margin-top:6px}
.badge .bd{font-size:.68rem;color:var(--navy-soft)}

/* ---------- Review ---------- */
.rev-item{border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:12px;background:var(--paper)}
.rev-item.correct{border-left:5px solid var(--ok)}
.rev-item.wrong{border-left:5px solid var(--bad)}
.rev-q{font-weight:bold;margin:6px 0}
.rev-row{font-size:.92rem;margin:3px 0}
.rev-row .tag{font-weight:bold}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(36,58,94,.5);display:grid;place-items:center;padding:18px;z-index:60;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--paper);border-radius:var(--radius);max-width:600px;width:100%;max-height:88vh;overflow:auto;box-shadow:var(--shadow);border:1px solid var(--line);animation:fadeUp .3s ease both}
.modal .mhd{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);z-index:1}
.modal .mbody{padding:20px 22px}
.modal h3{margin:0}
.close-x{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:var(--ivory);font-size:1.1rem;line-height:1}
.tg-list{display:grid;gap:10px;margin:10px 0}
.tg-list .row{display:flex;gap:12px;align-items:flex-start;background:var(--ivory);border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-size:.92rem}

/* ---------- Loading ---------- */
#loader{position:fixed;inset:0;background:var(--ivory);display:grid;place-items:center;z-index:100;transition:opacity .5s ease}
.loader-inner{text-align:center}
.loader-ring{width:64px;height:64px;margin:16px auto;border-radius:50%;border:5px solid var(--line);border-top-color:var(--coral);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-bar{width:220px;height:8px;border-radius:999px;background:var(--ivory-2);overflow:hidden;margin:14px auto 0;border:1px solid var(--line)}
.loader-bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--coral));animation:load 1.6s ease forwards}
@keyframes load{to{width:100%}}

/* ---------- Footer ---------- */
footer{
  text-align:center;padding:22px var(--sp);color:var(--navy-soft);font-size:.8rem;
  border-top:1px solid var(--line);margin-top:20px;
}
footer b{color:var(--navy)}
footer .fnote{margin-top:4px;font-size:.72rem;opacity:.85}

/* ---------- Toast ---------- */
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(30px);
  background:var(--navy);color:#fff;padding:12px 20px;border-radius:999px;font-size:.9rem;font-weight:bold;
  box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.35s;z-index:70;display:flex;gap:8px;align-items:center}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ---------- Responsive ---------- */
@media(max-width:820px){
  .hero{grid-template-columns:1fr;text-align:center}
  .hero-copy .lead{margin-left:auto;margin-right:auto}
  .hero-cta{justify-content:center}
  .map-track{grid-template-columns:1fr 1fr}
}
@media(max-width:560px){
  .q-stage{grid-template-columns:1fr}
  .q-pip{position:static;display:flex;gap:12px;align-items:center;justify-content:center}
  .q-pip .speech{margin-top:0;flex:1}
  .q-pip .speech:before{display:none}
  .skill-cols{grid-template-columns:1fr}
  .map-track{grid-template-columns:1fr}
  .brand .name small{display:none}
}

/* ---------- Reduced motion ---------- */
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;scroll-behavior:auto !important}
  .float{animation:none}
}
.no-motion .float{animation:none !important}
.no-motion *{animation-duration:.001ms !important;transition-duration:.05ms !important}

function blankWorld(){ return { completed:false, answers:Array(10).fill(null), score:0 }; }

let S = load() || freshState();

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const d = JSON.parse(raw);
    // basic shape safety
    if(!d.worlds) return null;
    [1,2,3].forEach(w=>{ if(!d.worlds[w]) d.worlds[w]=blankWorld(); if(!Array.isArray(d.worlds[w].answers)||d.worlds[w].answers.length!==10) d.worlds[w].answers=Array(10).fill(null); });
    if(!Array.isArray(d.badges)) d.badges=[];
    return d;
  }catch(e){ return null; }
}

function toast(msg,icon){
  const t=$("#toast"); t.innerHTML=(icon?icon:"")+"<span>"+esc(msg)+"</span>"; t.classList.add("show");
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove("show"),2200);
}

/* ---- Sound (WebAudio, no files) ---- */
let AC=null;
function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function beep(type){
  if(!S.sound) return; const ctx=ac(); if(!ctx) return;
  if(ctx.state==="suspended") ctx.resume();
  const seq = {
    click:[[520,.05,.12]],
    correct:[[660,0,.001],[880,.09,.14],[1180,.18,.16]],
    wrong:[[300,0,.18],[220,.12,.2]],
    unlock:[[523,0,.1],[659,.1,.1],[784,.2,.16]],
    win:[[523,0,.12],[659,.12,.12],[784,.24,.12],[1046,.36,.22]]
  }[type]||[[500,0,.1]];
  seq.forEach(([f,delay,dur])=>{
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type= type==="wrong"?"sawtooth":"sine"; o.frequency.value=f;
    o.connect(g); g.connect(ctx.destination);
    const t0=ctx.currentTime+delay;
    g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(.16,t0+.02);
    g.gain.exponentialRampToValueAtTime(.0001,t0+dur);
    o.start(t0); o.stop(t0+dur+.02);
  });
}

/* =======================================================================
   NAVIGATION
   ======================================================================= */
function go(screen,arg){
  S.screen=screen; save();
  window.scrollTo({top:0,behavior:"auto"});
  render(arg);
}
function render(arg){
  const s=S.screen;
  if(s==="landing") return renderLanding();
  if(s==="setup") return renderSetup();
  if(s==="map") return renderMap();
  if(s==="learn") return renderLearn(arg!=null?arg:(S._world||1));
  if(s==="quiz") return renderQuiz(arg!=null?arg:(S._world||1));
  if(s==="worldcomplete") return renderWorldComplete(S._world||1);
  if(s==="results") return renderResults();
  if(s==="review") return renderReview(arg);
  renderLanding();
}

  const overall = Math.round(totalAnswered()/30*100);

  app().innerHTML = topbar(false)
  + '<div class="screen map-wrap">'
    + '<div class="map-head">'
      + '<div style="display:flex;align-items:center;gap:12px">'+avatar(S.avatar,52)
        + '<div><h2 style="margin:0">Quest Map</h2><div style="color:var(--navy-soft);font-size:.9rem">Welcome back, <b>'+esc(S.nickname||"Explorer")+'</b>!</div></div>'
      + '</div>'

        + '<div class="crystal-tray" aria-label="Crystal pieces collected: '+filled+' of 3">'
          + crystals.map(f=>'<span class="crystal-slot '+(f?"filled":"")+'">'+icon("crystal",34,f?"#8ecae6":"#c8c2ad")+'</span>').join("")
        + '</div>'
        + '<div style="font-size:.8rem;color:var(--navy-soft);margin-top:2px">Crystals: '+filled+' / 3 · XP '+S.xp+'</div>'

    + '<div style="font-size:.8rem;color:var(--navy-soft);margin:4px 0 16px">Overall progress: '+overall+'% · '+totalAnswered()+' of 30 questions answered</div>'

    + (allDone()
        ? '<div class="next-hint">'+icon("crystal",28,"#4e97b8")+'<div><b>All three crystals collected!</b> Enter the Final Crystal Chamber to restore the Crystal of Knowledge and see your results.</div><button class="btn secondary sm" onclick="beep(\'win\');go(\'results\')">Open Results '+icon("play",16,"#fff")+'</button></div>'
        : (nextWorld?'<div class="next-hint">'+icon("flag",24,"#c99a25")+'<div><b>Next mission:</b> '+worldOf(nextWorld).name+'. '+worldOf(nextWorld).focus+'</div><button class="btn gold sm" onclick="beep(\'click\');enterWorld('+nextWorld+')">Go '+icon("play",16,"#fff")+'</button></div>':''))

    + '<div class="map-track" style="margin-top:16px">'
      + WORLDS.map(w=>mapNode(w,nextWorld)).join("")

    + '</div>'

    + '<div style="display:flex;justify-content:center;margin-top:22px">'
      + '<button class="btn ghost sm" onclick="openTeacher()">'+icon("teacher",16)+' Teacher Guide</button>'
      + '<button class="btn ghost sm" style="margin-left:10px" onclick="confirmRestart()">'+icon("refresh",16)+' Reset Progress</button>'
    + '</div>'
  + '</div>' + footer();
}
function mapNode(w,nextWorld){
  const unlocked=worldUnlocked(w.id), done=S.worlds[w.id].completed, cur=(w.id===nextWorld);
  const sc={1:"village",2:"garden",3:"castle"}[w.id];
  const pct=worldPct(w.id);
  let badge="";
  if(done) badge='<span class="node-badge chip sage">'+icon("check",14,"#5f8f66")+' Done</span>';
  else if(!unlocked) badge='<span class="node-badge chip">'+icon("lock",14)+' Locked</span>';
  else if(cur) badge='<span class="node-badge chip coral">'+icon("flag",14,"#d9633a")+' Next</span>';
  return '<div class="node '+(unlocked?"unlocked":"locked")+(cur?" current":"")+'" '+(unlocked?'onclick="enterWorld('+w.id+')" role="button" tabindex="0" onkeydown="if(event.key===\'Enter\')enterWorld('+w.id+')"':'aria-disabled="true"')+'>'
    + badge
    + '<div class="scene">'+(unlocked?scene(sc,190):'<div style="opacity:.6">'+icon("lock",54,"#8a8161")+'</div>')+'</div>'
    + '<h3>'+w.name+'</h3>'
    + '<div class="sub">'+(unlocked?w.focus:"Complete the previous world to unlock.")+'</div>'
    + '<div class="progress"><i style="width:'+(unlocked?pct:0)+'%"></i></div>'
    + '<div style="font-size:.74rem;color:var(--navy-soft);margin-top:6px">'+(done?('Score '+S.worlds[w.id].score+'/10 · '+icon("refresh",12)+' Tap to replay'):(unlocked?(pct>0?pct+'% complete':'10 questions'):'Locked'))+'</div>'
  + '</div>';
}
function finalNode(){
  const ready=allDone();
  return '<div class="node '+(ready?"unlocked current":"locked")+'" '+(ready?'onclick="beep(\'win\');go(\'results\')" role="button" tabindex="0" onkeydown="if(event.key===\'Enter\')go(\'results\')"':'aria-disabled="true"')+'>'
    + (ready?'<span class="node-badge chip sky">'+icon("star",14,"#4e97b8")+' Final</span>':'<span class="node-badge chip">'+icon("lock",14)+' Locked</span>')
    + '<div class="scene">'+(ready?scene("chamber",190):'<div style="opacity:.6">'+icon("crystal",54,"#8a8161")+'</div>')+'</div>'
    + '<h3>Crystal Chamber</h3>'
    + '<div class="sub">'+(ready?"Restore the Crystal of Knowledge and reveal your final results.":"Collect all three crystals to enter.")+'</div>'
    + '<div class="progress"><i style="width:'+(ready?100:0)+'%"></i></div>'
    + '<div style="font-size:.74rem;color:var(--navy-soft);margin-top:6px">'+(ready?"Ready to open":"3 crystals needed")+'</div>'
  + '</div>';
}
function enterWorld(id){
  if(!worldUnlocked(id)){ toast("Finish the previous world first",icon("lock",16,"#fff")); beep("wrong"); return; }
  S._world=id; beep("click"); go("learn",id);
}

    + m.opts.map((o,j)=>'<button class="mini-opt" onclick="answerMini('+worldId+','+i+','+j+')">'+String.fromCharCode(65+j)+'. '+o+'</button>').join("")

function answerMini(worldId,i,j){
  const m=LESSONS[worldId].mini[i]; const wrap=$("#mini"+i);
  const opts=wrap.querySelectorAll(".mini-opt");

  const fb=$("#minifb"+i);
  if(j===m.a){ fb.style.color="var(--ok)"; fb.innerHTML=icon("check",16,"#4c9a63")+" Correct! "+m.fb; beep("correct"); }
  else{ fb.style.color="var(--bad)"; fb.innerHTML=icon("x",16,"#cf5b48")+" Not quite. "+m.fb; beep("wrong"); }
}
function beginChallenge(worldId){ S._world=worldId; S._q=firstUnanswered(worldId); beep("unlock"); go("quiz",worldId); }
function firstUnanswered(worldId){ const a=S.worlds[worldId].answers; const i=a.findIndex(x=>x===null); return i===-1?0:i; }

/* =======================================================================
   SCREEN: QUIZ
   ======================================================================= */
function renderQuiz(worldId){
  S._world=worldId; const w=worldOf(worldId);
  if(S._q==null) S._q=firstUnanswered(worldId);
  const qi=S._q; const globalIndex=w.range[0]+qi; const q=QUESTIONS[globalIndex];
  const saved=S.worlds[worldId].answers[qi]; // null or {selected,correct}
  const answered = saved!==null;
  const pct=Math.round((qi+(answered?1:0))/10*100);
  S._sel = answered?saved.selected:(S._sel!=null?S._sel:null);

  let pipState = answered ? (saved.correct?"celebrating":"encouraging") : "thinking";

  app().innerHTML = topbar(true)
  + '<div class="screen">'
    + '<div class="quiz-top">'
      + '<div class="qmeta"><span class="chip '+w.theme+'">'+w.name+'</span>'
        + '<span class="chip">Question '+(qi+1)+' / 10</span>'
        + '<span class="chip '+diffChip(q.diff)+'">'+q.diff+'</span>'
        + '<span class="chip lav">'+q.skill+'</span></div>'
      + '<button class="btn ghost sm" onclick="confirmExit()">'+icon("exit",16)+' Exit</button>'
    + '</div>'
    + '<div class="qbar" aria-label="World progress '+pct+'%"><i style="width:'+pct+'%"></i></div>'
    + '<div style="display:flex;justify-content:space-between;font-size:.76rem;color:var(--navy-soft)">'
      + '<span>Streak: '+S.streak+' '+icon("star",12,"#e8c15a")+'</span><span>XP '+S.xp+'</span></div>'

    + '<div class="q-stage">'
      + '<div class="q-pip">'+pip(pipState,88)
        + '<div class="speech" id="speech">'+pipLine(answered,saved)+'</div></div>'
      + '<div style="position:relative"><div class="sparkle-layer" id="sparkles"></div>'
        + (q.passage?passageBlock(q.passage):"")
        + (q.dialogue?dialogueBlock(q.dialogue):"")
        + '<div class="q-instruction">'+q.instruction+'</div>'
        + '<div class="q-text">'+q.text+'</div>'
        + '<div class="options" id="options">'
          + q.choices.map((c,i)=>optionEl(c,i,q,saved)).join("")
        + '</div>'
        + '<div id="hintbox"></div>'
        + '<div id="explainSlot">'+(answered?explainBlock(q,saved):"")+'</div>'
        + '<div class="quiz-actions">'
          + (answered
             ? nextButton(worldId,qi)
             : '<button class="btn" id="submitBtn" onclick="submitAnswer()" '+(S._sel==null?"disabled":"")+'>Submit Answer '+icon("check",18,"#fff")+'</button>'
               + '<button class="btn ghost" id="hintBtn" onclick="showHint()">'+icon("hint",16)+' Hint</button>')
          + '<button class="btn ghost" onclick="confirmExit()" style="margin-left:auto">'+icon("exit",16)+' Save & Exit</button>'
        + '</div>'
      + '</div>'
    + '</div>'
  + '</div>' + footer();
}
function diffChip(d){ if(d.indexOf("Challeng")>-1) return "coral"; if(d.indexOf("Easy")>-1) return "sage"; return "gold"; }
function pipLine(answered,saved){
  if(!answered) return "Take your time and read carefully. You've got this!";
  return saved.correct ? "Brilliant work — that's correct!" : "Good try! Let's learn from this one together.";
}
function passageBlock(p){
  const cls = p.type==="notice"?"notice":(p.type==="email"?"email":"");
  return '<div class="passage '+cls+'"><h4>'+esc(p.title)+'</h4>'+p.body.split("\n").map(l=>l.trim()===""?"<br>":"<div>"+esc(l)+"</div>").join("")+'</div>';
}
function dialogueBlock(d){
  return '<div class="passage"><h4>Conversation</h4>'+d.map(line=>'<div><b>'+esc(line[0])+':</b> '+esc(line[1])+'</div>').join("")+'</div>';
}
function optionEl(c,i,q,saved){
  let cls="opt";
  if(saved!==null){
    cls+=" locked";
    if(i===q.answer) cls+=" correct";
    else if(i===saved.selected) cls+=" incorrect";
    else cls+=" dim";
  } else if(S._sel===i){ cls+=" sel"; }
  const key=String.fromCharCode(65+i);
  const badge = saved!==null ? (i===q.answer?icon("check",18,"#4c9a63"):(i===saved.selected?icon("x",18,"#cf5b48"):"")) : "";
  return '<button class="'+cls+'" '+(saved!==null?'aria-disabled="true"':'onclick="selectOpt('+i+')"')+'><span class="key">'+key+'</span><span style="flex:1">'+esc(c)+'</span>'+(badge?'<span>'+badge+'</span>':'')+'</button>';
}
function selectOpt(i){ S._sel=i; beep("click"); const b=$("#submitBtn"); if(b)b.disabled=false;
  document.querySelectorAll("#options .opt").forEach((el,k)=>{ el.classList.toggle("sel",k===i); }); }
function showHint(){
  const w=worldOf(S._world); const q=QUESTIONS[w.range[0]+S._q];
  $("#hintbox").innerHTML='<div class="hintbox">'+icon("hint",18,"#c99a25")+' <b>Hint:</b> '+q.tip+'</div>';
  const hb=$("#hintBtn"); if(hb){hb.disabled=true;hb.style.opacity=".55";}
  beep("click");
}
function submitAnswer(){
  if(S._sel==null){ toast("Please choose an answer first"); return; }
  const w=worldOf(S._world); const qi=S._q; const q=QUESTIONS[w.range[0]+qi];
  const correct = S._sel===q.answer;
  S.worlds[S._world].answers[qi]={selected:S._sel,correct:correct};
  if(correct){
    S.xp+=10; S.streak+=1; S.bestStreak=Math.max(S.bestStreak,S.streak);
    if(S.streak>0 && S.streak%3===0) S.xp+=5; // streak bonus
    beep("correct"); sparkle();
  } else {
    S.streak=0; S.xp+=2; beep("wrong");
    const stage=$(".q-stage"); if(stage){ stage.classList.add("shake"); setTimeout(()=>stage.classList.remove("shake"),500); }
  }
  save();
  renderQuiz(S._world);
}
function sparkle(){
  const layer=$("#sparkles"); if(!layer||S.reducedMotion) return;
  if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  for(let i=0;i<8;i++){
    const s=document.createElement("div"); s.className="spark";
    s.style.left=(20+Math.random()*60)+"%"; s.style.top=(30+Math.random()*40)+"%";
    s.style.animationDelay=(Math.random()*.2)+"s";
    s.innerHTML=icon("star",12,"#e8c15a"); layer.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
}
function explainBlock(q,saved){
  const good=saved.correct;
  let html='<div class="explain '+(good?"good":"bad")+'">'
    + '<h4>'+(good?icon("check",20,"#4c9a63")+' Correct!':icon("x",20,"#cf5b48")+' Not quite — the answer is '+String.fromCharCode(65+q.answer))+'</h4>';
  if(!good && q.wrong && q.wrong[saved.selected]!==undefined){
    html+='<div class="why"><b>Why your choice ('+String.fromCharCode(65+saved.selected)+') is not right:</b> '+q.wrong[saved.selected]+'</div>';
  }
  html+='<div class="why"><b>Why '+String.fromCharCode(65+q.answer)+' is correct:</b> '+q.why+'</div>';
  html+='<div class="tiptag">'+icon("bulb",16,"#c99a25")+' <b>Tip:</b> '+q.tip+'</div>';
  html+='<div style="margin-top:8px;font-size:.85rem;color:var(--navy-soft)">'+(good?"+10 XP earned":"+2 XP for trying — every attempt helps you learn.")+'</div>';
  html+='</div>';
  return html;
}
function nextButton(worldId,qi){
  if(qi<9) return '<button class="btn" onclick="nextQuestion()">Next Question '+icon("play",18,"#fff")+'</button>';
  return '<button class="btn gold" onclick="finishWorld('+worldId+')">Finish World '+icon("crystal",18,"#fff")+'</button>';
}
function nextQuestion(){ S._q+=1; S._sel=null; beep("click"); go("quiz",S._world); }
function finishWorld(worldId){
  const w=S.worlds[worldId];
  w.score=w.answers.filter(a=>a&&a.correct).length;
  w.completed=true;
  awardBadges();
  save(); beep("unlock");
  go("worldcomplete",worldId);
}
function confirmExit(){
  showModal("Save and leave this world?","<p>Your answers so far are saved automatically. You can come back and continue this world any time from the Quest Map.</p>",
    '<button class="btn ghost" onclick="closeModal()">Keep Playing</button><button class="btn secondary" onclick="closeModal();go(\'map\')">Save &amp; Exit to Map</button>');
}

/* =======================================================================
   BADGES
   ======================================================================= */
function awardBadges(){
  const add=id=>{ if(!S.badges.includes(id)){ S.badges.push(id); } };
  if(S.worlds[1].completed && S.worlds[1].score>=8) add("word_wizard");
  if(S.worlds[2].completed && S.worlds[2].score>=8) add("grammar_guardian");
  if(S.worlds[3].completed && S.worlds[3].score>=8) add("reading_detective");
  [1,2,3].forEach(w=>{ if(S.worlds[w].completed && S.worlds[w].score===10) add("perfect_world"); });
  if(allDone()) add("never_give_up");
  if(allDone() && totalScore()>=27) add("exam_hero");
}

function replayWorld(worldId){

function doReplay(worldId){
  S.worlds[worldId]=blankWorld();
  // if this world was needed for later unlocks, later worlds remain but map recomputes unlock via completed flags

/* =======================================================================
   SCREEN: FINAL RESULTS
   ======================================================================= */
function computeCategoryScores(){
  const res={}; CATEGORIES.forEach(c=>res[c.key]={score:0,total:0});
  QUESTIONS.forEach((q,gi)=>{
    const wId = gi<10?1:(gi<20?2:3); const qi=gi- (wId-1)*10;
    const a=S.worlds[wId].answers[qi];
    res[q.cat].total++;
    if(a&&a.correct) res[q.cat].score++;
  });
  return res;
}
function performanceLevel(total){
  if(total>=27) return {t:"Entrance Exam Champion",c:"#5f8f66",d:"Outstanding! You are exam-ready. Keep this momentum going."};
  if(total>=23) return {t:"English Quest Master",c:"#4e97b8",d:"Excellent work. A little polish on your weaker areas and you'll shine."};
  if(total>=18) return {t:"Rising English Explorer",c:"#c99a25",d:"Good progress! Review the areas below and try again to climb higher."};
  return {t:"Brave Beginner — Keep Practising",c:"#ef8354",d:"A brave first journey! Every explorer starts here. Revisit the lessons and try again — you'll improve fast."};
}
function starCount(total){ if(total>=27)return 5; if(total>=23)return 4; if(total>=18)return 3; if(total>=12)return 2; return 1; }

    + '<div class="stars" aria-label="'+stars+' out of 5 stars">'
      + [0,1,2,3,4].map(i=>'<span class="star '+(i<stars?"on":"")+'" style="animation-delay:'+(i*.12)+'s">'+icon(i<stars?"star":"starline",38,i<stars?"#e8c15a":"#d9cfb4")+'</span>').join("")

   +'<h2>Overall Result</h2><p><span class="big">'+total+'</span> / 30 &nbsp; ('+pct+'%) &nbsp; '+"★".repeat(stars)+"☆".repeat(5-stars)+'</p><p class="lvl">'+lvl.t+'</p><p class="muted">'+lvl.d+'</p>'
   +'<h2>Score by Category</h2><table><tr><th>Category</th><th style="text-align:center">Score</th><th style="text-align:center">Percent</th></tr>'+catRows+'</table>'
   +'<h2>Badges Earned ('+earned.length+' / '+BADGES.length+')</h2><p class="badges">'+(earned.length?earned.map(b=>"• "+b.name).join("&nbsp;&nbsp; "):"No badges yet — keep practising!")+'</p>'
   +'<h2>How to Read This Score</h2><table><tr><th>Range</th><th>Level</th></tr><tr><td>27–30</td><td>Entrance Exam Champion</td></tr><tr><td>23–26</td><td>English Quest Master</td></tr><tr><td>18–22</td><td>Rising English Explorer</td></tr><tr><td>Below 18</td><td>Brave Beginner — Keep Practising</td></tr></table>'
   +'<p class="muted" style="margin-top:14px">XP: '+S.xp+' &nbsp;·&nbsp; Best streak: '+S.bestStreak+' &nbsp;·&nbsp; Crystals collected: 3 / 3</p>'
   +'<div class="foot"><b>Bright EngMath</b> · Created by Bright EngMath · For educational use only · &copy; Bright EngMath. All rights reserved.</div>'
   +'<script>window.onload=function(){setTimeout(function(){window.print();},300);}<\/script>'
   +'</body></html>');
  w.document.close();
}

/* =======================================================================
   SCREEN: REVIEW
   ======================================================================= */
function renderReview(arg){
  const all = arg==="all";
  const worldId = all?null:(arg||S._world||1);
  const list = all?QUESTIONS.map((q,gi)=>({q,gi})) : worldQuestions(worldId).map((q,i)=>({q,gi:worldOf(worldId).range[0]+i}));
  const title = all?"Review All Answers":"Review — "+worldOf(worldId).name;

  app().innerHTML = topbar(true)
  + '<div class="screen">'
    + '<button class="btn ghost sm" onclick="beep(\'click\');go(\''+(all?"results":"worldcomplete")+'\')">'+icon("back",16)+' Back</button>'
    + '<div style="display:flex;align-items:center;gap:12px;margin:12px 0">'+pip("reading",70)+'<div><h2 style="margin:0">'+title+'</h2><div style="color:var(--navy-soft);font-size:.9rem">Green = you got it right · Red = review this one</div></div></div>'
    + list.map(({q,gi})=>reviewItem(q,gi)).join("")
    + '<div style="display:flex;gap:10px;justify-content:center;margin-top:16px;flex-wrap:wrap">'
      + '<button class="btn ghost" onclick="go(\'map\')">'+icon("map",16)+' Quest Map</button>'
      + (all?'<button class="btn" onclick="go(\'results\')">'+icon("back",16)+' Back to Results</button>':'')
    + '</div>'
  + '</div>' + footer();
}
function reviewItem(q,gi){
  const wId=gi<10?1:(gi<20?2:3); const qi=gi-(wId-1)*10;
  const a=S.worlds[wId].answers[qi];
  const answered=a!==null; const correct=answered&&a.correct;
  const cls = !answered?"":(correct?"correct":"wrong");
  let head = answered ? (correct?icon("check",16,"#4c9a63")+" Correct":icon("x",16,"#cf5b48")+" Review") : icon("hint",16,"#c99a25")+" Not answered";
  let body='<div class="rev-item '+cls+'">'
    + '<div style="display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap"><span class="chip lav">Q'+(gi+1)+' · '+q.skill+'</span><span style="font-weight:bold;font-size:.85rem">'+head+'</span></div>';
  if(q.passage) body+='<div style="font-size:.82rem;color:var(--navy-soft);margin-top:6px"><b>'+esc(q.passage.title)+'</b> (passage above in the quiz)</div>';
  if(q.dialogue) body+='<div style="font-size:.85rem;color:var(--navy-soft);margin-top:6px">'+q.dialogue.map(l=>'<div><b>'+esc(l[0])+':</b> '+esc(l[1])+'</div>').join("")+'</div>';
  body+='<div class="rev-q">'+q.text+'</div>';
  body+='<div class="rev-row"><span class="tag" style="color:var(--ok)">Correct answer:</span> '+String.fromCharCode(65+q.answer)+'. '+esc(q.choices[q.answer])+'</div>';
  if(answered && !correct) body+='<div class="rev-row"><span class="tag" style="color:var(--bad)">Your answer:</span> '+String.fromCharCode(65+a.selected)+'. '+esc(q.choices[a.selected])+'</div>';
  body+='<div class="rev-row" style="margin-top:6px">'+q.why+'</div>';
  body+='<div class="rev-row" style="margin-top:4px;font-size:.85rem;color:var(--navy-soft)">'+icon("bulb",13,"#c99a25")+' '+q.tip+'</div>';
  body+='</div>';
  return body;
}

/* =======================================================================
   MODALS: How to Play + Teacher Guide + generic
   ======================================================================= */
let modalOpen=false;
function showModal(title,bodyHTML,footHTML){
  closeModal();
  const o=document.createElement("div"); o.className="overlay"; o.id="overlay";
  o.onclick=e=>{ if(e.target===o) closeModal(); };
  o.innerHTML='<div class="modal" role="dialog" aria-modal="true" aria-label="'+esc(title)+'">'
    + '<div class="mhd"><h3>'+title+'</h3><button class="close-x" aria-label="Close" onclick="closeModal()">✕</button></div>'
    + '<div class="mbody">'+bodyHTML+(footHTML?'<div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px;flex-wrap:wrap">'+footHTML+'</div>':'')+'</div></div>';
  document.body.appendChild(o); modalOpen=true;
  document.addEventListener("keydown",escClose);
}
function escClose(e){ if(e.key==="Escape") closeModal(); }
function closeModal(){ const o=$("#overlay"); if(o)o.remove(); modalOpen=false; document.removeEventListener("keydown",escClose); }

    +'<div class="tg-list">'
    +row("map","Travel the Quest Map","Start at Vocabulary Village. Finish a world to unlock the next and collect a crystal piece.")
    +row("book","Learn first","Each world begins with a short lesson, examples, and quick practice before the real questions.")

    +row("bulb","Learn from every answer","See why the correct answer is right — and why others are wrong. A hint is always available.")
    +row("star","Earn XP, streaks & badges","Collect experience points and badges. You compete only against your own best — there is no leaderboard.")
    +row("crystal","Restore the crystal","Collect all three pieces to open the Final Crystal Chamber and see your full results.")
    +'</div>'
    +'<p style="font-size:.85rem;color:var(--navy-soft);margin-top:10px">Your progress saves automatically on this device. No account or email is needed.</p>',
    '<button class="btn" onclick="closeModal()">Got it!</button>');
}
function openTeacher(){

    '<p style="margin-top:0">A quick guide to using <b>The English Entrance Quest</b> at home or in class.</p>'

    +row("book","Skills covered","Vocabulary in context, synonyms & antonyms, tenses, subject–verb agreement, prepositions, conjunctions, sentence structure, functional conversation, and reading comprehension (main idea, detail, inference, reference words).")

    +row("crown","27–30 · Entrance Exam Champion","Confidently exam-ready across all skill areas.")
    +row("trophy","23–26 · English Quest Master","Strong overall; refine a few weaker skills.")
    +row("starline","18–22 · Rising English Explorer","Solid foundation; targeted review recommended.")
    +row("heart","Below 18 · Brave Beginner","Encourage a re-read of the lessons and a second attempt.")

function row(ic,t,d){ return '<div class="row">'+icon(ic,22,"#c99a25")+'<div><b>'+t+'</b><div style="font-size:.86rem;color:var(--navy-soft)">'+d+'</div></div></div>'; }

/* =======================================================================
   SOUND TOGGLE (global)
   ======================================================================= */
function toggleSound(){
  S.sound=!S.sound; save();
  if(S.sound) beep("click");
  const b=$("#soundBtn"); if(b){ b.classList.toggle("on",S.sound); b.innerHTML=icon(S.sound?"sound":"mute",20); }
  toast(S.sound?"Sound on":"Sound off", icon(S.sound?"sound":"mute",16,"#fff"));
}

/* =======================================================================
   BOOT
   ======================================================================= */
function boot(){
  // reduced motion preference
  if(window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches){
    S.reducedMotion=true; document.body.classList.add("no-motion");
  }
  const msgs=["Waking up Pip the Book Guardian…","Polishing the Crystal of Knowledge…","Unrolling the quest map…","Planting the Grammar Garden…"];
  let mi=0; const lm=$("#loadMsg");
  const t=setInterval(()=>{ mi=(mi+1)%msgs.length; if(lm) lm.textContent=msgs[mi]; },420);
  // decide first screen
  if(!S.nickname && totalAnswered()===0) S.screen="landing";
  render();
  setTimeout(()=>{
    clearInterval(t);
    const l=$("#loader"); if(l){ l.style.opacity="0"; setTimeout(()=>l.remove(),500); }
  },1500);
}
// resume audio on first interaction (browser policy)
document.addEventListener("pointerdown",function once(){ ac(); document.removeEventListener("pointerdown",once); });
window.addEventListener("beforeunload",save);
boot();
</script>
