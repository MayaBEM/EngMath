<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="description" content="Little Readers: Read, Tap & Play — interactive reading comprehension for young ESL learners. Created by Bright EngMath.">
<meta name="author" content="Bright EngMath">
<title>Little Readers: Read, Tap &amp; Play · Bright EngMath</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%236FA06C'/%3E%3Cpath d='M32 14l6 13 14 1-10 9 3 14-13-7-13 7 3-14-10-9 14-1z' fill='%23F4C95D'/%3E%3C/svg%3E">
<style>
/* ============================================================
   Little Readers: Read, Tap & Play  —  Design System
   A warm, premium storybook look created by Bright EngMath.
   ============================================================ */

:root{
  --cream:#FBF6EC; --paper:#FFFDF7; --paper-2:#F6EEDD;
  --sage:#9CC29A; --sage-d:#6FA06C; --sage-soft:#E7F0E2;
  --forest:#2F5D50; --forest-l:#3C7365;
  --coral:#F0A088; --coral-d:#E27E63; --coral-soft:#FBE3DA;
  --sky:#9BC9E4; --sky-d:#5FA8D2; --sky-soft:#E1F0F8;
  --yellow:#F4C95D; --yellow-d:#E4B23F; --yellow-soft:#FBEFCF;
  --ink:#33463F; --muted:#6C7B74;
  --ok:#4E9A6B; --ok-soft:#E4F2E7;
  --gentle:#E9A23B;
  --shadow-sm:0 2px 6px rgba(52,70,63,.10);
  --shadow-md:0 8px 22px rgba(52,70,63,.14);
  --shadow-lg:0 18px 44px rgba(52,70,63,.20);
  --radius:22px; --radius-lg:30px; --radius-sm:14px;
  --font-body:"Nunito","Baloo 2","Segoe UI",system-ui,-apple-system,sans-serif;
  --font-head:"Baloo 2","Nunito",system-ui,sans-serif;
  --text-scale:1;
  --ease:cubic-bezier(.34,1.36,.5,1);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  color:var(--ink);
  background:
    radial-gradient(1200px 600px at 12% -8%, var(--sky-soft), transparent 60%),
    radial-gradient(1000px 560px at 100% 0%, var(--coral-soft), transparent 55%),
    radial-gradient(900px 700px at 50% 120%, var(--sage-soft), transparent 60%),
    var(--cream);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
  font-size:calc(17px * var(--text-scale));
}
h1,h2,h3,h4{font-family:var(--font-head);color:var(--forest);margin:0 0 .4em;line-height:1.15;}
button{font-family:inherit;}
:focus-visible{outline:3px solid var(--sky-d);outline-offset:3px;border-radius:8px;}
img,svg{display:block;}

/* paper texture overlay */
.paper-grain{position:relative;}
.paper-grain::after{
  content:"";position:absolute;inset:0;pointer-events:none;border-radius:inherit;
  background-image:radial-gradient(rgba(120,100,60,.05) 1px,transparent 1px);
  background-size:7px 7px;opacity:.7;mix-blend-mode:multiply;
}

/* ---------- layout ---------- */
.app-shell{max-width:1180px;margin:0 auto;padding:0 20px 40px;}
.topbar{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;gap:14px;
  padding:14px 22px;margin:0 -20px 22px;
  background:rgba(255,253,247,.86);backdrop-filter:blur(8px);
  border-bottom:2px solid var(--paper-2);
}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer;background:none;border:none;padding:4px;}
.brand .mark{width:44px;height:44px;flex:0 0 44px;border-radius:14px;
  background:linear-gradient(145deg,var(--sage),var(--sage-d));
  display:grid;place-items:center;box-shadow:var(--shadow-sm);}
.brand .mark svg{width:30px;height:30px;}
.brand .titles{text-align:left;line-height:1.05;}
.brand .t1{font-family:var(--font-head);font-weight:800;color:var(--forest);font-size:1.06rem;}
.brand .t2{font-size:.72rem;color:var(--muted);letter-spacing:.02em;}
.topnav{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

/* ---------- buttons ---------- */
.btn{
  border:none;border-radius:var(--radius-sm);cursor:pointer;
  font-weight:800;font-size:1rem;padding:12px 20px;
  display:inline-flex;align-items:center;gap:9px;justify-content:center;
  background:var(--paper);color:var(--forest);box-shadow:var(--shadow-sm);
  transition:transform .16s var(--ease),box-shadow .16s,background .16s;
  min-height:48px;
}
.btn:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.btn:active{transform:translateY(0) scale(.98);}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-primary{background:linear-gradient(145deg,var(--coral),var(--coral-d));color:#fff;}
.btn-green{background:linear-gradient(145deg,var(--sage),var(--sage-d));color:#fff;}
.btn-sky{background:linear-gradient(145deg,var(--sky),var(--sky-d));color:#fff;}
.btn-yellow{background:linear-gradient(145deg,var(--yellow),var(--yellow-d));color:#5a4410;}
.btn-ghost{background:rgba(255,255,255,.7);}
.btn-lg{font-size:1.18rem;padding:16px 30px;min-height:60px;border-radius:var(--radius);}
.btn-sm{font-size:.86rem;padding:8px 14px;min-height:40px;}
.btn-icon{width:48px;height:48px;padding:0;border-radius:14px;}
.btn-block{width:100%;}
.icon-svg{width:22px;height:22px;}
.btn .icon-svg{width:22px;height:22px;}

.pill{display:inline-flex;align-items:center;gap:6px;background:var(--paper);border-radius:999px;
  padding:6px 13px;font-weight:700;font-size:.82rem;color:var(--forest);box-shadow:var(--shadow-sm);}
.pill-sage{background:var(--sage-soft);} .pill-coral{background:var(--coral-soft);}
.pill-sky{background:var(--sky-soft);} .pill-yellow{background:var(--yellow-soft);}

/* ---------- cards / panels ---------- */
.card{background:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:24px;}
.panel{background:var(--paper);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:26px;}
.section-title{display:flex;align-items:center;gap:12px;margin:6px 0 16px;}
.section-title h2{margin:0;font-size:1.5rem;}

/* fade / enter animations */
.view{animation:fadeUp .4s var(--ease) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes pop{0%{transform:scale(.6);opacity:0;}70%{transform:scale(1.08);}100%{transform:scale(1);opacity:1;}}
@keyframes floaty{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

/* ---------- welcome ---------- */
.welcome{display:grid;grid-template-columns:1.05fr .95fr;gap:34px;align-items:center;
  background:var(--paper);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:40px;margin-top:6px;}
.welcome h1{font-size:2.7rem;letter-spacing:-.5px;}
.welcome .subtitle{font-size:1.18rem;color:var(--muted);max-width:34ch;margin-bottom:8px;}
.welcome .kicker{color:var(--coral-d);font-weight:800;letter-spacing:.14em;text-transform:uppercase;font-size:.8rem;margin-bottom:6px;}
.welcome-hero-svg{width:100%;height:auto;border-radius:var(--radius);box-shadow:var(--shadow-md);animation:floaty 6s ease-in-out infinite;}
.welcome .cta-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:20px;}
.welcome .mini-features{display:flex;gap:18px;flex-wrap:wrap;margin-top:24px;color:var(--muted);font-weight:700;font-size:.92rem;}
.welcome .mini-features span{display:inline-flex;align-items:center;gap:7px;}

/* ---------- story library ---------- */
.level-block{margin-bottom:34px;}
.level-head{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.level-badge{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;color:#fff;
  font-family:var(--font-head);font-weight:800;font-size:1.4rem;box-shadow:var(--shadow-sm);}
.level-1 .level-badge{background:linear-gradient(145deg,var(--sky),var(--sky-d));}
.level-2 .level-badge{background:linear-gradient(145deg,var(--sage),var(--sage-d));}
.level-3 .level-badge{background:linear-gradient(145deg,var(--coral),var(--coral-d));}
.level-head .meta h3{margin:0;font-size:1.3rem;} .level-head .meta p{margin:0;color:var(--muted);font-size:.9rem;}
.story-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;}
.story-card{background:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;
  cursor:pointer;border:none;text-align:left;padding:0;display:flex;flex-direction:column;
  transition:transform .18s var(--ease),box-shadow .18s;}
.story-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);}
.story-card .thumb{width:100%;aspect-ratio:16/10;overflow:hidden;position:relative;}
.story-card .thumb svg{width:100%;height:100%;}
.story-card .body{padding:14px 15px 16px;display:flex;flex-direction:column;gap:8px;flex:1;}
.story-card .body h4{margin:0;font-size:1.02rem;line-height:1.2;}
.story-card .cardfoot{display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
.story-card .who{font-size:.8rem;color:var(--muted);font-weight:700;}
.story-card.locked{opacity:.62;}
.lock-tag{position:absolute;top:10px;right:10px;background:rgba(51,70,63,.72);color:#fff;border-radius:999px;
  padding:5px 10px;font-size:.72rem;font-weight:800;display:flex;gap:5px;align-items:center;}
.done-tag{position:absolute;top:10px;left:10px;background:var(--ok);color:#fff;border-radius:999px;
  padding:5px 10px;font-size:.72rem;font-weight:800;}

/* stars */
.stars{display:inline-flex;gap:3px;}
.stars svg{width:20px;height:20px;}
.star-on path{fill:var(--yellow);stroke:var(--yellow-d);}
.star-off path{fill:#E7E0D0;stroke:#D8CFBB;}
.stars.big svg{width:34px;height:34px;}

/* ---------- reading page ---------- */
.reader-wrap{display:grid;grid-template-columns:1fr;gap:20px;}
.step-track{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
.step-chip{display:flex;align-items:center;gap:7px;background:var(--paper);border-radius:999px;padding:7px 13px;
  font-weight:800;font-size:.82rem;color:var(--muted);box-shadow:var(--shadow-sm);}
.step-chip.active{background:var(--forest);color:#fff;}
.step-chip.done{background:var(--sage-soft);color:var(--forest);}
.step-chip .n{width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.08);display:grid;place-items:center;font-size:.78rem;}
.step-chip.active .n{background:rgba(255,255,255,.25);}

.reader-hero{border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-md);}
.reader-hero svg{width:100%;height:auto;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start;}

.passage{font-size:1.24rem;line-height:1.9;color:var(--ink);}
.passage .sent{padding:2px 5px;border-radius:8px;transition:background .2s,box-shadow .2s;cursor:default;}
.passage .sent.reading{background:var(--yellow-soft);box-shadow:0 0 0 2px var(--yellow);}
.passage .sent.evidence{background:var(--ok-soft);box-shadow:0 0 0 2px var(--ok);}
.passage.selectable .sent{cursor:pointer;}
.passage.selectable .sent:hover{background:var(--sky-soft);}
.passage .sent.picked{background:var(--sky-soft);box-shadow:0 0 0 2px var(--sky-d);}

.audio-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--paper-2);
  border-radius:var(--radius);padding:12px 14px;}
.audio-bar .grow{flex:1;}
.rate-ctl{display:flex;align-items:center;gap:8px;font-weight:700;font-size:.85rem;color:var(--muted);}
.textsize-ctl{display:flex;align-items:center;gap:6px;}

/* vocabulary */
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;}
.vocab-card{background:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:18px;
  display:flex;flex-direction:column;gap:8px;transition:transform .16s var(--ease),box-shadow .16s;}
.vocab-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);}
.vocab-card .vpic{width:72px;height:72px;border-radius:18px;background:var(--sky-soft);display:grid;place-items:center;}
.vocab-card .vpic svg{width:52px;height:52px;}
.vocab-card .word{font-family:var(--font-head);font-weight:800;font-size:1.3rem;color:var(--forest);}
.vocab-card .mean{color:var(--muted);font-size:.95rem;}
.vocab-card .exa{font-style:italic;color:var(--sage-d);font-size:.9rem;}

/* ---------- questions ---------- */
.q-shell{background:var(--paper);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:26px;}
.q-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px;flex-wrap:wrap;}
.q-progress{flex:1;height:12px;background:var(--paper-2);border-radius:999px;overflow:hidden;min-width:120px;}
.q-progress i{display:block;height:100%;background:linear-gradient(90deg,var(--sage),var(--sage-d));border-radius:999px;transition:width .4s var(--ease);}
.q-count{font-weight:800;color:var(--muted);font-size:.9rem;white-space:nowrap;}
.q-skill{font-size:.78rem;}
.q-prompt{font-size:1.5rem;font-family:var(--font-head);color:var(--forest);margin:10px 0 20px;}

.opt-grid{display:grid;gap:14px;}
.opt-grid.cols-3{grid-template-columns:repeat(3,1fr);}
.opt-grid.stack{grid-template-columns:1fr;}
.opt{border:3px solid transparent;background:var(--paper-2);border-radius:var(--radius);padding:18px;cursor:pointer;
  font-weight:800;font-size:1.1rem;color:var(--forest);text-align:center;transition:transform .14s var(--ease),border-color .16s,background .16s;
  display:flex;flex-direction:column;align-items:center;gap:10px;min-height:64px;justify-content:center;}
.opt:hover:not(:disabled){transform:translateY(-3px);border-color:var(--sky);}
.opt:disabled{cursor:default;}
.opt.pic svg{width:92px;height:92px;}
.opt.correct{background:var(--ok-soft);border-color:var(--ok);animation:pop .4s var(--ease);}
.opt.wrong{background:var(--coral-soft);border-color:var(--coral-d);}
.opt.dim{opacity:.45;}
.opt.reveal{border-color:var(--ok);box-shadow:0 0 0 3px var(--ok-soft);}
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.tf-btn{min-height:110px;font-size:1.5rem;border-radius:var(--radius-lg);}
.tf-btn .tf-ic{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:1.6rem;}
.tf-true .tf-ic{background:var(--sage-d);} .tf-false .tf-ic{background:var(--coral-d);}

/* sequence / sort / match */
.seq-list{display:flex;flex-direction:column;gap:12px;}
.seq-item{display:flex;align-items:center;gap:12px;background:var(--paper-2);border-radius:var(--radius);padding:14px 16px;
  border:3px solid transparent;font-weight:700;font-size:1.05rem;}
.seq-item.sel{border-color:var(--sky-d);background:var(--sky-soft);}
.seq-item .ord{width:34px;height:34px;flex:0 0 34px;border-radius:12px;background:var(--forest);color:#fff;
  display:grid;place-items:center;font-weight:800;}
.seq-item .txt{flex:1;}
.seq-move{display:flex;flex-direction:column;gap:4px;}
.seq-move button{width:34px;height:28px;border-radius:9px;border:none;background:#fff;box-shadow:var(--shadow-sm);cursor:pointer;font-weight:900;color:var(--forest);}
.seq-item.correct{border-color:var(--ok);background:var(--ok-soft);}
.seq-item.wrong{border-color:var(--coral-d);background:var(--coral-soft);}

.match-wrap{display:grid;grid-template-columns:1fr 1fr;gap:22px;}
.match-col{display:flex;flex-direction:column;gap:12px;}
.match-col h4{margin:0 0 4px;font-size:.95rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.chip-word{background:var(--paper-2);border:3px solid transparent;border-radius:var(--radius);padding:14px;font-weight:800;
  font-size:1.15rem;cursor:pointer;color:var(--forest);text-align:center;transition:transform .14s var(--ease),border-color .16s;}
.chip-word:hover:not(:disabled){transform:translateY(-2px);border-color:var(--sky);}
.chip-word.sel{border-color:var(--sky-d);background:var(--sky-soft);}
.chip-pic{background:var(--paper-2);border:3px solid transparent;border-radius:var(--radius);padding:10px;cursor:pointer;
  display:grid;place-items:center;transition:transform .14s var(--ease),border-color .16s;min-height:96px;}
.chip-pic svg{width:74px;height:74px;}
.chip-pic:hover:not(:disabled){transform:translateY(-2px);border-color:var(--sky);}
.chip-word.matched,.chip-pic.matched{border-color:var(--ok);background:var(--ok-soft);opacity:1;cursor:default;}
.chip-word.matched::after{content:" ✓";color:var(--ok);}

.sort-cats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px;}
.sort-cat{background:var(--paper-2);border-radius:var(--radius);padding:12px;min-height:120px;border:3px dashed var(--sage);}
.sort-cat h4{text-align:center;margin:0 0 8px;color:var(--forest);}
.sort-cat.hi{border-color:var(--sky-d);background:var(--sky-soft);}
.sort-pool{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.sort-token{background:#fff;border:3px solid transparent;border-radius:14px;padding:10px 14px;font-weight:800;cursor:pointer;
  box-shadow:var(--shadow-sm);color:var(--forest);}
.sort-token.sel{border-color:var(--sky-d);}
.sort-token.correct{background:var(--ok-soft);border-color:var(--ok);}
.sort-token.small{font-size:.9rem;padding:7px 11px;}

/* feedback panel */
.feedback{margin-top:20px;border-radius:var(--radius);padding:16px 18px;display:flex;gap:12px;align-items:flex-start;
  animation:fadeUp .3s var(--ease) both;}
.feedback.good{background:var(--ok-soft);border:2px solid var(--ok);}
.feedback.retry{background:var(--yellow-soft);border:2px solid var(--yellow-d);}
.feedback.show{background:var(--sky-soft);border:2px solid var(--sky-d);}
.feedback .fic{width:40px;height:40px;flex:0 0 40px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:1.3rem;font-weight:900;}
.feedback.good .fic{background:var(--ok);} .feedback.retry .fic{background:var(--gentle);} .feedback.show .fic{background:var(--sky-d);}
.feedback .ftext{flex:1;}
.feedback .ftext b{color:var(--forest);}
.q-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}

/* ---------- completion ---------- */
.complete{text-align:center;position:relative;overflow:hidden;}
.complete .big-stars{margin:10px 0 6px;}
.complete .score-num{font-size:3rem;font-family:var(--font-head);color:var(--forest);}
.review-list{display:flex;flex-direction:column;gap:10px;text-align:left;margin-top:14px;}
.review-item{display:flex;gap:12px;align-items:flex-start;background:var(--paper-2);border-radius:14px;padding:12px 14px;}
.review-item .rq{flex:1;} .review-item small{color:var(--muted);}
.rmark{width:28px;height:28px;flex:0 0 28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:900;}
.rmark.ok{background:var(--ok);} .rmark.no{background:var(--coral-d);}

/* confetti */
.confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.confetti i{position:absolute;top:-12px;width:10px;height:14px;border-radius:3px;opacity:.9;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(560px) rotate(540deg);opacity:0;}}

/* ---------- rewards ---------- */
.reward-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:22px;}
.stat{background:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:20px;text-align:center;}
.stat .num{font-size:2.2rem;font-family:var(--font-head);color:var(--forest);}
.stat .lbl{color:var(--muted);font-weight:700;}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;}
.badge-card{background:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:18px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:8px;transition:transform .16s var(--ease);}
.badge-card:hover{transform:translateY(-3px);}
.badge-svg{width:78px;height:78px;}
.badge-card.locked .badge-svg{filter:grayscale(1);opacity:.4;}
.badge-card .bname{font-weight:800;color:var(--forest);}
.badge-card .bdesc{font-size:.82rem;color:var(--muted);}
.badge-card .earned{font-size:.72rem;font-weight:800;color:var(--ok);}

/* ---------- results / report ---------- */
.report-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.skill-row{background:var(--paper);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:16px 18px;}
.skill-row .sr-top{display:flex;justify-content:space-between;font-weight:800;color:var(--forest);margin-bottom:8px;}
.bar{height:12px;background:var(--paper-2);border-radius:999px;overflow:hidden;}
.bar i{display:block;height:100%;border-radius:999px;transition:width .5s var(--ease);}
.bar.g i{background:linear-gradient(90deg,var(--sage),var(--sage-d));}
.bar.y i{background:linear-gradient(90deg,var(--yellow),var(--yellow-d));}
.bar.c i{background:linear-gradient(90deg,var(--coral),var(--coral-d));}

/* ---------- teacher ---------- */
.teacher-grid{display:grid;grid-template-columns:1.4fr 1fr;gap:22px;align-items:start;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--paper-2);}
.toggle-row:last-child{border-bottom:none;}
.switch{width:56px;height:32px;border-radius:999px;background:#D9D2C2;position:relative;border:none;cursor:pointer;flex:0 0 56px;transition:background .2s;}
.switch::after{content:"";position:absolute;top:3px;left:3px;width:26px;height:26px;border-radius:50%;background:#fff;box-shadow:var(--shadow-sm);transition:left .2s var(--ease);}
.switch.on{background:var(--sage-d);} .switch.on::after{left:27px;}
.teacher-story-list{display:flex;flex-direction:column;gap:8px;max-height:420px;overflow:auto;padding-right:4px;}
.tsl-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:14px;background:var(--paper-2);cursor:pointer;border:2px solid transparent;}
.tsl-item.sel{border-color:var(--sky-d);background:var(--sky-soft);}
.tsl-item .lv{font-size:.7rem;font-weight:800;color:#fff;border-radius:6px;padding:2px 6px;}

/* ---------- classroom mode ---------- */
.classroom{position:fixed;inset:0;z-index:100;background:
  radial-gradient(1200px 700px at 20% -10%,var(--sky-soft),transparent 60%),var(--cream);
  display:flex;flex-direction:column;padding:26px clamp(20px,4vw,60px);overflow:auto;}
.classroom .cr-top{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
.classroom .cr-title{font-family:var(--font-head);font-weight:800;color:var(--forest);font-size:clamp(1.2rem,2.4vw,2rem);}
.classroom .cr-body{flex:1;display:flex;flex-direction:column;justify-content:center;max-width:1100px;margin:0 auto;width:100%;}
.classroom .q-prompt{font-size:clamp(1.6rem,3.6vw,3rem);text-align:center;}
.classroom .opt{font-size:clamp(1.2rem,2.6vw,2rem);min-height:clamp(90px,14vh,150px);}
.classroom .opt.pic svg{width:clamp(90px,12vw,150px);height:clamp(90px,12vw,150px);}
.classroom .cr-controls{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px;}
.classroom .passage{font-size:clamp(1.3rem,2.6vw,2rem);}

/* ---------- certificate ---------- */
.cert-page{max-width:900px;margin:0 auto;}
.certificate{background:var(--paper);border-radius:24px;box-shadow:var(--shadow-lg);padding:44px;position:relative;
  border:10px solid transparent;background-clip:padding-box;text-align:center;overflow:hidden;}
.certificate::before{content:"";position:absolute;inset:10px;border:3px double var(--sage-d);border-radius:16px;pointer-events:none;}
.cert-inner{position:relative;z-index:1;}
.cert-kicker{letter-spacing:.28em;text-transform:uppercase;color:var(--coral-d);font-weight:800;font-size:.85rem;}
.cert-title{font-size:2.6rem;color:var(--forest);margin:6px 0 4px;}
.cert-name{font-family:var(--font-head);font-size:2.4rem;color:var(--coral-d);border-bottom:3px dashed var(--sage);display:inline-block;padding:4px 30px 8px;margin:16px 0;min-width:280px;}
.cert-row{display:flex;justify-content:center;gap:44px;margin:18px 0;flex-wrap:wrap;}
.cert-row .ci .n{font-size:2rem;font-family:var(--font-head);color:var(--forest);}
.cert-row .ci .l{color:var(--muted);font-weight:700;font-size:.85rem;}
.cert-sign{display:flex;justify-content:space-between;margin-top:28px;padding-top:10px;color:var(--muted);font-weight:700;}
.cert-medal{width:96px;height:96px;margin:0 auto;}
.name-input{border:none;border-bottom:3px dashed var(--sage);background:transparent;font-family:var(--font-head);
  font-size:1.6rem;text-align:center;color:var(--coral-d);padding:6px 10px;width:min(360px,80%);}

/* ---------- settings ---------- */
.settings-grid{display:grid;grid-template-columns:1fr;gap:14px;max-width:640px;}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:14px;background:var(--paper);border-radius:var(--radius);
  box-shadow:var(--shadow-sm);padding:16px 20px;flex-wrap:wrap;}
.set-row .lbl b{color:var(--forest);} .set-row .lbl small{display:block;color:var(--muted);}
.seg{display:inline-flex;background:var(--paper-2);border-radius:12px;padding:4px;gap:4px;}
.seg button{border:none;background:transparent;padding:8px 14px;border-radius:9px;font-weight:800;cursor:pointer;color:var(--muted);}
.seg button.on{background:#fff;color:var(--forest);box-shadow:var(--shadow-sm);}

/* modal */
.modal-back{position:fixed;inset:0;background:rgba(40,54,49,.5);display:grid;place-items:center;z-index:120;padding:20px;
  animation:fadeUp .2s ease both;}
.modal{background:var(--paper);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);padding:28px;max-width:440px;width:100%;text-align:center;}
.modal h3{font-size:1.5rem;}
.modal .m-actions{display:flex;gap:12px;justify-content:center;margin-top:20px;}

/* toast */
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--forest);color:#fff;
  padding:12px 20px;border-radius:999px;font-weight:800;box-shadow:var(--shadow-lg);z-index:200;
  display:flex;align-items:center;gap:10px;animation:toastIn .3s var(--ease) both;}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,16px);}to{opacity:1;transform:translate(-50%,0);}}

/* footer */
.site-footer{margin-top:36px;padding:24px;text-align:center;color:var(--muted);border-top:2px solid var(--paper-2);}
.site-footer b{color:var(--forest);}
.site-footer .ver{display:inline-block;margin-top:6px;background:var(--sage-soft);color:var(--forest);border-radius:999px;padding:4px 12px;font-weight:800;font-size:.78rem;}

/* empty state */
.empty{text-align:center;color:var(--muted);padding:40px 20px;}
.empty svg{width:90px;height:90px;margin:0 auto 12px;opacity:.7;}

/* loading */
#loader{position:fixed;inset:0;display:grid;place-items:center;background:var(--cream);z-index:500;transition:opacity .4s;}
#loader .l-inner{text-align:center;}
#loader .l-mark{width:88px;height:88px;margin:0 auto 14px;border-radius:26px;background:linear-gradient(145deg,var(--sage),var(--sage-d));
  display:grid;place-items:center;box-shadow:var(--shadow-md);animation:floaty 2.4s ease-in-out infinite;}
#loader .l-mark svg{width:56px;height:56px;}
#loader .l-bar{width:180px;height:8px;background:var(--paper-2);border-radius:999px;overflow:hidden;margin:16px auto 0;}
#loader .l-bar i{display:block;height:100%;width:40%;background:var(--sage-d);border-radius:999px;animation:load 1.1s ease-in-out infinite;}
@keyframes load{0%{margin-left:-40%;}100%{margin-left:100%;}}

/* ---------- responsive ---------- */
@media(max-width:1000px){
  .welcome{grid-template-columns:1fr;} .welcome-hero-svg{max-width:420px;margin:0 auto;}
  .story-grid{grid-template-columns:repeat(2,1fr);}
  .teacher-grid{grid-template-columns:1fr;}
  .two-col{grid-template-columns:1fr;}
}
@media(max-width:640px){
  body{font-size:calc(16px * var(--text-scale));}
  .app-shell{padding:0 14px 30px;} .topbar{padding:12px 14px;margin:0 -14px 18px;}
  .brand .titles{display:none;}
  .welcome{padding:24px;} .welcome h1{font-size:2rem;}
  .story-grid{grid-template-columns:1fr;}
  .reward-stats{grid-template-columns:1fr;}
  .opt-grid.cols-3{grid-template-columns:1fr;}
  .match-wrap{grid-template-columns:1fr;}
  .sort-cats{grid-template-columns:1fr;}
  .q-prompt{font-size:1.25rem;} .q-shell{padding:18px;}
  .tf-row{grid-template-columns:1fr;}
  .cert-row{gap:24px;}
  .q-actions{justify-content:stretch;} .q-actions .btn{flex:1;}
}

/* reduced motion */
.reduce-motion *{animation:none !important;transition:none !important;}
.reduce-motion .welcome-hero-svg,.reduce-motion #loader .l-mark{animation:none !important;}

/* print (certificate + report) */
@media print{
  body{background:#fff;}
  .topbar,.site-footer,.no-print,.btn{display:none !important;}
  .app-shell{max-width:none;padding:0;}
  .certificate,.panel{box-shadow:none;}
  .print-area{page-break-inside:avoid;}
}

    if(k==="class") e.className = v;
    else if(k==="html") e.innerHTML = v;
    else if(k==="style" && typeof v==="object"){ for(var s in v) e.style[s]=v[s]; }
    else if(k==="dataset"){ for(var d in v) e.dataset[d]=v[d]; }
    else if(k.length>2 && k.slice(0,2)==="on" && typeof v==="function"){ e.addEventListener(k.slice(2).toLowerCase(), v); }
    else if(v===true) e.setAttribute(k,"");
    else e.setAttribute(k, v);
  }
  for(var i=2;i<a.length;i++) add(e, a[i]);
  return e;
}
function add(p, c){
  if(c==null || c===false || c==="") return;
  if(Array.isArray(c)){ for(var i=0;i<c.length;i++) add(p,c[i]); return; }
  if(c instanceof Node){ p.appendChild(c); return; }
  p.appendChild(document.createTextNode(String(c)));
}

function shuffle(arr){ var a=arr.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

var SS = ("speechSynthesis" in window) && (typeof window.SpeechSynthesisUtterance !== "undefined");
var Speech = {
  on:function(){ return state.settings.sound && SS; },
  cancel:function(){ if(SS) try{ window.speechSynthesis.cancel(); }catch(e){} },
  speak:function(text, opts){
    opts = opts||{};
    if(!this.on()){ if(opts.onend) setTimeout(opts.onend, 120); return null; }
    try{ window.speechSynthesis.cancel(); }catch(e){}
    var u = new SpeechSynthesisUtterance(text);
    u.rate = opts.rate!=null ? opts.rate : state.settings.rate;
    u.pitch = 1.06; u.lang = "en-US";
    if(opts.onend) u.onend = opts.onend;
    try{ window.speechSynthesis.speak(u); }catch(e){ if(opts.onend) setTimeout(opts.onend,120); }
    return u;
  }
};
var Reader = {
  playing:false, paused:false, idx:0, sentences:[],
  start:function(sentences){
    this.stop(); this.sentences=sentences; this.idx=0; this.playing=true; this.paused=false; this._next(); syncAudioBtns();
  },
  _next:function(){
    var self=this;
    if(!self.playing || self.idx>=self.sentences.length){ self.playing=false; highlight(-1); syncAudioBtns(); return; }
    var i=self.idx; highlight(i);
    if(Speech.on()){
      Speech.speak(self.sentences[i], { onend:function(){ if(!self.playing) return; self.idx++; self._next(); } });
    } else {
      var words = self.sentences[i].split(" ").length;
      self._t = setTimeout(function(){ if(!self.playing) return; self.idx++; self._next(); }, 400+words*230);
    }
  },
  pauseToggle:function(){
    if(!this.playing) return;
    if(this.paused){ if(SS) window.speechSynthesis.resume(); this.paused=false; }
    else { if(SS) window.speechSynthesis.pause(); this.paused=true; }
    syncAudioBtns();
  },
  stop:function(){ this.playing=false; this.paused=false; if(this._t) clearTimeout(this._t); Speech.cancel(); highlight(-1); syncAudioBtns(); }
};
function highlight(i){
  var nodes = document.querySelectorAll(".passage .sent");
  for(var n=0;n<nodes.length;n++) nodes[n].classList.toggle("reading", n===i);
}
function syncAudioBtns(){

}

function newQState(q){
  var st={ attempts:0, solved:false, revealed:false, outcome:null, wrong:[], lastPick:null };
  if(q.type==="sequence"){ st.order = shuffle(q.items.map(function(_,i){return i;})); if(sameOrder(st.order)) st.order = st.order.reverse(); st.sel=null; }
  if(q.type==="match"){ st.words=shuffle(q.pairs.map(function(p,i){return i;})); st.pics=shuffle(q.pairs.map(function(p,i){return i;})); st.selWord=null; st.matched={}; st.wrong2=0; }
  if(q.type==="sort"){ st.pool=shuffle(q.items.map(function(_,i){return i;})); st.selTok=null; st.placed={}; st.wrong2=0; }
  return st;
}
function sameOrder(o){ for(var i=0;i<o.length;i++) if(o[i]!==i) return false; return true; }

function curQS(){ return app.qStates[app.qIndex]; }

    h("span",{class:"pill pill-sage q-skill"}, q.skill)));
  shell.appendChild(h("div",{class:"q-prompt"}, q.prompt));
  if(q.type==="listen") shell.appendChild(listenControls(q));
  shell.appendChild(renderQuestionBody(q, qs));
  if(qs.solved || qs.revealed) shell.appendChild(feedbackPanel(q, qs));
  var actions=h("div",{class:"q-actions"});
  actions.appendChild(h("button",{class:"btn btn-ghost",onclick:function(){
      if(i>0){ app.qIndex--; render(); } else { app.step="vocab"; render(); } }}, i>0?"← Previous":"← Words"));
  if(qs.solved || qs.revealed){
    if(i<total-1) actions.appendChild(h("button",{class:"btn btn-primary",onclick:function(){ app.qIndex++; render(); }},"Next question →"));
    else actions.appendChild(h("button",{class:"btn btn-green",onclick:function(){ finalizeStory(s); }},"Finish story →"));
  }
  shell.appendChild(actions);
  return shell;
}
function listenControls(q){
  return h("div",{class:"audio-bar no-print",style:{marginBottom:"14px"}},
    h("button",{class:"btn btn-sky",onclick:function(){ Speech.speak(q.speak, {rate:state.settings.rate}); }}, raw(icon("badgeEar")), h("span",null,"Play the sentence")),
    h("button",{class:"btn btn-ghost",onclick:function(){ Speech.speak(q.speak,{rate:state.settings.rate}); }},"↻ Replay"),
    h("span",{class:"grow"}),
    h("span",{class:"pill pill-yellow"},"Listen, then choose"));
}
function feedbackPanel(q, qs){
  if(qs.solved){
    var msgs=["Great reading!","You found the clue!","That's right!","Well done!","Super work!"];
    var m = msgs[Math.floor(app.qIndex)%msgs.length];
    return h("div",{class:"feedback good"}, h("div",{class:"fic"},"✓"),
      h("div",{class:"ftext"}, h("b",null,m+" "), q.explain));
  }
  return h("div",{class:"feedback show"}, h("div",{class:"fic"},"i"),
    h("div",{class:"ftext"}, h("b",null,"Here's the answer. "), q.explain,
      (q.evidence!=null||q.answer!=null&&q.type==="evidence")?evidenceHint(q):null));
}
function evidenceHint(q){
  var idx = q.type==="evidence" ? q.answer : q.evidence;
  if(idx==null) return null;
  return h("div",{style:{marginTop:"8px"}},
    h("span",{class:"pill pill-sage"},"Clue in the story: "),
    h("span",{style:{fontStyle:"italic",marginLeft:"6px"}}, "“"+app.story.sentences[idx]+"”"));
}

/* choice-type answer (picture / mc / tf / listen) */
function answerChoice(q, qs, chosenIndex, isCorrect){
  if(qs.solved||qs.revealed) return;
  qs.attempts++; qs.lastPick=chosenIndex;
  if(isCorrect){
    qs.solved=true; qs.outcome = qs.attempts===1?"first":"second";
    afterSolve(q, qs);
  } else {
    qs.wrong.push(chosenIndex);
    if(qs.attempts>=2){ qs.revealed=true; qs.outcome="revealed"; }
  }
  render();
}
function afterSolve(q, qs){
  if(q.type==="listen"){ state.progress.listeningCorrect++; save(true); }
  if(q.type==="evidence"){ state.progress.evidenceFound++; save(true); }
  evaluateBadges();
  if(!state.settings.reducedMotion){ /* subtle pop handled by CSS */ }
}

function renderQuestionBody(q, qs){
  switch(q.type){
    case "picture": return choiceGrid(q, qs, true);
    case "mc": case "listen": return choiceGrid(q, qs, false);
    case "tf": return tfBody(q, qs);
    case "evidence": return evidenceBody(q, qs);
    case "sequence": return sequenceBody(q, qs);
    case "match": return matchBody(q, qs);
    case "sort": return sortBody(q, qs);
    default: return h("div",null,"—");
  }
}
function choiceGrid(q, qs, pic){
  var grid=h("div",{class:"opt-grid "+(pic?"cols-3":"stack")});
  q.options.forEach(function(opt, idx){
    var cls="opt"+(pic?" pic":"");
    var done=qs.solved||qs.revealed;
    if(done && idx===q.answer) cls+= qs.solved?" correct":" reveal";
    else if(qs.wrong.indexOf(idx)>=0) cls+=" wrong dim";
    else if(done) cls+=" dim";
    var body = pic ? [raw(icon(opt.icon)), h("span",null,opt.label)] : [h("span",null,opt)];
    grid.appendChild(h("button",{class:cls, disabled:done,
      onclick:function(){ answerChoice(q, qs, idx, idx===q.answer); }}, body));
  });
  return grid;
}
function tfBody(q, qs){
  var done=qs.solved||qs.revealed;
  function tb(val,label,cls,ic){
    var isAns = (val===q.answer);
    var c="opt tf-btn "+cls;
    if(done && isAns) c+= qs.solved?" correct":" reveal";
    else if(done) c+=" dim";
    else if(qs.wrong.indexOf(val?1:0)>=0) c+=" wrong dim";
    return h("button",{class:c,disabled:done,onclick:function(){ answerChoice(q,qs,val?1:0, val===q.answer); }},
      h("span",{class:"tf-ic"},ic), h("span",null,label));
  }
  return h("div",{class:"tf-row"}, tb(true,"True","tf-true","✓"), tb(false,"False","tf-false","✕"));
}
function evidenceBody(q, qs){
  var done=qs.solved||qs.revealed;
  var p=h("p",{class:"passage selectable"});
  app.story.sentences.forEach(function(sent, i){
    var cls="sent";
    if(done && i===q.answer) cls+=" evidence";
    else if(qs.wrong.indexOf(i)>=0) cls+=" picked";
    p.appendChild(h("span",{class:cls,dataset:{i:i},role:"button",tabindex: done?-1:0,
      onclick:function(){ if(!done) answerChoice(q,qs,i,i===q.answer); },
      onkeydown:function(e){ if(!done&&(e.key==="Enter"||e.key===" ")){ e.preventDefault(); answerChoice(q,qs,i,i===q.answer); } }
    }, sent+" "));
  });
  return h("div",null, h("p",{style:{color:"var(--muted)",marginTop:0}},"Tap the sentence with the answer."), p);
}
function sequenceBody(q, qs){
  var done=qs.solved||qs.revealed;
  var list=h("div",{class:"seq-list"});
  qs.order.forEach(function(itemIdx, pos){
    var cls="seq-item";
    if(done){ cls += (itemIdx===pos)?" correct":" wrong"; }
    var row=h("div",{class:cls},
      h("span",{class:"ord"}, pos+1),
      h("span",{class:"txt"}, q.items[itemIdx]));
    if(!done){
      row.appendChild(h("span",{class:"seq-move"},
        h("button",{"aria-label":"Move up",disabled:pos===0,onclick:function(){ moveSeq(qs,pos,-1); }},"▲"),
        h("button",{"aria-label":"Move down",disabled:pos===qs.order.length-1,onclick:function(){ moveSeq(qs,pos,1); }},"▼")));
    }
    list.appendChild(row);
  });
  var box=h("div",null,
    h("p",{style:{color:"var(--muted)",marginTop:0}},"Use ▲ ▼ to put the events in order, then check."),
    list);
  if(!done){
    box.appendChild(h("div",{style:{marginTop:"14px"}},
      h("button",{class:"btn btn-green",onclick:function(){ checkSequence(q,qs); }},"Check my order")));
  }
  return box;
}
function moveSeq(qs, pos, dir){
  var n=pos+dir; if(n<0||n>=qs.order.length) return;
  var t=qs.order[pos]; qs.order[pos]=qs.order[n]; qs.order[n]=t; render();
}
function checkSequence(q, qs){
  qs.attempts++;
  var ok=true; for(var i=0;i<qs.order.length;i++) if(qs.order[i]!==i){ ok=false; break; }
  if(ok){ qs.solved=true; qs.outcome=qs.attempts===1?"first":"second"; afterSolve(q,qs); }
  else if(qs.attempts>=2){ qs.revealed=true; qs.outcome="revealed"; qs.order=q.items.map(function(_,i){return i;}); }
  else { flash(icon("badgeGlass"),"Not yet — try again"); }
  render();
}
function matchBody(q, qs){
  var done=qs.solved;
  var left=h("div",{class:"match-col"}, h("h4",null,"Words"));
  qs.words.forEach(function(pi){
    var matched = qs.matched["w"+pi];
    var cls="chip-word"+(matched?" matched":"")+(qs.selWord===pi?" sel":"");
    left.appendChild(h("button",{class:cls,disabled:matched||done,
      onclick:function(){ qs.selWord = qs.selWord===pi?null:pi; render(); }}, q.pairs[pi].word));
  });
  var right=h("div",{class:"match-col"}, h("h4",null,"Pictures"));
  qs.pics.forEach(function(pi){
    var matched = qs.matched["p"+pi];
    var cls="chip-pic"+(matched?" matched":"");
    right.appendChild(h("button",{class:cls,disabled:matched||done,
      onclick:function(){ tryMatch(q,qs,pi); }}, raw(icon(q.pairs[pi].icon))));
  });
  return h("div",null,
    h("p",{style:{color:"var(--muted)",marginTop:0}},"Tap a word, then tap its picture."),
    h("div",{class:"match-wrap"}, left, right));
}
function tryMatch(q, qs, picIdx){
  if(qs.selWord==null){ flash(icon("badgeWord"),"Pick a word first"); return; }
  var w=qs.selWord;
  if(q.pairs[w].icon===q.pairs[picIdx].icon){
    qs.matched["w"+w]=true; qs.matched["p"+picIdx]=true; qs.selWord=null;
    var all=q.pairs.every(function(_,i){ return qs.matched["w"+i]; });
    if(all){ qs.solved=true; qs.outcome=qs.wrong2>0?"second":"first"; afterSolve(q,qs); }
  } else {
    qs.wrong2++; qs.attempts++; qs.selWord=null; flash(icon("badgeGlass"),"Try another one");
  }
  render();
}
function sortBody(q, qs){
  var done=qs.solved;
  var pool=h("div",{class:"sort-pool"});
  qs.pool.forEach(function(ti){
    if(qs.placed[ti]) return;
    var cls="sort-token"+(qs.selTok===ti?" sel":"");
    pool.appendChild(h("button",{class:cls,disabled:done,onclick:function(){ qs.selTok=qs.selTok===ti?null:ti; render(); }}, q.items[ti].text));
  });
  var cats=h("div",{class:"sort-cats"});
  q.categories.forEach(function(cat){
    var col=h("div",{class:"sort-cat"+(qs.selTok!=null?" hi":""),role:"button",tabindex:0,
      onclick:function(){ placeSort(q,qs,cat); },
      onkeydown:function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); placeSort(q,qs,cat);} }},
      h("h4",null,cat));
    q.items.forEach(function(it, ti){
      if(qs.placed[ti]===cat) col.appendChild(h("span",{class:"sort-token small correct",style:{display:"inline-block",margin:"3px"}}, it.text));
    });
    cats.appendChild(col);
  });
  return h("div",null,
    h("p",{style:{color:"var(--muted)",marginTop:0}},"Tap a word, then tap Who, What or Where."),
    pool, cats);
}
function placeSort(q, qs, cat){
  if(qs.selTok==null){ flash(icon("badgeWord"),"Pick a word first"); return; }
  var ti=qs.selTok;
  if(q.items[ti].cat===cat){
    qs.placed[ti]=cat; qs.selTok=null;
    var all=q.items.every(function(_,i){ return qs.placed[i]; });
    if(all){ qs.solved=true; qs.outcome=qs.wrong2>0?"second":"first"; afterSolve(q,qs); }
  } else {
    qs.wrong2++; qs.attempts++; qs.selTok=null; flash(icon("badgeGlass"),"Not that box — try again");
  }
  render();
}

/* ------------- finalize + complete ------------- */
function finalizeStory(s){
  stopAllAudio();
  var outcomes = app.qStates.map(function(q){ return q.outcome||"revealed"; });
  var first = outcomes.filter(function(o){ return o==="first"; }).length;
  var correct = outcomes.filter(function(o){ return o!=="revealed"; }).length;
  var stars = first>=5 ? 3 : (first>=3 ? 2 : 1);
  var skill={};
  s.questions.forEach(function(q, i){
    var g=SKILL_GROUP[q.skill]||"Details";
    if(!skill[g]) skill[g]={c:0,t:0};
    skill[g].t++; if(outcomes[i]!=="revealed") skill[g].c++;
  });
  var prev=state.progress.stories[s.id];
  state.progress.stories[s.id]={
    completed:true,
    stars: Math.max(stars, prev?prev.stars:0),
    lastStars: stars, correct:correct, total:s.questions.length,
    outcomes:outcomes, skill:skill
  };
  save(true);
  evaluateBadges();
  app.step="complete"; render();
}
function stepComplete(s){
  var prog=state.progress.stories[s.id];
  var wrap=h("div",{class:"panel paper-grain complete"});
  if(!state.settings.reducedMotion) wrap.appendChild(confetti());
  wrap.appendChild(h("h2",{style:{fontSize:"2rem"}},"Story complete!"));
  wrap.appendChild(h("p",{style:{color:"var(--muted)",marginTop:"-6px"}}, s.title));
  wrap.appendChild(h("div",{class:"big-stars"}, starRating(prog.lastStars, true)));
  wrap.appendChild(h("div",{class:"score-num"}, prog.correct+" / "+prog.total));
  wrap.appendChild(h("p",{style:{color:"var(--muted)"}},"questions correct"));
  Speech.on() && Speech.speak(prog.lastStars===3?"Perfect reading! Three stars!":"Well done! Story complete.", {rate:0.9});
  /* review */
  var review=h("div",{class:"review-list"});
  s.questions.forEach(function(q, i){
    var ok = prog.outcomes[i]!=="revealed";
    review.appendChild(h("div",{class:"review-item"},
      h("span",{class:"rmark "+(ok?"ok":"no")}, ok?"✓":"!"),
      h("div",{class:"rq"}, h("div",null, q.prompt),
        h("small",null, ok?("Correct · "+q.skill):("Practice this · "+q.explain)))));
  });
  wrap.appendChild(h("h3",{style:{marginTop:"18px",textAlign:"left"}},"Look back at your answers"));
  wrap.appendChild(review);
  var next = nextStory(s);
  wrap.appendChild(h("div",{class:"q-actions",style:{justifyContent:"center",marginTop:"22px"}},
    h("button",{class:"btn btn-ghost",onclick:function(){ openStory(s); }},"↻ Read again"),
    h("button",{class:"btn btn-sky",onclick:function(){ go("rewards"); }},"See my badges"),
    next ? h("button",{class:"btn btn-primary",onclick:function(){ openStory(next); }},"Next story →")
         : h("button",{class:"btn btn-green",onclick:function(){ go("certificate"); }},"Get my certificate →")));
  return wrap;
}
function nextStory(s){
  var idx=STORIES.indexOf(s);
  for(var i=idx+1;i<STORIES.length;i++){ if(isUnlocked(STORIES[i])) return STORIES[i]; }
  return null;
}
function confetti(){
  var box=h("div",{class:"confetti"});
  var cols=["#F0A088","#9CC29A","#9BC9E4","#F4C95D","#E27E63"];
  for(var i=0;i<34;i++){
    box.appendChild(h("i",{style:{left:(Math.random()*100)+"%",background:cols[i%cols.length],
      animationDuration:(1.6+Math.random()*1.4)+"s",animationDelay:(Math.random()*0.5)+"s",
      transform:"rotate("+(Math.random()*360)+"deg)"}}));
  }
  return box;
}

/* ------------- badges ------------- */
function evaluateBadges(){
  var earned=state.progress.badges, newly=[];
  function grant(id){ if(earned.indexOf(id)<0){ earned.push(id); newly.push(id); } }
  var cc=completedCount();
  if(cc>=1) grant("first_story");
  if(cc>=3) grant("careful_reader");
  if(cc>=12) grant("reading_champion");
  if(state.progress.vocabPlayed>=15) grant("word_explorer");
  if(state.progress.listeningCorrect>=5) grant("listening_star");
  if(state.progress.evidenceFound>=5) grant("story_detective");
  var st=state.progress.stories; for(var k in st){ if(st[k].stars>=3){ grant("perfect_reader"); break; } }
  save(true);
  if(newly.length){
    var b=BADGES.filter(function(x){return x.id===newly[0];})[0];
    flash(badge(b.icon), "Badge earned: "+b.name);
  }
}

   STUDENT RESULTS
   ============================================================ */
function aggregateSkills(){
  var agg={}; SKILLS.forEach(function(s){ agg[s]={c:0,t:0}; });
  var st=state.progress.stories;
  for(var k in st){ var sk=st[k].skill||{}; for(var g in sk){ if(agg[g]){ agg[g].c+=sk[g].c; agg[g].t+=sk[g].t; } } }
  return agg;
}
function viewResults(){
  var st=state.progress.stories, done=completedCount();
  var wrap=h("section",{class:"view"},
    h("div",{class:"section-title"}, h("h2",null,"My Results"),
      h("button",{class:"btn btn-sm btn-ghost no-print",onclick:function(){ window.print(); }},"🖨 Print report")));
  if(done===0){ wrap.appendChild(h("p",{class:"empty"},"No results yet. Finish a story to see your reading skills grow here.")); return wrap; }
  var totalQ=0, totalC=0;
  for(var k in st){ totalQ+=st[k].total; totalC+=st[k].correct; }
  wrap.appendChild(h("div",{class:"reward-stats print-area"},
    stat(Math.round(totalC/totalQ*100)+"%","Overall score"),
    stat(done+" / 12","Stories completed"),
    stat(totalC+" / "+totalQ,"Correct answers")));
  var agg=aggregateSkills();
  var grid=h("div",{class:"report-grid print-area"});
  SKILLS.forEach(function(sk){
    var d=agg[sk], pct=d.t?Math.round(d.c/d.t*100):0;
    var band=pct>=80?"g":(pct>=50?"y":"c");
    grid.appendChild(h("div",{class:"skill-row"},
      h("div",{class:"sr-top"}, h("span",null,sk), h("span",null, d.t?pct+"%":"—")),
      h("div",{class:"bar "+band}, h("i",{style:{width:pct+"%"}})),
      h("small",{style:{color:"var(--muted)"}}, d.t? (d.c+" of "+d.t+" correct") : "Not practiced yet")));
  });
  wrap.appendChild(h("h3",{style:{marginTop:"8px"}},"Reading skills"));
  wrap.appendChild(grid);
  /* questions needing practice */
  var practice=[];
  STORIES.forEach(function(s){
    var p=st[s.id]; if(!p) return;
    s.questions.forEach(function(q,i){ if(p.outcomes[i]==="revealed") practice.push({s:s,q:q}); });
  });
  wrap.appendChild(h("h3",{style:{marginTop:"20px"}},"Questions to practice again"));
  if(practice.length===0) wrap.appendChild(h("p",{style:{color:"var(--ok)",fontWeight:"800"}},"None — wonderful work! Every question was answered."));
  else { var pl=h("div",{class:"review-list"}); practice.slice(0,12).forEach(function(p){
      pl.appendChild(h("div",{class:"review-item"}, h("span",{class:"rmark no"},"!"),
        h("div",{class:"rq"}, h("div",null,p.q.prompt), h("small",null,p.s.title+" · "+p.q.skill)))); });
    wrap.appendChild(pl);
  }
  return wrap;
}

function startClassroom(storyId, quick){

function exitClassroom(){ stopAllAudio(); if(document.fullscreenElement) document.exitFullscreen&&document.exitFullscreen(); app.classroom=null; render(); }
function viewClassroom(){
  var cr=app.classroom, s=storyById(cr.storyId), q=s.questions[cr.index], total=s.questions.length;
  var el=h("div",{class:"classroom"});
  el.appendChild(h("div",{class:"cr-top"},
    h("span",{class:"cr-title"}, s.title),
    h("span",{class:"pill pill-sky"},"Question "+(cr.index+1)+" of "+total),
    h("span",{class:"pill pill-sage"}, q.skill),
    h("span",{style:{flex:1}}),
    h("button",{class:"btn btn-ghost",onclick:exitClassroom},"✕ Exit")));
  var body=h("div",{class:"cr-body"});
  body.appendChild(h("div",{class:"q-prompt"}, q.prompt));
  if(q.type==="listen") body.appendChild(h("div",{style:{textAlign:"center",marginBottom:"16px"}},
    h("button",{class:"btn btn-sky btn-lg",onclick:function(){ Speech.speak(q.speak); }},"▶ Play the sentence")));
  body.appendChild(classroomAnswers(s,q,cr));
  if(cr.showEvidence && (q.evidence!=null || q.type==="evidence")){
    var ei = q.type==="evidence"? q.answer : q.evidence;
    body.appendChild(h("div",{class:"feedback show",style:{maxWidth:"800px",margin:"18px auto 0"}},
      h("div",{class:"fic"},"i"), h("div",{class:"ftext"}, h("b",null,"Clue: "), "“"+s.sentences[ei]+"”")));
  }
  if(cr.showAnswer) body.appendChild(h("div",{class:"feedback good",style:{maxWidth:"800px",margin:"14px auto 0"}},
    h("div",{class:"fic"},"✓"), h("div",{class:"ftext"}, h("b",null,"Answer. "), q.explain)));
  el.appendChild(body);
  el.appendChild(h("div",{class:"cr-controls"},
    h("button",{class:"btn btn-ghost btn-lg",disabled:cr.index===0,onclick:function(){ crGo(-1); }},"◀ Back"),
    h("button",{class:"btn btn-sky btn-lg",onclick:function(){ crReplay(s,q); }},"↻ Replay audio"),
    h("button",{class:"btn btn-yellow btn-lg",onclick:function(){ cr.showEvidence=!cr.showEvidence; render(); }},"Show clue"),
    h("button",{class:"btn btn-green btn-lg",onclick:function(){ cr.showAnswer=true; render(); }},"Show answer"),
    h("button",{class:"btn btn-ghost btn-lg",onclick:function(){ cr.picked=null; cr.showAnswer=false; cr.showEvidence=false; render(); }},"Reset"),
    h("button",{class:"btn btn-primary btn-lg",disabled:cr.index===total-1,onclick:function(){ crGo(1); }},"Next ▶")));
  return el;
}
function crReplay(s,q){ if(q.type==="listen") Speech.speak(q.speak); else Speech.speak(q.prompt); }
function crGo(d){ var cr=app.classroom, s=storyById(cr.storyId); var n=cr.index+d; if(n<0||n>=s.questions.length) return; cr.index=n; cr.picked=null; cr.showAnswer=false; cr.showEvidence=false; stopAllAudio(); render(); }
function classroomAnswers(s,q,cr){
  if(q.type==="mc"||q.type==="listen"||q.type==="picture"){
    var pic=q.type==="picture";
    var grid=h("div",{class:"opt-grid "+(pic?"cols-3":"stack"),style:{maxWidth:"900px",margin:"0 auto"}});
    q.options.forEach(function(opt,idx){
      var cls="opt"+(pic?" pic":"");
      if(cr.showAnswer && idx===q.answer) cls+=" correct";
      else if(cr.picked===idx && idx!==q.answer && cr.showAnswer) cls+=" wrong";
      else if(cr.picked===idx) cls+=" reveal";
      grid.appendChild(h("button",{class:cls,onclick:function(){ cr.picked=idx; render(); }},
        pic?[raw(icon(opt.icon)),h("span",null,opt.label)]:[h("span",null,opt)]));
    });
    return grid;
  }
  if(q.type==="tf"){
    return h("div",{class:"tf-row",style:{maxWidth:"700px",margin:"0 auto"}},
      ["True","False"].map(function(lbl,idx){
        var val=idx===0; var cls="opt tf-btn "+(val?"tf-true":"tf-false");
        if(cr.showAnswer && val===q.answer) cls+=" correct";
        else if(cr.picked===idx) cls+=" reveal";
        return h("button",{class:cls,onclick:function(){ cr.picked=idx; render(); }},
          h("span",{class:"tf-ic"}, val?"✓":"✕"), h("span",null,lbl));
      }));
  }
  if(q.type==="evidence"){
    var p=h("p",{class:"passage selectable",style:{maxWidth:"900px",margin:"0 auto"}});
    s.sentences.forEach(function(sent,i){
      var cls="sent"; if(cr.showAnswer && i===q.answer) cls+=" evidence"; else if(cr.picked===i) cls+=" picked";
      p.appendChild(h("span",{class:cls,role:"button",tabindex:0,onclick:function(){ cr.picked=i; render(); }}, sent+" "));
    });
    return p;
  }
  if(q.type==="sequence"){
    var box=h("div",{class:"seq-list",style:{maxWidth:"760px",margin:"0 auto"}});
    var order = cr.showAnswer ? q.items.map(function(t,i){return i;}) : (cr._shuf||(cr._shuf=shuffle(q.items.map(function(t,i){return i;}))));
    order.forEach(function(itemIdx,pos){
      box.appendChild(h("div",{class:"seq-item"+(cr.showAnswer?" correct":"")},
        h("span",{class:"ord"}, cr.showAnswer?(pos+1):"?"), h("span",{class:"txt"}, q.items[itemIdx])));
    });
    return box;
  }
  if(q.type==="match"){
    var wrap=h("div",{class:"match-wrap",style:{maxWidth:"800px",margin:"0 auto"}});
    var lc=h("div",{class:"match-col"}, h("h4",null,"Words"));
    q.pairs.forEach(function(p){ lc.appendChild(h("div",{class:"chip-word"+(cr.showAnswer?" matched":"")}, p.word)); });
    var rc=h("div",{class:"match-col"}, h("h4",null,"Pictures"));
    q.pairs.forEach(function(p){ rc.appendChild(h("div",{class:"chip-pic"+(cr.showAnswer?" matched":"")}, raw(icon(p.icon)))); });
    wrap.appendChild(lc); wrap.appendChild(rc); return wrap;
  }
  if(q.type==="sort"){
    var cats=h("div",{class:"sort-cats",style:{maxWidth:"820px",margin:"0 auto"}});
    q.categories.forEach(function(cat){
      var col=h("div",{class:"sort-cat"}, h("h4",null,cat));
      if(cr.showAnswer) q.items.forEach(function(it){ if(it.cat===cat) col.appendChild(h("span",{class:"sort-token small correct",style:{margin:"3px",display:"inline-block"}}, it.text)); });
      cats.appendChild(col);
    });
    return h("div",null, h("div",{class:"sort-pool",style:{justifyContent:"center"}}, q.items.map(function(it){ return h("span",{class:"sort-token"}, it.text); })), cats);
  }
  return h("div",null);
}

/* ============================================================
   CERTIFICATE
   ============================================================ */
function viewCertificate(){
  var done=completedCount();
  var dateStr=new Date().toLocaleDateString(undefined,{year:"numeric",month:"long",day:"numeric"});
  var wrap=h("section",{class:"view cert-page"},
    h("div",{class:"section-title no-print"}, h("h2",null,"Completion Certificate"),
      h("button",{class:"btn btn-sm btn-ghost",onclick:function(){ go("library"); }},"← Library")));
  wrap.appendChild(h("div",{class:"certificate print-area"},
    h("div",{class:"cert-inner"},
      h("div",{class:"cert-medal"}, raw(badge("badgeTrophy"))),
      h("div",{class:"cert-kicker"},"Little Readers"),
      h("div",{class:"cert-title"},"Reading Champion"),
      h("p",{style:{color:"var(--muted)",margin:"0"}},"This certificate is proudly presented to"),
      h("input",{class:"name-input",type:"text",value:state.studentName||"",placeholder:"Type your name",
        "aria-label":"Student name",
        oninput:function(e){ state.studentName=e.target.value; },
        onchange:function(e){ state.studentName=e.target.value; save(true); }}),
      h("div",{class:"cert-row"},
        h("div",{class:"ci"}, h("div",{class:"n"}, done+" / 12"), h("div",{class:"l"},"Stories completed")),
        h("div",{class:"ci"}, h("div",{class:"n"}, totalStars()), h("div",{class:"l"},"Stars earned")),
        h("div",{class:"ci"}, h("div",{class:"n"}, state.progress.badges.length), h("div",{class:"l"},"Badges")) ),
      h("p",{style:{color:"var(--muted)"}},"for wonderful reading, listening and clue-finding."),
      h("div",{class:"cert-sign"},
        h("div",null, dateStr, h("div",{style:{fontSize:".75rem"}},"Date")),
        h("div",{style:{textAlign:"right"}}, "Bright EngMath", h("div",{style:{fontSize:".75rem"}},"Little Readers Story Pack 1")))
    )));
  wrap.appendChild(h("div",{class:"q-actions no-print",style:{justifyContent:"center"}},
    h("button",{class:"btn btn-primary btn-lg",onclick:function(){ save(true); window.print(); }},"🖨 Print certificate")));
  if(done<12) wrap.appendChild(h("p",{class:"empty no-print"},"Finish all 12 stories to earn the full Reading Champion certificate. You have "+done+" so far!"));
  return wrap;
}

/* ============================================================
   SETTINGS
   ============================================================ */
function viewSettings(){
  var s=state.settings;
  var wrap=h("section",{class:"view"},
    h("div",{class:"section-title"}, h("h2",null,"Settings")));
  var grid=h("div",{class:"settings-grid"});
  grid.appendChild(setRow("Sound","Turn all audio on or off.",
    h("button",{class:"switch"+(s.sound?" on":""),role:"switch","aria-checked":s.sound,onclick:function(){ s.sound=!s.sound; if(!s.sound) stopAllAudio(); save(true); render(); }})));
  grid.appendChild(setRow("Read-aloud speed","How fast the voice reads.",
    seg([["0.7","Slow",0.7],["0.9","Normal",0.9],["1.1","Fast",1.1]], s.rate, function(v){ s.rate=v; save(true); render(); })));
  grid.appendChild(setRow("Text size","Make the words bigger or smaller.",
    seg([["0.9","Small",0.9],["1","Medium",1],["1.15","Large",1.15],["1.3","X-Large",1.3]], s.textScale, function(v){ setTextScale(v); render(); })));
  grid.appendChild(setRow("Reduced motion","Turn off animations and confetti.",
    h("button",{class:"switch"+(s.reducedMotion?" on":""),role:"switch","aria-checked":s.reducedMotion,onclick:function(){ s.reducedMotion=!s.reducedMotion; applySettings(); save(true); render(); }})));
  grid.appendChild(setRow("Fullscreen","Best for classroom projectors.",
    h("button",{class:"btn btn-sky",onclick:toggleFullscreen}, document.fullscreenElement?"Exit fullscreen":"Go fullscreen")));
  grid.appendChild(setRow("Reset progress","Clear all stars, badges and results.",
    h("button",{class:"btn btn-primary",onclick:confirmReset},"Reset progress")));
  wrap.appendChild(grid);
  return wrap;
}
function setRow(title, sub, control){
  return h("div",{class:"set-row"},
    h("div",{class:"lbl"}, h("b",null,title), h("small",null,sub)), control);
}
function seg(opts, cur, fn){
  var box=h("div",{class:"seg"});
  opts.forEach(function(o){ box.appendChild(h("button",{class:(Math.abs(cur-o[2])<0.001?"on":""),onclick:function(){ fn(o[2]); }}, o[1])); });
  return box;
}

/* ---------------- system ---------------- */
function applySettings(){
  document.documentElement.style.setProperty("--text-scale", state.settings.textScale||1);
  document.body.classList.toggle("reduce-motion", !!state.settings.reducedMotion);
}
function requestFullscreen(){ var el=document.documentElement; if(el.requestFullscreen) el.requestFullscreen().catch(function(){}); }
function toggleFullscreen(){ if(document.fullscreenElement){ document.exitFullscreen&&document.exitFullscreen(); } else requestFullscreen(); setTimeout(render,120); }
window.addEventListener("beforeunload", stopAllAudio);
document.addEventListener("keydown", function(e){ if(e.key==="Escape" && app.classroom) exitClassroom(); });

/* ---------------- boot ---------------- */
function boot(){
  applySettings();
  var loader=document.getElementById("loader");
  render();
  if(loader){ loader.style.opacity="0"; setTimeout(function(){ loader.style.display="none"; }, 420); }
}
if(document.readyState!=="loading") boot(); else document.addEventListener("DOMContentLoaded", boot);

})();

</script>
