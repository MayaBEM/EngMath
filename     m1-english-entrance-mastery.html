<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.1 English Entrance Exam Mastery — Bright EngMath</title>
<meta name="description" content="Seven interactive English practice tests (175 original questions with Thai explanations) for competitive Thai M.1 entrance exam preparation. By Bright EngMath.">
<meta name="theme-color" content="#2a46c0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%232a46c0'/%3E%3Ctext x='50' y='68' font-size='52' font-family='Poppins,sans-serif' font-weight='800' fill='white' text-anchor='middle'%3EBE%3C/text%3E%3C/svg%3E">
<style>
/* ============================================================
   M.1 English Entrance Exam Mastery — Design System
   © 2026 Bright EngMath
   ============================================================ */
:root{
  --royal:#2a46c0; --royal-deep:#1c2f8f; --sky:#3ba3f7; --sky-2:#66baff;
  --sky-soft:#e9f3ff; --yellow:#ffc93c; --yellow-soft:#fff5d8;
  --coral:#ff7a59; --coral-soft:#ffe7df;
  --mint:#41c48c; --mint-soft:#e3f8ef; --mint-ink:#1e7d56;
  --rose:#f0576f; --rose-soft:#ffe7ec; --rose-ink:#c02745;
  --lav:#7b6ff0; --lav-soft:#efecff;
  --bg:#f6f9ff; --bg-2:#eef4ff; --card:#ffffff;
  --ink:#1f2a49; --muted:#5c6a8c; --faint:#8a96b4; --line:#e4ecf7;
  --shadow:0 10px 30px rgba(31,42,73,.08); --shadow-lg:0 20px 50px rgba(31,42,73,.14);
  --radius:20px; --radius-sm:13px; --maxw:1160px;
  --sans:'Poppins','Nunito','Noto Sans Thai','Segoe UI',system-ui,sans-serif;
  --body:'Nunito','Noto Sans Thai','Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0; font-family:var(--body); color:var(--ink);
  background:linear-gradient(180deg,#eef4ff 0%,var(--bg) 240px);
  font-size:17px; line-height:1.6; -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4,.brandtxt{font-family:var(--sans); line-height:1.2; margin:0 0 .4em}
h1{font-size:clamp(2rem,4vw,3.2rem); font-weight:700}
h2{font-size:clamp(1.5rem,2.6vw,2.1rem); font-weight:700}
h3{font-size:1.28rem; font-weight:600}
a{color:var(--royal); text-decoration:none}
img{max-width:100%}
button{font-family:var(--body)}
.thai{font-family:'Noto Sans Thai',var(--body)}
.wrap{max-width:var(--maxw); margin:0 auto; padding:0 22px}
.hidden{display:none !important}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}

/* ---------- Top navigation ---------- */
.nav{position:sticky; top:0; z-index:50; background:rgba(255,255,255,.86); backdrop-filter:blur(10px); border-bottom:1px solid var(--line)}
.nav .wrap{display:flex; align-items:center; gap:18px; height:66px}
.brand{display:flex; align-items:center; gap:11px; cursor:pointer; border:0; background:none}
.logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--royal),var(--sky));display:grid;place-items:center;color:#fff;font-weight:800;font-family:var(--sans);box-shadow:0 6px 16px rgba(42,70,192,.35)}
.brandtxt b{font-weight:700;font-size:1.05rem;color:var(--ink);display:block;line-height:1.1}
.brandtxt span{font-size:.72rem;color:var(--muted);letter-spacing:.02em}
.nav-links{margin-left:auto; display:flex; gap:6px; align-items:center; flex-wrap:wrap}
.nav-links button{border:0;background:none;color:var(--muted);font-weight:600;padding:9px 13px;border-radius:10px;cursor:pointer;font-size:.95rem}
.nav-links button:hover{background:var(--sky-soft);color:var(--royal)}
.nav-links button.active{color:var(--royal);background:var(--sky-soft)}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;border:0;cursor:pointer;
  font-weight:700;font-family:var(--sans);font-size:1rem;padding:14px 26px;border-radius:14px;
  transition:transform .12s ease, box-shadow .12s ease, background .15s;line-height:1}
.btn:active{transform:translateY(1px)}
.btn-primary{background:linear-gradient(135deg,var(--royal),var(--sky));color:#fff;box-shadow:0 10px 22px rgba(42,70,192,.32)}
.btn-primary:hover{box-shadow:0 14px 28px rgba(42,70,192,.42)}
.btn-accent{background:linear-gradient(135deg,var(--coral),#ff9a4d);color:#fff;box-shadow:0 10px 22px rgba(255,122,89,.32)}
.btn-ghost{background:#fff;color:var(--royal);border:2px solid var(--line)}
.btn-ghost:hover{border-color:var(--sky);background:var(--sky-soft)}
.btn-soft{background:var(--sky-soft);color:var(--royal)}
.btn-mint{background:linear-gradient(135deg,var(--mint),#63d6a4);color:#fff}
.btn-lg{padding:17px 34px;font-size:1.1rem}
.btn-sm{padding:9px 16px;font-size:.9rem;border-radius:11px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn:focus-visible,button:focus-visible,a:focus-visible,.opt:focus-visible{outline:3px solid var(--sky);outline-offset:3px}

/* ---------- Cards / sections ---------- */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line)}
.section{padding:56px 0}
.eyebrow{color:var(--coral);font-weight:800;letter-spacing:.08em;text-transform:uppercase;font-size:.82rem;font-family:var(--sans)}
.pill{display:inline-flex;align-items:center;gap:7px;padding:6px 13px;border-radius:999px;font-weight:700;font-size:.82rem}
.pill-sky{background:var(--sky-soft);color:var(--royal)}
.pill-mint{background:var(--mint-soft);color:var(--mint-ink)}
.pill-yellow{background:var(--yellow-soft);color:#9a6d00}
.pill-lav{background:var(--lav-soft);color:var(--lav)}
.pill-rose{background:var(--rose-soft);color:var(--rose-ink)}
.pill-coral{background:var(--coral-soft);color:#c1471f}

/* ---------- Hero ---------- */
.hero{padding:44px 0 20px}
.hero-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:44px;align-items:center}
.hero h1 span{background:linear-gradient(120deg,var(--royal),var(--sky));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .lead{font-size:1.18rem;color:var(--muted);max-width:33em;margin:14px 0 26px}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap}
.hero-stats{display:flex;gap:26px;margin-top:30px;flex-wrap:wrap}
.hero-stats .s b{font-family:var(--sans);font-size:1.7rem;color:var(--royal);display:block}
.hero-stats .s span{color:var(--muted);font-size:.9rem}
.hero-art{position:relative}

/* feature + generic grids */
.grid{display:grid;gap:22px}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.feature{padding:26px;border-radius:var(--radius)}
.feature .ico{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;margin-bottom:14px}
.feature h3{margin-bottom:6px}
.feature p{color:var(--muted);margin:0;font-size:.98rem}
.tint-sky{background:var(--sky-soft)} .tint-mint{background:var(--mint-soft)}
.tint-lav{background:var(--lav-soft)} .tint-yellow{background:var(--yellow-soft)}
.tint-coral{background:var(--coral-soft)} .tint-rose{background:var(--rose-soft)}

.center{text-align:center}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.mode-card{padding:30px;border-radius:var(--radius)}
.mode-card ul{margin:14px 0 0;padding-left:0;list-style:none}
.mode-card li{padding:7px 0 7px 30px;position:relative;color:var(--ink)}
.mode-card li:before{content:"✓";position:absolute;left:0;top:6px;width:20px;height:20px;border-radius:50%;background:var(--mint);color:#fff;font-size:.72rem;display:grid;place-items:center;font-weight:800}

/* roadmap */
.roadmap{display:grid;gap:16px}
.road-row{display:grid;grid-template-columns:64px 1fr auto;gap:18px;align-items:center;padding:18px 22px;border-radius:16px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow)}
.road-num{width:52px;height:52px;border-radius:14px;display:grid;place-items:center;color:#fff;font-family:var(--sans);font-weight:800;font-size:1.3rem}
.road-row h4{margin:0}
.road-row p{margin:2px 0 0;color:var(--muted);font-size:.92rem}

/* who / audience chips */
.aud{display:flex;flex-wrap:wrap;gap:12px}
.aud .chip{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 18px;display:flex;gap:11px;align-items:center;box-shadow:var(--shadow);font-weight:600}
.chip .dot{width:11px;height:11px;border-radius:50%}

/* testimonials */
.quote{padding:26px;border-radius:var(--radius);background:#fff;border:1px solid var(--line);box-shadow:var(--shadow)}
.quote .ph{font-size:.72rem;font-weight:800;letter-spacing:.06em;color:var(--faint);text-transform:uppercase}
.quote p{font-size:1.03rem}
.quote .who{display:flex;align-items:center;gap:12px;margin-top:14px}
.quote .av{width:42px;height:42px;border-radius:50%;background:var(--bg-2);display:grid;place-items:center;font-weight:800;color:var(--royal)}

/* FAQ */
.faq details{background:#fff;border:1px solid var(--line);border-radius:14px;padding:4px 22px;margin-bottom:12px;box-shadow:var(--shadow)}
.faq summary{cursor:pointer;font-weight:700;font-family:var(--sans);padding:16px 0;list-style:none;display:flex;justify-content:space-between;align-items:center}
.faq summary::-webkit-details-marker{display:none}
.faq summary:after{content:"+";font-size:1.5rem;color:var(--sky);font-weight:400}
.faq details[open] summary:after{content:"–"}
.faq details p{margin:0 0 16px;color:var(--muted)}

/* footer */
.footer{background:var(--royal-deep);color:#cfe0ff;padding:44px 0 30px;margin-top:40px}
.footer .wrap{display:grid;grid-template-columns:1.4fr 1fr;gap:30px;align-items:start}
.footer .logo{box-shadow:none}
.footer h4{color:#fff}
.footer .credit{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:14px;padding:16px 18px}
.footer small{color:#9db6e6;display:block;margin-top:18px;font-size:.82rem;line-height:1.7}

/* ---------- Dashboard ---------- */
.page{padding:34px 0 60px;min-height:60vh}
.page-head{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;flex-wrap:wrap;margin-bottom:26px}
.page-head p{color:var(--muted);margin:6px 0 0}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:14px}
.stat{padding:20px;border-radius:16px;background:#fff;border:1px solid var(--line);box-shadow:var(--shadow)}
.stat .lab{color:var(--muted);font-size:.85rem;font-weight:600}
.stat .val{font-family:var(--sans);font-size:1.9rem;font-weight:700;color:var(--ink);margin-top:3px}
.stat .val.sky{color:var(--royal)} .stat .val.mint{color:var(--mint-ink)} .stat .val.coral{color:var(--coral)}

.ring{--p:0;width:74px;height:74px;border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--mint) calc(var(--p)*1%), var(--bg-2) 0);flex:none}
.ring i{width:56px;height:56px;border-radius:50%;background:#fff;display:grid;place-items:center;font-family:var(--sans);font-weight:800;font-style:normal;color:var(--ink);font-size:.95rem}

.set-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.set-card{padding:22px;border-radius:var(--radius);background:#fff;border:1px solid var(--line);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden}
.set-card:before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--c,var(--sky))}
.set-card .top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.set-card h3{margin:0}
.set-card .sub{color:var(--muted);font-size:.9rem;margin:3px 0 0}
.set-badge{font-size:.74rem;font-weight:800;padding:5px 11px;border-radius:999px;white-space:nowrap}
.st-notstarted{background:var(--bg-2);color:var(--muted)}
.st-inprogress{background:var(--yellow-soft);color:#9a6d00}
.st-completed{background:var(--mint-soft);color:var(--mint-ink)}
.set-card .meta{display:flex;gap:14px;color:var(--faint);font-size:.85rem;flex-wrap:wrap}
.set-card .score-big{font-family:var(--sans);font-weight:800;font-size:1.5rem}
.set-card .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:auto}

.mastery{display:grid;gap:12px}
.bar-row{display:grid;grid-template-columns:130px 1fr 44px;gap:12px;align-items:center;font-size:.92rem}
.bar{height:12px;border-radius:999px;background:var(--bg-2);overflow:hidden}
.bar i{display:block;height:100%;border-radius:999px;transition:width .6s ease}
.badge-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.badge{padding:18px;border-radius:16px;text-align:center;border:1px solid var(--line);background:#fff;box-shadow:var(--shadow)}
.badge.locked{opacity:.45;filter:grayscale(.4)}
.badge .em{font-size:1.9rem}
.badge b{display:block;font-family:var(--sans);font-size:.92rem;margin-top:6px}
.badge span{font-size:.76rem;color:var(--muted)}

/* ---------- Intro ---------- */
.intro-card{max-width:760px;margin:0 auto;padding:34px}
.intro-card .skills{display:flex;flex-wrap:wrap;gap:9px;margin:16px 0}
.info-row{display:flex;gap:26px;flex-wrap:wrap;margin:20px 0;padding:18px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.info-row .i b{display:block;font-family:var(--sans);font-size:1.25rem;color:var(--royal)}
.info-row .i span{color:var(--muted);font-size:.85rem}
.toggle{display:inline-flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.switch{width:46px;height:26px;border-radius:999px;background:var(--bg-2);position:relative;transition:.2s}
.switch i{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.2);transition:.2s}
.toggle.on .switch{background:var(--mint)} .toggle.on .switch i{left:23px}

/* ---------- Quiz ---------- */
.quiz-top{position:sticky;top:66px;z-index:30;background:rgba(246,249,255,.94);backdrop-filter:blur(8px);padding:12px 0;border-bottom:1px solid var(--line)}
.quiz-top .wrap{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.progress{flex:1;min-width:160px;height:12px;border-radius:999px;background:var(--bg-2);overflow:hidden}
.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--sky),var(--mint));border-radius:999px;transition:width .4s}
.timer{font-family:var(--sans);font-weight:800;background:#fff;border:1px solid var(--line);padding:8px 15px;border-radius:12px;color:var(--royal)}
.timer.warn{color:var(--rose-ink);background:var(--rose-soft);border-color:var(--rose-soft)}
.qcount{font-weight:700;color:var(--muted);white-space:nowrap}

.quiz-main{display:grid;grid-template-columns:1fr;gap:22px;margin-top:24px}
.quiz-main.reading{grid-template-columns:1fr 1fr}
.passage{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px;align-self:start;position:sticky;top:150px;max-height:calc(100vh - 175px);overflow:auto}
.passage h3{color:var(--royal)}
.passage p{white-space:pre-line;color:#33405f}
.qcard{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:28px}
.qcard .labels{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.qtext{font-family:var(--sans);font-size:1.35rem;font-weight:600;line-height:1.45;white-space:pre-line;margin-bottom:20px}
.opts{display:grid;gap:12px}
.opt{display:flex;gap:14px;align-items:center;text-align:left;width:100%;background:#fff;border:2px solid var(--line);border-radius:14px;padding:15px 17px;cursor:pointer;font-size:1.06rem;transition:.12s;font-family:var(--body);color:var(--ink)}
.opt:hover{border-color:var(--sky);background:var(--sky-soft)}
.opt .key{width:32px;height:32px;flex:none;border-radius:9px;background:var(--bg-2);display:grid;place-items:center;font-weight:800;font-family:var(--sans);color:var(--muted);transition:.12s}
.opt.selected{border-color:var(--royal);background:var(--sky-soft)}
.opt.selected .key{background:var(--royal);color:#fff}
.opt.correct{border-color:var(--mint);background:var(--mint-soft)}
.opt.correct .key{background:var(--mint);color:#fff}
.opt.wrong{border-color:var(--rose);background:var(--rose-soft)}
.opt.wrong .key{background:var(--rose);color:#fff}
.opt.disabled{cursor:default;pointer-events:none}
.opt.dim{opacity:.6}

/* feedback box */
.feedback{margin-top:20px;border-radius:16px;padding:20px;border:1px solid;animation:pop .2s ease}
@keyframes pop{from{transform:scale(.98);opacity:0}to{transform:scale(1);opacity:1}}
.feedback.ok{background:var(--mint-soft);border-color:#b8ecd4}
.feedback.no{background:var(--rose-soft);border-color:#ffcdd6}
.feedback h4{font-family:var(--sans);margin:0 0 8px;display:flex;align-items:center;gap:9px}
.feedback.ok h4{color:var(--mint-ink)} .feedback.no h4{color:var(--rose-ink)}
.feedback .thai{color:#33405f;margin:8px 0}
.feedback .tip{background:rgba(255,255,255,.7);border-radius:11px;padding:11px 14px;margin-top:10px;font-size:.94rem}
.feedback .skill-tag{font-size:.8rem;color:var(--muted);font-weight:700}

.quiz-actions{display:flex;justify-content:space-between;gap:12px;margin-top:22px;flex-wrap:wrap}
.quiz-actions .left,.quiz-actions .right{display:flex;gap:10px;flex-wrap:wrap}

/* navigator */
.navigator{background:#fff;border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-top:22px}
.navigator h4{margin:0 0 14px}
.nav-legend{display:flex;gap:16px;flex-wrap:wrap;font-size:.82rem;color:var(--muted);margin-bottom:14px}
.nav-legend span{display:inline-flex;align-items:center;gap:6px}
.nav-legend i{width:14px;height:14px;border-radius:5px;display:inline-block}
.nav-dots{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:9px}
.nav-dot{aspect-ratio:1;border-radius:10px;border:2px solid var(--line);background:#fff;font-weight:800;font-family:var(--sans);cursor:pointer;color:var(--muted);position:relative}
.nav-dot.answered{background:var(--sky-soft);border-color:var(--sky);color:var(--royal)}
.nav-dot.current{border-color:var(--royal);box-shadow:0 0 0 3px var(--sky-soft)}
.nav-dot.flagged:after{content:"";position:absolute;top:-4px;right:-4px;width:12px;height:12px;background:var(--coral);border-radius:50%;border:2px solid #fff}

/* ---------- Results ---------- */
.result-hero{text-align:center;padding:40px 26px;border-radius:var(--radius);color:#fff;position:relative;overflow:hidden}
.result-hero h2{color:#fff;font-size:2rem}
.result-score{font-family:var(--sans);font-weight:800;font-size:4rem;line-height:1}
.result-band{font-size:1.2rem;font-weight:700;margin-top:6px}
.result-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin:24px 0}
.mini{padding:16px;border-radius:14px;background:#fff;border:1px solid var(--line);text-align:center;box-shadow:var(--shadow)}
.mini b{display:block;font-family:var(--sans);font-size:1.5rem}
.mini span{font-size:.8rem;color:var(--muted)}
.skill-analysis{display:grid;gap:14px}
.skill-row{display:grid;grid-template-columns:150px 1fr 70px;gap:14px;align-items:center}
.skill-row .nm{font-weight:700}
.result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:26px}

/* ---------- Review ---------- */
.filters{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:20px}
.filters button{border:2px solid var(--line);background:#fff;color:var(--muted);font-weight:700;padding:8px 15px;border-radius:999px;cursor:pointer;font-size:.88rem}
.filters button.active{background:var(--royal);color:#fff;border-color:var(--royal)}
.rev-item{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:22px;margin-bottom:16px;border-left:6px solid var(--line)}
.rev-item.ok{border-left-color:var(--mint)} .rev-item.no{border-left-color:var(--rose)} .rev-item.skip{border-left-color:var(--yellow)}
.rev-item .qn{font-weight:800;font-family:var(--sans);color:var(--muted);font-size:.85rem;margin-bottom:6px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.rev-item .qq{font-weight:600;font-family:var(--sans);white-space:pre-line;margin-bottom:12px;font-size:1.08rem}
.rev-line{display:flex;gap:10px;padding:5px 0;font-size:.98rem}
.rev-line .k{color:var(--muted);min-width:130px;font-weight:600}
.rev-line .ansno{color:var(--rose-ink);font-weight:700} .rev-line .ansok{color:var(--mint-ink);font-weight:700}

.review-topic{display:inline-block;margin-top:10px;background:var(--rose-soft);color:var(--rose-ink);font-weight:700;font-size:.82rem;padding:5px 12px;border-radius:999px}

/* ---------- Teacher mode ---------- */
.teacher{background:linear-gradient(160deg,#16205a,#243aa0);color:#fff;min-height:100vh;position:fixed;inset:0;z-index:200;overflow:auto;padding:26px}
.teacher .t-top{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;max-width:1100px;margin:0 auto 10px}
.teacher .t-pill{background:rgba(255,255,255,.15);padding:7px 15px;border-radius:999px;font-weight:700}
.teacher .t-stage{max-width:1100px;margin:0 auto;padding:30px 0}
.teacher .t-labels{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.teacher .t-q{font-family:var(--sans);font-weight:700;font-size:clamp(1.8rem,3.6vw,2.8rem);line-height:1.3;white-space:pre-line;margin-bottom:30px}
.teacher .t-opts{display:grid;gap:16px}
.teacher .t-opt{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.22);border-radius:16px;padding:20px 24px;font-size:clamp(1.2rem,2.2vw,1.7rem);display:flex;gap:16px;align-items:center}
.teacher .t-opt .key{width:44px;height:44px;flex:none;border-radius:11px;background:rgba(255,255,255,.2);display:grid;place-items:center;font-weight:800}
.teacher .t-opt.correct{background:rgba(65,196,140,.3);border-color:var(--mint)}
.teacher .t-passage{background:rgba(255,255,255,.1);border-radius:16px;padding:22px;white-space:pre-line;font-size:1.15rem;margin-bottom:24px;max-height:40vh;overflow:auto}
.teacher .t-expl{background:rgba(255,201,60,.18);border:1px solid rgba(255,201,60,.4);border-radius:16px;padding:20px 24px;font-size:clamp(1.05rem,1.9vw,1.35rem);margin-top:22px}
.teacher .t-controls{position:sticky;bottom:0;background:rgba(16,24,66,.9);backdrop-filter:blur(6px);padding:16px;border-radius:16px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:1100px;margin:20px auto 0}
.teacher .t-btn{background:rgba(255,255,255,.16);color:#fff;border:0;padding:14px 22px;border-radius:12px;font-weight:700;cursor:pointer;font-family:var(--sans);font-size:1.05rem}
.teacher .t-btn:hover{background:rgba(255,255,255,.28)}
.teacher .t-btn.primary{background:var(--yellow);color:#4a3600}
.teacher .t-discuss{background:rgba(255,255,255,.12);border-left:4px solid var(--yellow);border-radius:12px;padding:16px 20px;margin-top:20px;font-size:1.15rem}

/* ---------- Study tips ---------- */
.tips-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.tip-card{padding:24px;border-radius:var(--radius);background:#fff;border:1px solid var(--line);box-shadow:var(--shadow)}
.tip-card .n{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-family:var(--sans);font-weight:800;color:#fff;margin-bottom:12px}
.tip-card h3{font-size:1.12rem;margin-bottom:8px}
.tip-card p{color:var(--muted);font-size:.95rem;margin:0}
.tip-card .thai{color:#3a476a;margin-top:8px;font-size:.95rem}

/* ---------- toast / confetti / modal ---------- */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:14px 22px;border-radius:14px;box-shadow:var(--shadow-lg);z-index:300;font-weight:600;display:flex;gap:10px;align-items:center;animation:slideup .3s ease}
@keyframes slideup{from{transform:translate(-50%,20px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
.modal-bg{position:fixed;inset:0;background:rgba(20,28,58,.55);z-index:250;display:grid;place-items:center;padding:20px;animation:pop .2s}
.modal{background:#fff;border-radius:var(--radius);max-width:440px;width:100%;padding:28px;box-shadow:var(--shadow-lg);text-align:center}
.modal h3{margin-bottom:8px}
.modal p{color:var(--muted)}
.modal .row{display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:400}

const PASSAGES={"set1-r1":{"title":"The Robotics Club","text":"Every Friday afternoon, the students at Green Valley School rush to Room 204 for their favourite activity: the Robotics Club. The club started three years ago with only six members, but today more than forty students take part. Members work in small teams to design, build, and program simple robots. Some robots can follow a black line on the floor, while others can pick up small objects and drop them into a box.\n\nThe club is led by Mr. Anan, a science teacher who believes that learning should be fun. \"When students build something with their own hands, they remember it far better than when they only read about it,\" he says. Last month, three teams entered a regional competition. Although none of them won first prize, every member agreed that they had learned a great deal about teamwork and problem-solving. The club now plans to teach younger students the basics of coding after the school holidays."},"set2-r1":{"title":"Learning Through Podcasts","text":"A podcast is a kind of audio programme that people can listen to on their phones or computers. In the past few years, podcasts have become a popular way for students to learn outside the classroom. Unlike videos, podcasts do not need a screen, so learners can listen while they are walking, cooking, or travelling to school.\n\nAt Sunrise School, a group of Grade 8 students started their own English podcast called \"Ten-Minute English.\" In each episode, they discuss one useful topic, such as common mistakes, interview tips, or new expressions. The episodes are short on purpose. \"We keep them under ten minutes because busy students are more likely to finish something short,\" explained Ploy, one of the hosts.\n\nThe podcast has surprised its creators. It now has listeners not only in their own school but also in other provinces. The team believes their success comes from one simple idea: making learning feel like a friendly conversation rather than a strict lesson. They plan to invite a guest teacher for their next season."},"set3-r1":{"title":"The School Garden Project","text":"Two years ago, the land behind Baan Suan School was an empty, dusty field that no one used. Today, it is a green garden full of vegetables, herbs, and even a small pond. The change did not happen by accident. It was the result of a project started by a group of students who wanted to make their school healthier and more beautiful.\n\nAt first, the students faced many problems. The soil was poor, and few people believed the garden would survive. However, the team did not give up. They asked local farmers for advice, collected food waste from the canteen to make natural fertiliser, and built a simple system to catch rainwater. Slowly, the plants began to grow.\n\nThe garden now provides fresh vegetables for the school lunch programme, which means the school spends less money on food. More importantly, students have learned valuable lessons that cannot be taught from a book. They have discovered that patience, teamwork, and careful planning can turn even a hopeless piece of land into something useful. The project has become a source of pride for the whole community, and several nearby schools have asked to visit and learn from it."},"set4-r1":{"title":"Thinking Before You Share","text":"Every day, millions of people share photos, opinions, and videos on social media. Sharing can be a wonderful thing. It allows us to stay in touch with friends, support good causes, and learn about the world. However, what many young users forget is that anything posted online can be difficult, or even impossible, to remove.\n\nImagine a student who writes an angry message after a bad day. In a few seconds, the message can be seen, copied, and shared by hundreds of people. Even if the student deletes it later, someone may already have saved a screenshot. Years later, that single careless post could affect how others see them, or even influence a school's decision about them.\n\nExperts suggest a simple habit called \"pause before you post.\" Before sharing anything, users should ask themselves three questions: Is it true? Is it kind? Would I be comfortable if my teacher or parents saw it? This short pause may seem unnecessary, but it can prevent serious mistakes. Being thoughtful online does not mean being silent. It means understanding that our digital actions, just like our actions in real life, have real consequences that can last far longer than we expect."},"set5-r1":{"title":"The Boy Who Lit a Village","text":"When William was a teenager, his village in a small country faced a terrible year. The crops failed, and his family could no longer afford to send him to school. Instead of giving up, William spent his days in the small local library, where he found old science books written in a language he could barely read. Slowly, using pictures and a dictionary, he taught himself how electricity and windmills worked.\n\nWilliam had a bold idea: if he could build a windmill, he could produce electricity for his family's home. Many people in the village laughed at him. They watched a thin boy searching through a rubbish yard, collecting a broken bicycle, plastic pipes, and rusty metal. What they did not understand was that he was gathering the exact parts he needed.\n\nAfter months of failure and repair, the windmill finally turned, and a single light bulb glowed in his home. The laughter stopped. Soon, William built more windmills to pump water and power lights for his neighbours. His story spread far beyond his village, and he was later invited to speak to audiences around the world.\n\nWilliam's success did not come from expensive tools or a famous school. It came from curiosity, determination, and the belief that a lack of resources is not the same as a lack of ideas. His life reminds us that great things often begin with a single, stubborn question: \"What if I tried?\""},"set6-r1":{"title":"The Science of a Good Night's Sleep","text":"Many students believe that staying up late to study is a sign of hard work. In reality, scientists have found that sleep is one of the most important tools for learning. While we sleep, the brain does not simply switch off. Instead, it becomes surprisingly busy, sorting through everything we experienced during the day and deciding what to keep and what to forget.\n\nDuring deep sleep, the brain strengthens the connections that store new information. This is why a student who sleeps well after studying often remembers more than one who studies for the same number of hours but sleeps very little. In one experiment, two groups learned the same list of words. The group that slept for eight hours remembered far more the next morning than the group that stayed awake.\n\nSleep also affects mood, attention, and the ability to solve problems. A tired brain finds it harder to focus and is more likely to make careless mistakes. Some students who complain that they \"can't concentrate\" are not lazy at all; they are simply exhausted.\n\nThe lesson is clear. Sleep is not wasted time or a reward for finishing work. It is an active part of the learning process itself. Students who protect their sleep are, in a very real sense, studying even while their eyes are closed."},"set7-r1":{"title":"The Return of the Repair Café","text":"In a world where broken items are often thrown away and quickly replaced, a quiet movement is encouraging people to do something unusual: fix things instead. It is called the \"repair café.\" At these events, usually held in community halls or libraries, volunteers with useful skills help members of the public mend broken objects for free. A torn jacket, a wobbly chair, a toaster that no longer works, a bicycle with a flat tyre: all of these can often be brought back to life.\n\nThe idea began in the Netherlands and has since spread to thousands of towns across the world. Its appeal is easy to understand. Repairing an object costs far less than buying a new one, and it keeps waste out of landfills. Yet organisers insist that the true value of a repair café goes beyond saving money or protecting the environment.\n\nWhat matters just as much, they argue, is what happens between people. A repair café brings neighbours together, allows older generations to pass on practical skills that might otherwise be forgotten, and reminds everyone that many problems can be solved with patience rather than a purchase. Visitors often arrive as strangers and leave as friends.\n\nOf course, not everything can be fixed, and volunteers are careful not to make promises they cannot keep. Still, supporters believe the movement teaches a lesson our throwaway culture badly needs: that repairing what we already have is often wiser than endlessly replacing it."}};

aratives","difficulty":"foundation","question":"This year's science project is much ______ than last year's.","options":["more good","gooder","best","better"],"correctAnswer":3,"explanationThai":"good เป็นคำที่เปลี่ยนรูปพิเศษ: good – better – best ใช้ better ในการเปรียบเทียบสองสิ่ง","wrongAnswerExplanationsThai":["ไม่ใช้ more กับ good","“gooder” ไม่มีในภาษาอังกฤษ","“best” เป็นขั้นสูงสุด ต้องมี the และเปรียบเทียบตั้งแต่ 3 สิ่งขึ้นไป",""],"tipThai":"มี than อยู่ในประโยค แปลว่าเป็นการเปรียบเทียบขั้นกว่า (comparative)","passageId":null},{"id":"set1-q5","setId":1,"section":"grammar","skill":"past simple","difficulty":"foundation","question":"We ______ our grandparents in Chiang Mai during the last school holiday.","options":["visit","visited","have visited","were visiting"],"correctAnswer":1,"explanationThai":"“during the last school holiday” เป็นเวลาที่จบไปแล้วในอดีต จึงใช้ Past Simple: visited","wrongAnswerExplanationsThai":["“visit” เป็นปัจจุบัน ไม่เข้ากับเหตุการณ์ที่จบแล้ว","","Present Perfect ไม่ใช้กับเวลาในอดีตที่ระบุชัดเจน","Past Continuous เน้นการกำลังทำ ณ ช่วงหนึ่ง แต่ประโยคนี้เป็นเหตุการณ์ที่เกิดและจบ"],"tipThai":"มีคำบอกเวลาในอดีตที่ชัดเจน (last, ago, yesterday) ให้ใช้ Past Simple","passageId":null},{"id":"set1-q6","setId":1,"section":"grammar","skill":"modal verbs (advice)","difficulty":"foundation","question":"You look really tired. You ______ go to bed earlier tonight.","options":["should","must not","can't","would rather"],"correctAnswer":0,"explanationThai":"should ใช้ให้คำแนะนำอย่างสุภาพว่า “ควรจะ”","wrongAnswerExplanationsThai":["","“must not” = ห้าม ซึ่งขัดกับความหมายที่ต้องการแนะนำ","“can't” = ทำไม่ได้ ไม่เข้ากับบริบท","“would rather” = ชอบมากกว่า ต้องตามด้วยรูปกริยาช่องหนึ่งและความหมายต่างออกไป"],"tipThai":"ให้คำแนะนำ = should / ought to; ห้าม = must not","passageId":null},{"id":"set1-q7","setId":1,"section":"grammar","skill":"conjunctions","difficulty":"foundation","question":"I wanted to join the football team, ______ I was too busy with my music lessons.","options":["so","because","but","or"],"correctAnswer":2,"explanationThai":"สองความคิดขัดแย้งกัน (อยากเข้าทีม แต่ไม่ว่าง) จึงใช้ but เพื่อแสดงความขัดแย้ง","wrongAnswerExplanationsThai":["“so” แสดงผลลัพธ์ ไม่ใช่ความขัดแย้ง","“because” บอกเหตุผล ทำให้ความหมายผิด","","“or” ใช้ให้เลือก ไม่เข้ากับบริบท"],"tipThai":"อยาก...แต่ทำไม่ได้ → ใช้ but เชื่อมความขัดแย้ง","passageId":null},{"id":"set1-q8","setId":1,"section":"grammar","skill":"articles","difficulty":"foundation","question":"My sister wants to be ______ engineer when she grows up.","options":["a","the","some","an"],"correctAnswer":3,"explanationThai":"engineer ขึ้นต้นด้วยเสียงสระ (e) จึงใช้ an","wrongAnswerExplanationsThai":["ใช้ a กับคำที่ขึ้นต้นด้วยเสียงพยัญชนะ","the ใช้ชี้เฉพาะ แต่ในที่นี้พูดถึงอาชีพทั่วไป","some ใช้กับพหูพจน์หรือคำนามนับไม่ได้",""],"tipThai":"ดูที่ “เสียง” ไม่ใช่ตัวอักษร: an hour, a university","passageId":null},{"id":"set1-q9","setId":1,"section":"vocabulary","skill":"vocabulary in context","difficulty":"foundation","question":"The instructions were very ______, so everyone finished the task without any confusion.","options":["boring","difficult","clear","secret"],"correctAnswer":2,"explanationThai":"“ทำเสร็จโดยไม่สับสน” แสดงว่าคำสั่งนั้นชัดเจน จึงตอบ clear","wrongAnswerExplanationsThai":["“boring” = น่าเบื่อ ไม่เกี่ยวกับความสับสน","“difficult” = ยาก ซึ่งขัดกับ “ไม่มีความสับสน”","","“secret” = ลับ ไม่เข้ากับบริบท"],"tipThai":"อ่านผลลัพธ์ในประโยคเพื่อเดาความหมายของคำที่ขาดหาย","passageId":null},{"id":"set1-q10","setId":1,"section":"vocabulary","skill":"phrasal verbs","difficulty":"foundation","question":"Please ______ your phone during the exam; you may not use it.","options":["turn off","turn up","turn into","turn over"],"correctAnswer":0,"explanationThai":"turn off = ปิดเครื่อง เข้ากับบริบทห้ามใช้โทรศัพท์","wrongAnswerExplanationsThai":["","“turn up” = เพิ่มเสียง/มาถึง","“turn into” = เปลี่ยนเป็น","“turn over” = พลิกกลับด้าน"],"tipThai":"จำ phrasal verb เป็นชุด: turn on/off, turn up/down","passageId":null},{"id":"set1-q11","setId":1,"section":"vocabulary","skill":"collocations","difficulty":"foundation","question":"If you want to improve, you must ______ mistakes and learn from them.","options":["do","get","take","make"],"correctAnswer":3,"explanationThai":"คำที่ไปกับ mistakes คือ make: make a mistake","wrongAnswerExplanationsThai":["“do a mistake” ไม่ใช่คำที่เจ้าของภาษาใช้","“get a mistake” ไม่ถูกต้อง","“take a mistake” ไม่ใช่ collocation",""],"tipThai":"จำคู่คำ: make a mistake, do homework, take a photo","passageId":null},{"id":"set1-q12","setId":1,"section":"vocabulary","skill":"synonyms","difficulty":"foundation","question":"The teacher was pleased with our project. The word \"pleased\" is closest in meaning to ______.","options":["worried","happy","bored","angry"],"correctAnswer":1,"explanationThai":"pleased มีความหมายใกล้เคียงกับ happy (พอใจ/ดีใจ)","wrongAnswerExplanationsThai":["“worried” = กังวล ตรงข้ามกับพอใจ","","“bored” = เบื่อ ไม่ใช่ความหมายเดียวกัน","“angry” = โกรธ ตรงข้ามกับ pleased"],"tipThai":"หาคำที่ความรู้สึกเป็นบวกเหมือนกันเมื่อโจทย์ให้คำเชิงบวก","passageId":null},{"id":"set1-q13","setId":1,"section":"vocabulary","skill":"word families","difficulty":"foundation","question":"Our science teacher gave a very clear ______ of how volcanoes form.","options":["explanation","explain","explained","explaining"],"correctAnswer":0,"explanationThai":"หลัง a very clear ต้องการคำนาม จึงใช้ explanation","wrongAnswerExplanationsThai":["","“explain” เป็นกริยา ไม่ใช่คำนาม","“explained” เป็นกริยาช่องสอง/สาม","“explaining” เป็นรูป -ing ในที่นี้ต้องการคำนามที่นำหน้าด้วย a"],"tipThai":"หลัง article + adjective มักตามด้วยคำนาม (a clear explanation)","passageId":null},{"id":"set1-q14","setId":1,"section":"conversation","skill":"making suggestions","difficulty":"foundation","question":"A: We have two hours before the movie. What should we do?\nB: ______","options":["I'm watching a movie now.","Why don't we get something to eat?","You must not be late.","That's how it works."],"correctAnswer":1,"explanationThai":"“Why don't we...?” เป็นการเสนอแนะกิจกรรมอย่างเป็นธรรมชาติ เข้ากับคำถาม What should we do?","wrongAnswerExplanationsThai":["ไม่ตอบคำถาม และขัดกับข้อเท็จจริงว่ายังไม่ถึงเวลาหนัง","","เป็นคำสั่ง/ตักเตือน ไม่ใช่การเสนอแนะ","เป็นวลีลอย ไม่ตอบคำถาม"],"tipThai":"เสนอไอเดีย ใช้ Why don't we...? / How about...? / Let's...","passageId":null},{"id":"set1-q15","setId":1,"section":"conversation","skill":"asking permission","difficulty":"foundation","question":"Student to teacher: \"______ open the window? It's very hot in here.\"","options":["Do I open","I open","You should open","May I"],"correctAnswer":3,"explanationThai":"“May I...?” เป็นการขออนุญาตอย่างสุภาพ เหมาะกับการพูดกับครู","wrongAnswerExplanationsThai":["“Do I open?” ผิดหลักการขออนุญาต","“I open?” ไม่ใช่รูปคำถามขออนุญาต","“You should open” เป็นการแนะนำผู้อื่น ไม่ใช่การขออนุญาตให้ตนเอง",""],"tipThai":"ขออนุญาตอย่างสุภาพ: May I...? / Could I...? / Would it be OK if...?","passageId":null},{"id":"set1-q16","setId":1,"section":"conversation","skill":"agreeing","difficulty":"foundation","question":"A: I think reading every day really helps our English.\nB: ______","options":["No, thank you.","I'm afraid I can't.","You're absolutely right.","Never mind."],"correctAnswer":2,"explanationThai":"“You're absolutely right.” เป็นการเห็นด้วยอย่างชัดเจน เข้ากับการแสดงความคิดเห็น","wrongAnswerExplanationsThai":["เป็นการปฏิเสธคำเชิญ ไม่ใช่การเห็นด้วย","แสดงว่าทำไม่ได้ ไม่เกี่ยวกับการเห็นด้วย","","ใช้ปลอบเมื่อมีปัญหา ไม่ใช่การตอบความเห็น"],"tipThai":"เห็นด้วย: You're right / I agree / Exactly / That's true","passageId":null},{"id":"set1-q17","setId":1,"section":"conversation","skill":"responding to problems","difficulty":"foundation","question":"A: I'm sorry, I forgot to bring the book you lent me.\nB: ______","options":["That's OK. You can bring it tomorrow.","You're welcome.","Congratulations!","Here you are."],"correctAnswer":0,"explanationThai":"เมื่อมีคนขอโทษเรื่องเล็กน้อย การตอบว่า That's OK แสดงความเข้าใจอย่างสุภาพ","wrongAnswerExplanationsThai":["","ใช้ตอบเมื่อมีคนขอบคุณ ไม่ใช่ขอโทษ","ใช้แสดงยินดี ไม่เข้ากับบริบท","ใช้เมื่อยื่นของให้ ไม่เข้ากับสถานการณ์"],"tipThai":"ตอบรับคำขอโทษ: That's OK / No problem / Don't worry about it","passageId":null},{"id":"set1-q18","setId":1,"section":"cloze","skill":"linking words","difficulty":"foundation","question":"Cloze: \"I like both subjects. ______, if I had to choose, I would pick English.\"","options":["Because","For example","However","Therefore"],"correctAnswer":2,"explanationThai":"ประโยคหลังแสดงความขัดแย้งเล็กน้อยกับประโยคแรก จึงใช้ However","wrongAnswerExplanationsThai":["“Because” บอกเหตุผล ไม่เข้ากับความขัดแย้ง","“For example” ใช้ยกตัวอย่าง","","“Therefore” บอกผลลัพธ์ ไม่ใช่ความขัดแย้ง"],"tipThai":"However = แต่อย่างไรก็ตาม ใช้เชื่อมความขัดแย้งระหว่างสองประโยค","passageId":null},{"id":"set1-q19","setId":1,"section":"cloze","skill":"sentence completion","difficulty":"foundation","question":"Complete the sentence: \"If you water the plants regularly, they ______ healthy.\"","options":["stayed","will stay","have stayed","staying"],"correctAnswer":1,"explanationThai":"เป็นเงื่อนไขแบบที่ 1 (First Conditional): If + present simple, ... will + verb","wrongAnswerExplanationsThai":["“stayed” เป็นอดีต ไม่เข้ากับเงื่อนไขที่เป็นจริงในอนาคต","","Present Perfect ไม่เข้ากับโครงสร้างเงื่อนไขนี้","“staying” ไม่ใช่กริยาแท้"],"tipThai":"If + present, will + verb ใช้พูดถึงสิ่งที่น่าจะเกิดในอนาคต","passageId":null},{"id":"set1-q20","setId":1,"section":"cloze","skill":"error identification","difficulty":"foundation","question":"Find the error: \"My brother (A) don't (B) like waking up (C) early on weekends. (D)\"","options":["A","B","C","D"],"correctAnswer":1,"explanationThai":"ประธาน My brother เป็นเอกพจน์บุรุษที่ 3 ต้องใช้ doesn't ไม่ใช่ don't ดังนั้นผิดที่ (B)","wrongAnswerExplanationsThai":["(A) My brother เป็นประธานที่ถูกต้อง","","(C) waking up ถูกต้องหลัง like","(D) early on weekends ถูกต้อง"],"tipThai":"ประธานเอกพจน์บุรุษที่ 3 (he/she/it) ใช้ doesn't","passageId":null},{"id":"set1-q21","setId":1,"section":"reading","skill":"supporting detail","difficulty":"foundation","question":"How many students take part in the Robotics Club today?","options":["More than forty","Only six","Exactly twenty","About one hundred"],"correctAnswer":0,"explanationThai":"ในเรื่องระบุว่า “today more than forty students take part” จึงตอบ more than forty","wrongAnswerExplanationsThai":["","six คือจำนวนสมาชิกตอนเริ่มก่อตั้ง ไม่ใช่ปัจจุบัน","ไม่มีการกล่าวถึงตัวเลข 20","ไม่มีการกล่าวถึงตัวเลข 100"],"tipThai":"หาคำสำคัญ (today) แล้วกลับไปอ่านประโยคที่มีคำนั้นในเรื่อง","passageId":"set1-r1"},{"id":"set1-q22","setId":1,"section":"reading","skill":"vocabulary in context","difficulty":"foundation","question":"In the passage, the word \"take part\" is closest in meaning to ______.","options":["pay money","stay away","join in","give up"],"correctAnswer":2,"explanationThai":"take part หมายถึง เข้าร่วม จึงใกล้เคียงกับ join in","wrongAnswerExplanationsThai":["ไม่เกี่ยวกับการจ่ายเงิน","“stay away” = อยู่ห่าง ตรงข้ามกับเข้าร่วม","","“give up” = ยอมแพ้ ไม่ใช่ความหมายเดียวกัน"],"tipThai":"อ่านทั้งประโยคเพื่อเดาว่า take part ทำหน้าที่อะไรในบริบท","passageId":"set1-r1"},{"id":"set1-q23","setId":1,"section":"reading","skill":"detail","difficulty":"foundation","question":"Why does Mr. Anan think building robots is useful?","options":["Because it wins many prizes","Because students remember things better when they build them","Because it is cheaper than books","Because it needs no teamwork"],"correctAnswer":1,"explanationThai":"Mr. Anan กล่าวว่าเมื่อนักเรียนสร้างสิ่งของด้วยมือตนเอง จะจดจำได้ดีกว่าการอ่านเพียงอย่างเดียว","wrongAnswerExplanationsThai":["เรื่องระบุว่าไม่มีทีมใดได้รางวัลที่หนึ่ง","","ไม่มีการเปรียบเทียบเรื่องราคา","ตรงข้าม เรื่องเน้นว่าได้เรียนรู้เรื่องการทำงานเป็นทีม"],"tipThai":"คำถาม Why ให้หาเหตุผลที่ผู้พูดกล่าวไว้โดยตรง","passageId":"set1-r1"},{"id":"set1-q24","setId":1,"section":"reading","skill":"inference","difficulty":"foundation","question":"What can we conclude about the three teams at the regional competition?","options":["They refused to work together.","They stopped coming to the club.","They thought the competition was a waste of time.","They still gained something valuable even without winning."],"correctAnswer":3,"explanationThai":"แม้ไม่ชนะ แต่สมาชิกทุกคนเห็นตรงกันว่าได้เรียนรู้เรื่องการทำงานเป็นทีมและการแก้ปัญหา แสดงว่าได้สิ่งที่มีค่า","wrongAnswerExplanationsThai":["ตรงข้าม เรื่องเน้นการทำงานเป็นทีม","ไม่มีข้อมูลว่าเลิกมาชมรม","ไม่มีข้อมูลสนับสนุนความคิดนี้",""],"tipThai":"คำถาม conclude/infer ให้ตีความจากหลักฐานในเรื่อง ไม่ใช่หาคำตรง ๆ","passageId":"set1-r1"},{"id":"set1-q25","setId":1,"section":"reading","skill":"best title","difficulty":"foundation","question":"Which is the best title for this passage?","options":["A School Club That Builds Skills and Robots","How to Win a Robot Competition","The History of Green Valley School","Why Science Is Boring"],"correctAnswer":0,"explanationThai":"เรื่องพูดถึงชมรมหุ่นยนต์ที่ช่วยสร้างทั้งทักษะและหุ่นยนต์ ชื่อเรื่องข้อ A ครอบคลุมใจความสำคัญที่สุด","wrongAnswerExplanationsThai":["","เรื่องไม่ได้สอนวิธีชนะการแข่งขัน","ประวัติโรงเรียนเป็นเพียงส่วนเล็ก ไม่ใช่ใจความหลัก","เรื่องแสดงว่าวิทยาศาสตร์สนุก ไม่ใช่ตรงข้าม"],"tipThai":"ชื่อเรื่องที่ดีต้องครอบคลุมทั้งเรื่อง ไม่ใช่แค่รายละเอียดเดียว","passageId":"set1-r1"},{"id":"set2-q1","setId":2,"section":"grammar","skill":"present perfect","difficulty":"intermediate","question":"I ______ my homework already, so I can watch the film now.","options":["finish","was finishing","have finished","finishing"],"correctAnswer":2,"explanationThai":"“already” และผลที่ต่อเนื่องมาถึงปัจจุบัน (สามารถดูหนังได้) ใช้ Present Perfect: have finished","wrongAnswerExplanationsThai":["“finish” เป็นปัจจุบันธรรมดา ไม่แสดงผลถึงปัจจุบัน","Past Continuous เน้นการกำลังทำในอดีต ไม่เข้ากับ already","","“finishing” ไม่ใช่กริยาแท้"],"tipThai":"already / just / yet / ever มักใช้กับ Present Perfect","passageId":null},{"id":"set2-q2","setId":2,"section":"grammar","skill":"relative clauses","difficulty":"intermediate","question":"The student ______ won the speaking contest is my classmate.","options":["who","which","whose","where"],"correctAnswer":0,"explanationThai":"ขยายคน (the student) และทำหน้าที่ประธานของอนุประโยค ใช้ who","wrongAnswerExplanationsThai":["","“which” ใช้กับสิ่งของ/สัตว์ ไม่ใช่คน","“whose” แสดงความเป็นเจ้าของ ต้องตามด้วยคำนาม","“where” ใช้กับสถานที่"],"tipThai":"ขยายคน = who/that, สิ่งของ = which/that, สถานที่ = where","passageId":null},{"id":"set2-q3","setId":2,"section":"grammar","skill":"gerund vs infinitive","difficulty":"intermediate","question":"My parents encouraged me ______ a musical instrument.","options":["learning","learn","to learning","to learn"],"correctAnswer":3,"explanationThai":"encourage someone ตามด้วย to + verb (infinitive) จึงใช้ to learn","wrongAnswerExplanationsThai":["encourage ไม่ตามด้วย gerund ในโครงสร้างนี้","ขาด to หลัง encourage someone","to ต้องตามด้วยกริยาช่องหนึ่ง ไม่ใช่ -ing",""],"tipThai":"จำโครงสร้าง: encourage/want/ask + someone + to + verb","passageId":null},{"id":"set2-q4","setId":2,"section":"grammar","skill":"quantifiers","difficulty":"intermediate","question":"There isn't ______ milk left in the fridge; we need to buy some.","options":["many","much","few","a lot"],"correctAnswer":1,"explanationThai":"milk เป็นคำนามนับไม่ได้ ใช้ much ในประโยคปฏิเสธ","wrongAnswerExplanationsThai":["“many” ใช้กับคำนามนับได้พหูพจน์","","“few” ใช้กับคำนามนับได้ และความหมายไม่เข้ากับโครงสร้างนี้","“a lot” ต้องเป็น a lot of และไม่เข้ากับ isn't ในรูปนี้"],"tipThai":"นับไม่ได้ใช้ much/little, นับได้ใช้ many/few","passageId":null},{"id":"set2-q5","setId":2,"section":"grammar","skill":"past continuous vs past simple","difficulty":"intermediate","question":"While I ______ dinner, the electricity suddenly went off.","options":["cook","have cooked","was cooking","cooked"],"correctAnswer":2,"explanationThai":"เหตุการณ์ที่กำลังดำเนินอยู่ (กำลังทำอาหาร) ถูกขัดจังหวะโดยเหตุการณ์สั้น ใช้ Past Continuous: was cooking","wrongAnswerExplanationsThai":["“cook” เป็นปัจจุบัน ไม่เข้ากับ went off","Present Perfect ไม่เข้ากับเหตุการณ์อดีตที่ถูกขัดจังหวะ","","“cooked” เป็น Past Simple ใช้กับเหตุการณ์สั้น แต่ while ต้องการการกระทำที่กำลังดำเนิน"],"tipThai":"while + Past Continuous, เหตุการณ์แทรกใช้ Past Simple","passageId":null},{"id":"set2-q6","setId":2,"section":"grammar","skill":"pronoun reference","difficulty":"intermediate","question":"Anna and I worked on the poster together. ______ finished it in two hours.","options":["We","Us","Our","They"],"correctAnswer":0,"explanationThai":"ต้องการประธานของประโยค และหมายถึง Anna and I จึงใช้ We","wrongAnswerExplanationsThai":["","“Us” เป็นกรรม ใช้เป็นประธานไม่ได้","“Our” เป็นคำแสดงความเป็นเจ้าของ","“They” หมายถึงคนอื่น ไม่ใช่ Anna and I"],"tipThai":"ประธานของประโยคใช้ I/we/he/she/they ไม่ใช่ me/us/him","passageId":null},{"id":"set2-q7","setId":2,"section":"grammar","skill":"modal verbs (deduction)","difficulty":"intermediate","question":"The lights are on and I can hear music. Someone ______ be at home.","options":["can't","must","shouldn't","needn't"],"correctAnswer":1,"explanationThai":"มีหลักฐานชัดเจน (ไฟเปิด ได้ยินเพลง) จึงสรุปอย่างมั่นใจด้วย must (คงจะ)","wrongAnswerExplanationsThai":["“can't” = เป็นไปไม่ได้ ซึ่งขัดกับหลักฐาน","","“shouldn't” = ไม่ควร ไม่ใช่การสรุป","“needn't” = ไม่จำเป็น ไม่เข้ากับบริบท"],"tipThai":"สรุปอย่างมั่นใจว่าจริง = must; มั่นใจว่าไม่จริง = can't","passageId":null},{"id":"set2-q8","setId":2,"section":"grammar","skill":"comparatives (as...as)","difficulty":"intermediate","question":"This exam wasn't ______ the last one; I found it easier.","options":["as difficult than","more difficult as","so difficult that","as difficult as"],"correctAnswer":3,"explanationThai":"โครงสร้างเปรียบเทียบความเท่ากันในรูปปฏิเสธ: not as + adjective + as","wrongAnswerExplanationsThai":["ผิดเพราะ as...as ไม่ใช้ than","ผิดโครงสร้าง more...as","so...that ใช้แสดงผลลัพธ์ ไม่ใช่การเปรียบเทียบสองสิ่งนี้",""],"tipThai":"เท่ากัน: as + adj + as; มากกว่า: more + adj + than","passageId":null},{"id":"set2-q9","setId":2,"section":"vocabulary","skill":"vocabulary in context","difficulty":"intermediate","question":"The museum offers a ______ tour, so visitors do not have to pay anything.","options":["free","cheap","expensive","private"],"correctAnswer":0,"explanationThai":"“ไม่ต้องจ่ายอะไรเลย” หมายถึงฟรี จึงตอบ free","wrongAnswerExplanationsThai":["","“cheap” = ราคาถูก แต่ยังต้องจ่าย","“expensive” = แพง ขัดกับบริบท","“private” = ส่วนตัว ไม่เกี่ยวกับการไม่ต้องจ่าย"],"tipThai":"อ่านคำอธิบายในประโยค (do not have to pay) เพื่อหาคำตอบ","passageId":null},{"id":"set2-q10","setId":2,"section":"vocabulary","skill":"phrasal verbs","difficulty":"intermediate","question":"Don't give up! If you keep practising, you will ______ this difficult skill.","options":["look after","hand in","pick up","give away"],"correctAnswer":2,"explanationThai":"pick up ในบริบทนี้หมายถึง เรียนรู้/ฝึกจนได้ทักษะ","wrongAnswerExplanationsThai":["“look after” = ดูแล","“hand in” = ส่งงาน","","“give away” = แจก/มอบให้"],"tipThai":"pick up มีหลายความหมาย รวมถึง “เรียนรู้ทักษะ/ภาษา”","passageId":null},{"id":"set2-q11","setId":2,"section":"vocabulary","skill":"antonyms","difficulty":"intermediate","question":"Choose the word that is OPPOSITE in meaning to \"increase.\"","options":["grow","reduce","expand","rise"],"correctAnswer":1,"explanationThai":"increase = เพิ่มขึ้น ตรงข้ามคือ reduce = ลดลง","wrongAnswerExplanationsThai":["“grow” = เติบโต ความหมายเดียวกับเพิ่ม","","“expand” = ขยาย ความหมายใกล้เพิ่ม","“rise” = สูงขึ้น ความหมายใกล้เพิ่ม"],"tipThai":"โจทย์หา OPPOSITE ให้ระวังตัวเลือกที่ความหมายเหมือนกัน (ตัวลวง)","passageId":null},{"id":"set2-q12","setId":2,"section":"vocabulary","skill":"collocations","difficulty":"intermediate","question":"Scientists are trying to find a ______ to the problem of plastic waste.","options":["question","answering","reply","solution"],"correctAnswer":3,"explanationThai":"คำที่ไปกับ problem คือ solution: a solution to a problem","wrongAnswerExplanationsThai":["“question” = คำถาม ไม่ใช่ทางแก้ปัญหา","“answering” เป็นรูป -ing ไม่ใช่คำนามที่ใช้คู่ปัญหา","“reply” = การตอบกลับ ไม่ใช่การแก้ปัญหา",""],"tipThai":"จำคู่คำ: a solution to a problem, an answer to a question","passageId":null},{"id":"set2-q13","setId":2,"section":"vocabulary","skill":"word families","difficulty":"intermediate","question":"Being ______ is important; you should always tell the truth.","options":["honest","honesty","honestly","dishonest"],"correctAnswer":0,"explanationThai":"หลัง being ต้องการคำคุณศัพท์ (adjective) จึงใช้ honest","wrongAnswerExplanationsThai":["","“honesty” เป็นคำนาม","“honestly” เป็นคำวิเศษณ์","“dishonest” = ไม่ซื่อสัตย์ ความหมายตรงข้าม"],"tipThai":"being + adjective ใช้บรรยายคุณลักษณะ","passageId":null},{"id":"set2-q14","setId":2,"section":"conversation","skill":"giving advice","difficulty":"intermediate","question":"A: I keep forgetting new vocabulary. What can I do?\nB: ______","options":["Vocabulary is boring for me.","I forgot my dictionary too.","No, you can't do that.","If I were you, I'd write new words in a notebook."],"correctAnswer":3,"explanationThai":"“If I were you, I'd...” เป็นวลีให้คำแนะนำอย่างเป็นธรรมชาติ เข้ากับคำถามขอคำแนะนำ","wrongAnswerExplanationsThai":["ไม่ตอบคำถามและไม่ช่วยแก้ปัญหา","เปลี่ยนเรื่อง ไม่ให้คำแนะนำ","เป็นการปฏิเสธ ไม่ให้คำแนะนำ",""],"tipThai":"ให้คำแนะนำ: If I were you, I'd... / You could... / Why not...?","passageId":null},{"id":"set2-q15","setId":2,"section":"conversation","skill":"making requests","difficulty":"intermediate","question":"On the phone: \"______ speak to Mr. Wichai, please?\"","options":["Do I","Could I","I want","Am I"],"correctAnswer":1,"explanationThai":"“Could I speak to...?” เป็นการขอสายอย่างสุภาพในการโทรศัพท์","wrongAnswerExplanationsThai":["“Do I speak” ผิดหลักการขอร้องสุภาพ","","“I want to speak” ตรงเกินไปและไม่สุภาพในบริบททางการ","“Am I speak” ผิดไวยากรณ์"],"tipThai":"ขอสายโทรศัพท์: Could I / May I speak to...?","passageId":null},{"id":"set2-q16","setId":2,"section":"conversation","skill":"expressing opinions","difficulty":"intermediate","question":"A: What do you think of our new library?\nB: ______","options":["In my opinion, it's a great place to study.","Yes, I have a library card.","I went there yesterday morning.","You're welcome to join us."],"correctAnswer":0,"explanationThai":"คำถามถามความคิดเห็น การตอบ “In my opinion...” ตรงประเด็นและเป็นธรรมชาติ","wrongAnswerExplanationsThai":["","ตอบข้อเท็จจริง ไม่ใช่ความคิดเห็น","เล่าเหตุการณ์ ไม่ได้แสดงความคิดเห็น","เป็นคำเชิญ ไม่ตอบคำถาม"],"tipThai":"แสดงความคิดเห็น: In my opinion / I think / I feel that...","passageId":null},{"id":"set2-q17","setId":2,"section":"conversation","skill":"asking for clarification","difficulty":"intermediate","question":"A: The meeting is at 3.30 in Room B.\nB: ______","options":["I'm sorry, I don't have a meeting.","No, thank you very much.","Sorry, could you repeat the room number?","That's very kind of you."],"correctAnswer":2,"explanationThai":"เมื่อไม่แน่ใจข้อมูล การขอให้พูดซ้ำอย่างสุภาพคือการขอความชัดเจน","wrongAnswerExplanationsThai":["ปฏิเสธว่าไม่มีประชุม ไม่เข้ากับบริบท","ปฏิเสธคำเชิญ ไม่เกี่ยวข้อง","","ขอบคุณ ไม่ใช่การขอความชัดเจน"],"tipThai":"ขอความชัดเจน: Sorry, could you repeat that? / What do you mean by...?","passageId":null},{"id":"set2-q18","setId":2,"section":"cloze","skill":"cloze passage","difficulty":"intermediate","question":"Cloze: \"Many teenagers spend hours online. ______ this can be fun, too much screen time may harm their sleep.\"","options":["Because","Although","So","Unless"],"correctAnswer":1,"explanationThai":"สองส่วนของประโยคขัดแย้งกัน (สนุก แต่เป็นอันตราย) ใช้ Although เพื่อแสดงความขัดแย้ง","wrongAnswerExplanationsThai":["“Because” บอกเหตุผล ไม่ใช่ความขัดแย้ง","","“So” บอกผลลัพธ์","“Unless” = เว้นแต่ว่า ไม่เข้ากับความหมาย"],"tipThai":"Although/Even though ขึ้นต้นประโยคเพื่อแสดงความขัดแย้ง","passageId":null},{"id":"set2-q19","setId":2,"section":"cloze","skill":"cloze passage","difficulty":"intermediate","question":"Cloze: \"She studied very hard for the test, ______ she passed with a high score.\"","options":["but","although","or","so"],"correctAnswer":3,"explanationThai":"ตั้งใจเรียน จึงสอบผ่านคะแนนสูง เป็นเหตุและผล ใช้ so","wrongAnswerExplanationsThai":["“but” แสดงความขัดแย้ง ไม่เข้ากับผลลัพธ์เชิงบวก","“although” แสดงความขัดแย้ง","“or” ให้เลือก",""],"tipThai":"เหตุ → ผล ใช้ so; ผล ← เหตุ ใช้ because","passageId":null},{"id":"set2-q20","setId":2,"section":"cloze","skill":"error identification","difficulty":"intermediate","question":"Find the error: \"There is (A) too many (B) students in the classroom (C) this morning. (D)\"","options":["A","B","C","D"],"correctAnswer":0,"explanationThai":"students เป็นพหูพจน์ ต้องใช้ There are ไม่ใช่ There is ดังนั้นผิดที่ (A)","wrongAnswerExplanationsThai":["","(B) too many ถูกต้องกับคำนามนับได้พหูพจน์","(C) in the classroom ถูกต้อง","(D) this morning ถูกต้อง"],"tipThai":"There is + เอกพจน์, There are + พหูพจน์","passageId":null},{"id":"set2-q21","setId":2,"section":"reading","skill":"main idea","difficulty":"intermediate","question":"What is the main idea of the passage?","options":["Videos are better than podcasts.","Students should not use their phones.","Students can use short podcasts as a fun and flexible way to learn.","Podcasts are only for professional teachers."],"correctAnswer":2,"explanationThai":"ใจความหลักคือพอดแคสต์สั้น ๆ เป็นวิธีเรียนรู้ที่สนุกและยืดหยุ่นสำหรับนักเรียน","wrongAnswerExplanationsThai":["เรื่องไม่ได้บอกว่าวิดีโอดีกว่า","ตรงข้าม เรื่องส่งเสริมการใช้เพื่อการเรียน","","เรื่องเล่าว่านักเรียนเป็นผู้ทำพอดแคสต์เอง"],"tipThai":"ใจความหลักต้องครอบคลุมทั้งเรื่อง ไม่ใช่รายละเอียดเดียว","passageId":"set2-r1"},{"id":"set2-q22","setId":2,"section":"reading","skill":"detail","difficulty":"intermediate","question":"Why does the team keep each episode under ten minutes?","options":["Because they run out of ideas quickly","Because the school does not allow long recordings","Because their phones cannot record longer","Because busy students are more likely to finish something short"],"correctAnswer":3,"explanationThai":"Ploy อธิบายว่าทำให้สั้นเพราะนักเรียนที่ยุ่งมีแนวโน้มจะฟังจนจบมากกว่าเมื่อเนื้อหาสั้น","wrongAnswerExplanationsThai":["ไม่มีข้อมูลว่าหมดไอเดีย","ไม่มีข้อมูลเรื่องกฎโรงเรียน","ไม่มีข้อมูลเรื่องข้อจำกัดของโทรศัพท์",""],"tipThai":"หาเหตุผลที่ผู้พูดกล่าวโดยตรงในเครื่องหมายคำพูด","passageId":"set2-r1"},{"id":"set2-q23","setId":2,"section":"reading","skill":"vocabulary in context","difficulty":"intermediate","question":"In the passage, \"on purpose\" means the episodes are short ______.","options":["by accident","without any reason","intentionally","by mistake"],"correctAnswer":2,"explanationThai":"on purpose = อย่างตั้งใจ ตรงกับ intentionally","wrongAnswerExplanationsThai":["“by accident” = โดยบังเอิญ ตรงข้าม","ไม่มีเหตุผล ขัดกับเนื้อเรื่องที่ให้เหตุผล","","“by mistake” = โดยผิดพลาด ตรงข้าม"],"tipThai":"on purpose = intentionally = deliberately (โดยตั้งใจ)","passageId":"set2-r1"},{"id":"set2-q24","setId":2,"section":"reading","skill":"inference","difficulty":"intermediate","question":"What does the passage suggest about the podcast's popularity?","options":["It is only popular with teachers.","It has spread beyond the students' own school.","It is losing listeners every month.","It is famous around the whole world."],"correctAnswer":1,"explanationThai":"เรื่องระบุว่ามีผู้ฟังในจังหวัดอื่นด้วย แสดงว่าความนิยมขยายออกไปนอกโรงเรียนของตนเอง","wrongAnswerExplanationsThai":["ผู้ฟังเป็นนักเรียน ไม่ได้จำกัดเฉพาะครู","","ตรงข้าม ความนิยมเพิ่มขึ้น","เรื่องกล่าวถึงจังหวัดอื่น ไม่ถึงระดับทั้งโลก"],"tipThai":"เลือกคำตอบที่มีหลักฐานในเรื่องรองรับ ไม่มากหรือน้อยเกินจริง","passageId":"set2-r1"},{"id":"set2-q25","setId":2,"section":"reading","skill":"author's purpose","difficulty":"intermediate","question":"Why did the author most likely write this passage?","options":["To explain how students can learn in a new and enjoyable way","To warn people about the dangers of technology","To sell a brand of headphones","To describe how to build a recording studio"],"correctAnswer":0,"explanationThai":"ผู้เขียนต้องการอธิบายวิธีการเรียนรู้แบบใหม่ที่สนุกผ่านพอดแคสต์","wrongAnswerExplanationsThai":["","เรื่องไม่ได้เตือนเรื่องอันตรายของเทคโนโลยี","ไม่มีการขายสินค้าใด ๆ","ไม่มีการอธิบายวิธีสร้างห้องอัด"],"tipThai":"จุดประสงค์ผู้เขียนดูจากภาพรวมของเรื่องว่าต้องการให้ผู้อ่านได้อะไร","passageId":"set2-r1"},{"id":"set3-q1","setId":3,"section":"grammar","skill":"past perfect","difficulty":"upper-intermediate","question":"By the time the firefighters arrived, the small fire ______ most of the kitchen.","options":["destroys","was destroying","has destroyed","had destroyed"],"correctAnswer":3,"explanationThai":"เหตุการณ์ (ไฟไหม้ครัว) เกิดและเสร็จก่อนอีกเหตุการณ์ในอดีต (นักดับเพลิงมาถึง) ใช้ Past Perfect: had destroyed","wrongAnswerExplanationsThai":["“destroys” เป็นปัจจุบัน ไม่เข้ากับอดีต","Past Continuous เน้นการกำลังทำ ไม่ใช่เหตุการณ์ที่เสร็จก่อน","Present Perfect เชื่อมอดีตกับปัจจุบัน ไม่เข้ากับ By the time...arrived",""],"tipThai":"“By the time + อดีต” เหตุการณ์ที่เกิดก่อนใช้ Past Perfect (had + V3)","passageId":null},{"id":"set3-q2","setId":3,"section":"grammar","skill":"passive voice","difficulty":"upper-intermediate","question":"The new sports hall ______ next year, according to the school's plan.","options":["will build","will be built","is building","builds"],"correctAnswer":1,"explanationThai":"ห้องกีฬาเป็นสิ่งที่ถูกสร้าง (ประธานถูกกระทำ) และเป็นอนาคต ใช้ passive: will be built","wrongAnswerExplanationsThai":["“will build” เป็น active ประธานต้องเป็นผู้สร้าง","","“is building” หมายถึงประธานกำลังสร้างเอง","“builds” เป็นปัจจุบัน active"],"tipThai":"ประธานถูกกระทำ ใช้ verb to be + V3; อนาคตใช้ will be + V3","passageId":null},{"id":"set3-q3","setId":3,"section":"grammar","skill":"second conditional","difficulty":"upper-intermediate","question":"If I ______ more free time, I would definitely learn to play the piano.","options":["had","have","will have","would have"],"correctAnswer":0,"explanationThai":"เงื่อนไขที่ไม่จริงในปัจจุบัน (Second Conditional): If + past simple, ... would + verb","wrongAnswerExplanationsThai":["","“have” เป็นปัจจุบัน ไม่ใช่โครงสร้างเงื่อนไขที่ 2","“will have” ไม่ใช้หลัง if ในเงื่อนไขนี้","“would have” ใช้กับเงื่อนไขที่ 3 (อดีต)"],"tipThai":"เงื่อนไขไม่จริงในปัจจุบัน: If + V2, would + V1","passageId":null},{"id":"set3-q4","setId":3,"section":"grammar","skill":"reported speech","difficulty":"upper-intermediate","question":"She said that she ______ the report the next day.","options":["will finish","finishes","would finish","has finished"],"correctAnswer":2,"explanationThai":"ในประโยครายงานคำพูด (reported speech) will เปลี่ยนเป็น would เมื่อกริยาหลักเป็นอดีต (said)","wrongAnswerExplanationsThai":["“will” ต้องเปลี่ยนเป็น would ในการเล่าคำพูดอดีต","“finishes” เป็นปัจจุบัน ไม่สอดคล้องกับ said","","Present Perfect ไม่เข้ากับ the next day"],"tipThai":"เล่าคำพูดที่ขึ้นต้นด้วย said: will→would, can→could, tomorrow→the next day","passageId":null},{"id":"set3-q5","setId":3,"section":"grammar","skill":"present perfect continuous","difficulty":"upper-intermediate","question":"My eyes hurt because I ______ at this screen for three hours.","options":["stare","stared","am staring","have been staring"],"correctAnswer":3,"explanationThai":"การกระทำต่อเนื่องตั้งแต่อดีตจนถึงปัจจุบันและมีผลกับตอนนี้ (ตาเจ็บ) ใช้ Present Perfect Continuous: have been staring","wrongAnswerExplanationsThai":["“stare” เป็นปัจจุบันธรรมดา ไม่แสดงความต่อเนื่องถึงปัจจุบัน","“stared” เป็นอดีตที่จบแล้ว","Present Continuous ไม่แสดงระยะเวลา for three hours ที่ต่อเนื่องมา",""],"tipThai":"for + ระยะเวลา + ผลถึงตอนนี้ ให้นึกถึง have/has been + V-ing","passageId":null},{"id":"set3-q6","setId":3,"section":"grammar","skill":"gerund as subject","difficulty":"upper-intermediate","question":"______ regularly is one of the best ways to stay healthy.","options":["Exercising","To exercising","Exercise it","Being exercise"],"correctAnswer":0,"explanationThai":"เมื่อทำกริยาให้เป็นประธานของประโยค ใช้ gerund (V-ing): Exercising","wrongAnswerExplanationsThai":["","“To exercising” ผิด เพราะ to ตามด้วย V-ing ไม่ได้","“Exercise it” มีกรรมเกินและไม่ใช่ประธานที่ถูก","“Being exercise” ผิดไวยากรณ์"],"tipThai":"กริยาเป็นประธานของประโยค ใช้รูป V-ing (gerund)","passageId":null},{"id":"set3-q7","setId":3,"section":"grammar","skill":"tag questions","difficulty":"upper-intermediate","question":"You've already submitted your project, ______?","options":["did you","haven't you","have you","don't you"],"correctAnswer":1,"explanationThai":"ประโยคหน้าเป็น Present Perfect รูปบอกเล่า (You've submitted) tag ต้องเป็นปฏิเสธและใช้ have: haven't you","wrongAnswerExplanationsThai":["“did you” ใช้กับ Past Simple ไม่ใช่ Present Perfect","","ประโยคบอกเล่าต้องตามด้วย tag ปฏิเสธ ไม่ใช่ have you","“don't you” ใช้กับ Present Simple"],"tipThai":"ประโยคบอกเล่า+tag ปฏิเสธ; ใช้กริยาช่วยตัวเดียวกับประโยคหน้า","passageId":null},{"id":"set3-q8","setId":3,"section":"grammar","skill":"determiners (both/all/neither)","difficulty":"upper-intermediate","question":"______ of my two best friends enjoys playing chess; they both prefer football.","options":["Both","All","Neither","None"],"correctAnswer":2,"explanationThai":"ทั้งคู่ชอบฟุตบอลมากกว่า แปลว่าไม่มีใครในสองคนชอบหมากรุก ใช้ Neither (สำหรับสองคน) + กริยาเอกพจน์","wrongAnswerExplanationsThai":["“Both” + plural verb และความหมายขัดกับ they both prefer football","“All” ใช้กับตั้งแต่สามขึ้นไป","","“None” ใช้กับสามขึ้นไป ไม่ใช่สองคน"],"tipThai":"สองสิ่ง: both/either/neither; ตั้งแต่สาม: all/any/none","passageId":null},{"id":"set3-q9","setId":3,"section":"vocabulary","skill":"vocabulary in context","difficulty":"upper-intermediate","question":"The scientist made a remarkable ______: a new material that cleans water using sunlight.","options":["mistake","excuse","delay","discovery"],"correctAnswer":3,"explanationThai":"การค้นพบวัสดุใหม่คือ discovery จึงเข้ากับบริบท","wrongAnswerExplanationsThai":["“mistake” = ข้อผิดพลาด ไม่เข้ากับ remarkable material ที่เป็นบวก","“excuse” = ข้อแก้ตัว","“delay” = ความล่าช้า",""],"tipThai":"remarkable เป็นคำบวก จึงคู่กับคำนามเชิงบวก เช่น discovery/achievement","passageId":null},{"id":"set3-q10","setId":3,"section":"vocabulary","skill":"phrasal verbs","difficulty":"upper-intermediate","question":"We need to ______ a new plan because the first one didn't work.","options":["come up with","look down on","run out of","get away with"],"correctAnswer":0,"explanationThai":"come up with = คิดหา/เสนอ (แผนหรือไอเดียใหม่) เข้ากับบริบท","wrongAnswerExplanationsThai":["","“look down on” = ดูถูก","“run out of” = ใช้จนหมด","“get away with” = ทำผิดแล้วไม่ถูกลงโทษ"],"tipThai":"come up with an idea/plan/solution = คิดออกมาได้","passageId":null},{"id":"set3-q11","setId":3,"section":"vocabulary","skill":"academic vocabulary","difficulty":"upper-intermediate","question":"The two graphs show a clear ______ between exercise and better sleep.","options":["difference","distance","connection","direction"],"correctAnswer":2,"explanationThai":"ความเชื่อมโยงระหว่างสองสิ่ง (การออกกำลังกายกับการนอน) คือ connection","wrongAnswerExplanationsThai":["“difference” = ความแตกต่าง ไม่ใช่ความเชื่อมโยง","“distance” = ระยะทาง","","“direction” = ทิศทาง"],"tipThai":"connection/link/relationship = ความสัมพันธ์ระหว่างสองสิ่ง","passageId":null},{"id":"set3-q12","setId":3,"section":"vocabulary","skill":"collocations","difficulty":"upper-intermediate","question":"Students who ______ attention in class usually understand the lessons better.","options":["make","pay","do","give"],"correctAnswer":1,"explanationThai":"คำที่ไปกับ attention คือ pay: pay attention","wrongAnswerExplanationsThai":["“make attention” ไม่ใช่ collocation","","“do attention” ไม่ถูก","“give attention” ใช้ได้บางบริบทแต่ collocation มาตรฐานคือ pay attention"],"tipThai":"จำ: pay attention, pay a visit, pay a compliment","passageId":null},{"id":"set3-q13","setId":3,"section":"vocabulary","skill":"word families","difficulty":"upper-intermediate","question":"The team worked together ______ and finished the project ahead of time.","options":["succeed","success","successful","successfully"],"correctAnswer":3,"explanationThai":"ต้องการคำวิเศษณ์ (adverb) ขยายกริยา worked จึงใช้ successfully","wrongAnswerExplanationsThai":["“succeed” เป็นกริยา","“success” เป็นคำนาม","“successful” เป็นคำคุณศัพท์ ขยายกริยาไม่ได้",""],"tipThai":"ขยายกริยาใช้ adverb ซึ่งมักลงท้าย -ly","passageId":null},{"id":"set3-q14","setId":3,"section":"conversation","skill":"disagreeing politely","difficulty":"upper-intermediate","question":"A: I think homework should be banned completely.\nB: ______","options":["I see your point, but I think some homework helps us practise.","Yes, I completely have no opinion.","Homework is a kind of animal.","You must ban it right now."],"correctAnswer":0,"explanationThai":"“I see your point, but...” เป็นการไม่เห็นด้วยอย่างสุภาพ พร้อมให้เหตุผล","wrongAnswerExplanationsThai":["","“completely have no opinion” ขัดแย้งในตัวเองและไม่เป็นธรรมชาติ","ไม่เกี่ยวข้องกับหัวข้อ","เป็นคำสั่งแบบไม่สุภาพ ไม่ใช่การแสดงความเห็นต่าง"],"tipThai":"ไม่เห็นด้วยสุภาพ: I see your point, but... / I'm not sure I agree...","passageId":null},{"id":"set3-q15","setId":3,"section":"conversation","skill":"apologising","difficulty":"upper-intermediate","question":"You arrive late to a group meeting. What is the most appropriate thing to say?","options":["Being late is not my problem.","Why did you start without me?","I'm really sorry for being late. The bus was delayed.","You should have waited longer for me."],"correctAnswer":2,"explanationThai":"การขอโทษพร้อมเหตุผลสั้น ๆ เป็นการรับผิดชอบอย่างสุภาพและเหมาะสมที่สุด","wrongAnswerExplanationsThai":["ปฏิเสธความรับผิดชอบ ไม่สุภาพ","โยนความผิดให้ผู้อื่น","","กล่าวโทษผู้อื่น ไม่ใช่การขอโทษ"],"tipThai":"ขอโทษอย่างจริงใจ: I'm sorry for... + เหตุผลสั้น ๆ","passageId":null},{"id":"set3-q16","setId":3,"section":"conversation","skill":"making arrangements","difficulty":"upper-intermediate","question":"A: Shall we meet at the library or the café to study?\nB: ______","options":["I studied there last week.","No, I don't like studying.","Yes, I have a book.","Let's meet at the library; it's quieter."],"correctAnswer":3,"explanationThai":"คำถามให้เลือกสถานที่ การตอบว่า “Let's meet at the library...” เลือกและให้เหตุผล เป็นธรรมชาติที่สุด","wrongAnswerExplanationsThai":["เล่าอดีต ไม่ตอบตัวเลือก","ปฏิเสธการเรียน ไม่ตอบคำถาม","ไม่ตอบว่าที่ไหน",""],"tipThai":"เมื่อถูกถามให้เลือก ให้เลือกอย่างชัดเจนพร้อมเหตุผลสั้น ๆ","passageId":null},{"id":"set3-q17","setId":3,"section":"conversation","skill":"offering help","difficulty":"upper-intermediate","question":"A: I can't carry all these books to the classroom.\nB: ______","options":["That's not my job.","Would you like me to help you with some of them?","You brought too many books.","I can't help you at all."],"correctAnswer":1,"explanationThai":"“Would you like me to help...?” เป็นการเสนอความช่วยเหลืออย่างสุภาพและเป็นธรรมชาติ","wrongAnswerExplanationsThai":["ปฏิเสธการช่วย ไม่สุภาพ","","ตำหนิผู้อื่น ไม่ช่วยแก้ปัญหา","ปฏิเสธโดยตรง ไม่เข้ากับบริบทที่ควรช่วย"],"tipThai":"เสนอความช่วยเหลือ: Would you like me to...? / Shall I...? / Let me...","passageId":null},{"id":"set3-q18","setId":3,"section":"cloze","skill":"error identification","difficulty":"upper-intermediate","question":"Find the error: \"The teacher explained (A) us the rule (B) very clearly (C) before the test. (D)\"","options":["A","B","C","D"],"correctAnswer":0,"explanationThai":"explain ต้องตามด้วย to + คน: explained to us ดังนั้นส่วนที่ผิดคือ (A) ที่ขาด to","wrongAnswerExplanationsThai":["","(B) the rule เป็นกรรมที่ถูกต้อง","(C) very clearly ถูกต้อง","(D) before the test ถูกต้อง"],"tipThai":"explain / describe / suggest + to + someone (ไม่ใช้กรรมทางอ้อมตรง ๆ)","passageId":null},{"id":"set3-q19","setId":3,"section":"cloze","skill":"error identification","difficulty":"upper-intermediate","question":"Find the error: \"If it doesn't rain (A) tomorrow, we (B) will going (C) to the beach together. (D)\"","options":["A","B","C","D"],"correctAnswer":2,"explanationThai":"หลัง will ต้องตามด้วยกริยาช่องหนึ่ง (will go) ไม่ใช่ will going ดังนั้นผิดที่ (C)","wrongAnswerExplanationsThai":["(A) If it doesn't rain ถูกต้อง (First Conditional)","(B) we เป็นประธานถูกต้อง","","(D) to the beach together ถูกต้อง"],"tipThai":"will + V1 เสมอ (will go, will be, will help)","passageId":null},{"id":"set3-q20","setId":3,"section":"cloze","skill":"error identification","difficulty":"upper-intermediate","question":"Find the error: \"She is one of the (A) most talented (B) student (C) in our school. (D)\"","options":["A","B","C","D"],"correctAnswer":2,"explanationThai":"“one of the + ขั้นสูงสุด” ต้องตามด้วยคำนามพหูพจน์: students ดังนั้นผิดที่ (C)","wrongAnswerExplanationsThai":["(A) one of the ถูกต้อง","(B) most talented ถูกต้อง","","(D) in our school ถูกต้อง"],"tipThai":"one of the + superlative + คำนามพหูพจน์ เสมอ","passageId":null},{"id":"set3-q21","setId":3,"section":"reading","skill":"main idea","difficulty":"upper-intermediate","question":"What is the passage mainly about?","options":["How to grow the most expensive vegetables","A students' project that turned an empty field into a useful garden","Why farmers dislike working with schools","The best recipes for a school lunch programme"],"correctAnswer":1,"explanationThai":"ใจความหลักคือโครงการของนักเรียนที่เปลี่ยนที่ดินว่างเปล่าให้กลายเป็นสวนที่มีประโยชน์","wrongAnswerExplanationsThai":["ไม่ได้เน้นเรื่องผักที่แพงที่สุด","","ตรงข้าม ชาวนามาให้คำแนะนำ","ไม่ได้พูดถึงสูตรอาหาร"],"tipThai":"ใจความหลักคือประโยคที่สรุปทั้งเรื่องได้","passageId":"set3-r1"},{"id":"set3-q22","setId":3,"section":"reading","skill":"detail","difficulty":"upper-intermediate","question":"How did the students make natural fertiliser?","options":["They collected food waste from the canteen.","They bought it from local farmers.","They ordered it from another school.","They used chemicals from a factory."],"correctAnswer":0,"explanationThai":"เรื่องระบุว่าพวกเขาเก็บเศษอาหารจากโรงอาหารมาทำปุ๋ยธรรมชาติ","wrongAnswerExplanationsThai":["","ชาวนาให้คำแนะนำ ไม่ได้ขายปุ๋ย","ไม่มีข้อมูลเรื่องสั่งจากโรงเรียนอื่น","เป็นปุ๋ยธรรมชาติ ไม่ใช่สารเคมีจากโรงงาน"],"tipThai":"หาคำสำคัญ (fertiliser) แล้วอ่านประโยครอบ ๆ เพื่อหารายละเอียด","passageId":"set3-r1"},{"id":"set3-q23","setId":3,"section":"reading","skill":"cause and effect","difficulty":"upper-intermediate","question":"According to the passage, one result of the garden is that ______.","options":["the school had to hire more cooks","the school spends less money on food","the students stopped studying science","the field became dusty again"],"correctAnswer":1,"explanationThai":"สวนให้ผักสด ทำให้โรงเรียนใช้เงินซื้ออาหารน้อยลง เป็นผลลัพธ์โดยตรง","wrongAnswerExplanationsThai":["ไม่มีข้อมูลเรื่องจ้างพ่อครัวเพิ่ม","","ตรงข้าม นักเรียนได้เรียนรู้บทเรียนมากมาย","ตรงข้าม ที่ดินกลายเป็นสวนเขียวชอุ่ม"],"tipThai":"คำถามเหตุ-ผล ให้หาผลลัพธ์ที่เรื่องระบุไว้โดยตรง","passageId":"set3-r1"},{"id":"set3-q24","setId":3,"section":"reading","skill":"inference","difficulty":"upper-intermediate","question":"What can we infer about the students who started the project?","options":["They gave up when problems appeared.","They were only interested in winning prizes.","They were determined and willing to solve problems.","They disliked working with other people."],"correctAnswer":2,"explanationThai":"แม้เจอปัญหามากมาย พวกเขาก็ไม่ยอมแพ้และหาวิธีแก้ แสดงถึงความมุ่งมั่นและตั้งใจแก้ปัญหา","wrongAnswerExplanationsThai":["ตรงข้าม พวกเขาไม่ยอมแพ้","ไม่มีการกล่าวถึงรางวัล","","เรื่องเน้นการทำงานเป็นทีม"],"tipThai":"อนุมานลักษณะนิสัยจากการกระทำที่บรรยายในเรื่อง","passageId":"set3-r1"},{"id":"set3-q25","setId":3,"section":"reading","skill":"author's purpose","difficulty":"upper-intermediate","question":"Why does the author mention that nearby schools want to visit the garden?","options":["To prove the garden is too crowded","To complain about visitors","To criticise other schools","To show that the project is admired and worth copying"],"correctAnswer":3,"explanationThai":"การที่โรงเรียนอื่นอยากมาเรียนรู้ แสดงว่าโครงการได้รับการยกย่องและควรค่าแก่การนำไปทำตาม","wrongAnswerExplanationsThai":["ไม่ได้บอกว่าสวนแออัด","ไม่ใช่การบ่นเรื่องผู้มาเยือน","ไม่ใช่การวิจารณ์โรงเรียนอื่น",""],"tipThai":"ถามว่าผู้เขียนกล่าวถึงบางสิ่งเพื่ออะไร ให้ดูว่ามันสนับสนุนใจความอย่างไร","passageId":"set3-r1"},{"id":"set4-q1","setId":4,"section":"grammar","skill":"wish (present)","difficulty":"advanced","question":"I wish I ______ taller so that I could reach the top shelf easily.","options":["am","were","will be","have been"],"correctAnswer":1,"explanationThai":"wish + past simple ใช้พูดถึงความปรารถนาที่ตรงข้ามกับความจริงในปัจจุบัน และใช้ were กับทุกประธานในโครงสร้างนี้","wrongAnswerExplanationsThai":["“am” เป็นปัจจุบันจริง ไม่เข้ากับ wish","","“will be” เป็นอนาคต ไม่ใช้หลัง wish ในความหมายนี้","Present Perfect ไม่เข้ากับ wish ที่หมายถึงปัจจุบัน"],"tipThai":"wish + V2 (were) แสดงความปรารถนาที่ต่างจากความจริงตอนนี้","passageId":null},{"id":"set4-q2","setId":4,"section":"grammar","skill":"causative","difficulty":"advanced","question":"My phone screen was cracked, so I ______ last weekend.","options":["repaired it myself easily","had it repaired","have repair it","did repair by shop"],"correctAnswer":1,"explanationThai":"ให้คนอื่นทำให้ ใช้โครงสร้าง causative: have + something + V3 = had it repaired","wrongAnswerExplanationsThai":["ความหมายว่าเราซ่อมเอง ซึ่งบริบท (screen cracked) สื่อว่าให้ร้านซ่อม และคำว่า easily ไม่สมเหตุผล","","“have repair it” ผิดไวยากรณ์","“did repair by shop” ผิดโครงสร้างและไวยากรณ์"],"tipThai":"ให้คนอื่นทำให้: have/get + สิ่งของ + กริยาช่อง 3","passageId":null},{"id":"set4-q3","setId":4,"section":"grammar","skill":"reduced relative clause","difficulty":"advanced","question":"The books ______ on that shelf are for advanced readers only.","options":["which placing","wh
