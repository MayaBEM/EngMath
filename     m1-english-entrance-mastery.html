o placed","placed","are placed"],"correctAnswer":2,"explanationThai":"ลดรูป relative clause (which are placed) ในความหมาย passive เหลือ V3: placed","wrongAnswerExplanationsThai":["“which placing” ผิดทั้งการใช้ which และรูป -ing","“who” ใช้กับคน ไม่ใช่ books","","“are placed” จะทำให้ประโยคมีกริยาสองตัว (are placed...are)"],"tipThai":"ลดรูป which/that are + V3 เหลือ V3 ตัวเดียว (the books placed there)","passageId":null},{"id":"set4-q4","setId":4,"section":"grammar","skill":"either...or agreement","difficulty":"advanced","question":"Either the teacher or the students ______ going to bring the equipment.","options":["are","is","was","has"],"correctAnswer":0,"explanationThai":"ในโครงสร้าง either...or กริยาผันตามประธานตัวที่อยู่ใกล้ที่สุด คือ the students (พหูพจน์) จึงใช้ are","wrongAnswerExplanationsThai":["","“is” เป็นเอกพจน์ แต่ประธานใกล้ที่สุดเป็นพหูพจน์","“was” เป็นเอกพจน์อดีต ไม่เข้ากับ going","“has” ไม่เข้ากับโครงสร้าง be going to"],"tipThai":"either...or / neither...nor กริยาผันตามประธานที่อยู่ใกล้กริยาที่สุด","passageId":null},{"id":"set4-q5","setId":4,"section":"grammar","skill":"present perfect vs past simple","difficulty":"advanced","question":"A: Have you ever been to Japan?  B: Yes, I ______ there in 2019.","options":["have gone","went","have been","was going"],"correctAnswer":1,"explanationThai":"คำถามใช้ Present Perfect เพื่อถามประสบการณ์ แต่เมื่อระบุเวลาชัดเจน (in 2019) ต้องเปลี่ยนเป็น Past Simple: went","wrongAnswerExplanationsThai":["“have gone” หมายถึงยังไม่กลับมา และใช้กับเวลาเจาะจงไม่ได้","","“have been” ใช้กับประสบการณ์ทั่วไป แต่มี in 2019 จึงต้องเป็นอดีต","Past Continuous ไม่เข้ากับบริบท"],"tipThai":"ถามประสบการณ์ใช้ Present Perfect; ตอบพร้อมเวลาชัดเจนใช้ Past Simple","passageId":null},{"id":"set4-q6","setId":4,"section":"grammar","skill":"parallel structure","difficulty":"advanced","question":"A good leader should be honest, patient, and ______.","options":["works hard","hard-working","to work hard","working hardly"],"correctAnswer":1,"explanationThai":"คำในชุดต้องเป็นรูปเดียวกัน (parallel) ซึ่งเป็นคำคุณศัพท์: honest, patient, hard-working","wrongAnswerExplanationsThai":["“works hard” เป็นกริยา ไม่ขนานกับคำคุณศัพท์","","“to work hard” เป็น infinitive ไม่ขนานกัน","“working hardly” ผิดความหมาย (hardly = แทบไม่)"],"tipThai":"เมื่อเรียงคำในชุด (A, B, and C) ต้องใช้รูปคำชนิดเดียวกัน","passageId":null},{"id":"set4-q7","setId":4,"section":"grammar","skill":"third conditional","difficulty":"advanced","question":"If she had studied harder, she ______ the scholarship last year.","options":["would have won","would win","will win","had won"],"correctAnswer":0,"explanationThai":"เงื่อนไขที่ 3 พูดถึงอดีตที่ไม่เป็นจริง: If + had + V3, ... would have + V3","wrongAnswerExplanationsThai":["","“would win” ใช้กับเงื่อนไขที่ 2 (ปัจจุบัน/อนาคต)","“will win” ไม่เข้ากับเหตุการณ์ในอดีต","“had won” ต้องมี would have นำหน้าในส่วนผลลัพธ์"],"tipThai":"เสียใจกับอดีต: If + had + V3, would have + V3","passageId":null},{"id":"set4-q8","setId":4,"section":"grammar","skill":"relative clause (whose)","difficulty":"advanced","question":"That's the writer ______ novel won an international prize.","options":["who","which","whose","whom"],"correctAnswer":2,"explanationThai":"ต้องการแสดงความเป็นเจ้าของ (นิยายของนักเขียน) จึงใช้ whose","wrongAnswerExplanationsThai":["“who” เป็นประธานที่เป็นคน ไม่แสดงความเป็นเจ้าของ","“which” ใช้กับสิ่งของ","","“whom” เป็นกรรมที่เป็นคน ไม่แสดงความเป็นเจ้าของ"],"tipThai":"whose + คำนาม ใช้แสดงความเป็นเจ้าของในอนุประโยค","passageId":null},{"id":"set4-q9","setId":4,"section":"vocabulary","skill":"vocabulary in context","difficulty":"advanced","question":"The instructions were so ______ that even the teacher found them hard to follow.","options":["obvious","confusing","simple","helpful"],"correctAnswer":1,"explanationThai":"“ยากจะทำตามแม้แต่ครู” แสดงว่าคำสั่งนั้นสับสน จึงตอบ confusing","wrongAnswerExplanationsThai":["“obvious” = ชัดเจน ตรงข้าม","","“simple” = ง่าย ตรงข้าม","“helpful” = มีประโยชน์ ไม่เข้ากับ hard to follow"],"tipThai":"so + adjective + that + ผลลัพธ์: ใช้ผลลัพธ์เดาความหมายของ adjective","passageId":null},{"id":"set4-q10","setId":4,"section":"vocabulary","skill":"phrasal verbs","difficulty":"advanced","question":"Please don't ______ your online passwords to strangers.","options":["put on","take after","look into","give out"],"correctAnswer":3,"explanationThai":"give out = เปิดเผย/แจกจ่าย (ข้อมูล) เข้ากับบริบทเรื่องรหัสผ่าน","wrongAnswerExplanationsThai":["“put on” = สวมใส่/เปิดเครื่อง","“take after” = มีลักษณะเหมือน (ญาติ)","“look into” = ตรวจสอบ",""],"tipThai":"give out information = เปิดเผยข้อมูล","passageId":null},{"id":"set4-q11","setId":4,"section":"vocabulary","skill":"academic vocabulary","difficulty":"advanced","question":"Before believing news online, you should check whether the source is ______.","options":["reliable","enjoyable","colourful","expensive"],"correctAnswer":0,"explanationThai":"แหล่งข่าวที่เชื่อถือได้คือ reliable ซึ่งเข้ากับบริบทการตรวจสอบข่าว","wrongAnswerExplanationsThai":["","“enjoyable” = สนุก ไม่เกี่ยวกับความน่าเชื่อถือ","“colourful” = มีสีสัน","“expensive” = แพง ไม่เกี่ยวข้อง"],"tipThai":"reliable / trustworthy / credible = น่าเชื่อถือ (คำสำคัญเรื่อง media literacy)","passageId":null},{"id":"set4-q12","setId":4,"section":"vocabulary","skill":"collocations","difficulty":"advanced","question":"The company will ______ a decision about the new product next week.","options":["do","give","make","take"],"correctAnswer":2,"explanationThai":"คำที่ไปกับ decision คือ make: make a decision","wrongAnswerExplanationsThai":["“do a decision” ไม่ใช่ collocation","“give a decision” ไม่ใช่ที่นิยม","","“take a decision” ใช้ในอังกฤษบางบริบท แต่ collocation มาตรฐานคือ make a decision"],"tipThai":"make a decision, make progress, make an effort","passageId":null},{"id":"set4-q13","setId":4,"section":"vocabulary","skill":"word families","difficulty":"advanced","question":"The scientist's ______ to protect the environment inspired many young people.","options":["decide","decisive","decision","decidedly"],"correctAnswer":2,"explanationThai":"หลัง The scientist's ต้องการคำนาม จึงใช้ decision","wrongAnswerExplanationsThai":["“decide” เป็นกริยา","“decisive” เป็นคำคุณศัพท์","","“decidedly” เป็นคำวิเศษณ์"],"tipThai":"หลังคำแสดงความเป็นเจ้าของ ('s) มักตามด้วยคำนาม","passageId":null},{"id":"set4-q14","setId":4,"section":"conversation","skill":"expressing preference","difficulty":"advanced","question":"A: Would you rather work alone or in a group for this task?\nB: ______","options":["I worked in a group yesterday.","No, I don't want to work.","Groups are made of people.","I'd rather work in a group because we can share ideas."],"correctAnswer":3,"explanationThai":"“I'd rather... because...” ตอบความชอบพร้อมเหตุผล เข้ากับคำถาม Would you rather...?","wrongAnswerExplanationsThai":["เล่าอดีต ไม่ตอบความชอบ","ปฏิเสธการทำงาน ไม่ตอบคำถาม","ให้ข้อมูลทั่วไป ไม่ใช่ความชอบ",""],"tipThai":"บอกความชอบ: I'd rather... / I prefer... + because + เหตุผล","passageId":null},{"id":"set4-q15","setId":4,"section":"conversation","skill":"school interview","difficulty":"advanced","question":"Interviewer: \"Why do you want to study at our school?\"\nBest answer:","options":["I really admire your school's focus on science and community projects.","My friend told me to come here.","Because my old school is boring.","I don't really know, to be honest."],"correctAnswer":0,"explanationThai":"คำตอบที่ดีในการสัมภาษณ์ควรแสดงเหตุผลเชิงบวกและเฉพาะเจาะจงเกี่ยวกับโรงเรียน","wrongAnswerExplanationsThai":["","อ้างเพื่อน ไม่แสดงเหตุผลของตนเอง","พูดเชิงลบเกี่ยวกับโรงเรียนเดิม ไม่เหมาะสม","แสดงว่าไม่ได้เตรียมตัวและขาดความสนใจ"],"tipThai":"ในการสัมภาษณ์ ให้เหตุผลที่เฉพาะเจาะจงและเป็นบวกเสมอ","passageId":null},{"id":"set4-q16","setId":4,"section":"conversation","skill":"responding to suggestions","difficulty":"advanced","question":"A: How about starting a recycling club at our school?\nB: ______","options":["Recycling is a type of paper.","That sounds like a great idea. How do we begin?","I recycled a bottle this morning.","No, clubs are on Fridays."],"correctAnswer":1,"explanationThai":"การตอบรับข้อเสนออย่างกระตือรือร้นพร้อมถามขั้นตอนต่อไปเป็นธรรมชาติที่สุด","wrongAnswerExplanationsThai":["ให้ข้อมูลผิดและไม่ตอบข้อเสนอ","","เล่าเหตุการณ์ ไม่ตอบข้อเสนอ","ปฏิเสธด้วยเหตุผลที่ไม่เกี่ยวข้อง"],"tipThai":"ตอบรับข้อเสนอ: That sounds great / Good idea + คำถามหรือความเห็นต่อ","passageId":null},{"id":"set4-q17","setId":4,"section":"conversation","skill":"online communication","difficulty":"advanced","question":"In a group chat, a classmate posts a rude comment about another student. What is the most responsible response?","options":["Share the comment with more people.","Add an even ruder comment.","Kindly ask them to stop and remind them to be respectful.","Ignore it and laugh with the others."],"correctAnswer":2,"explanationThai":"การตอบสนองอย่างมีความรับผิดชอบคือขอให้หยุดอย่างสุภาพและเตือนเรื่องความเคารพ","wrongAnswerExplanationsThai":["การแชร์ต่อทำให้ปัญหาแย่ลง","การตอบด้วยความหยาบคายยิ่งทำให้สถานการณ์เลวร้าย","","การเพิกเฉยและหัวเราะเป็นการสนับสนุนพฤติกรรมไม่ดี"],"tipThai":"digital citizenship: หยุดพฤติกรรมไม่ดีอย่างสุภาพ ไม่ส่งต่อหรือสนับสนุน","passageId":null},{"id":"set4-q18","setId":4,"section":"cloze","skill":"cloze passage","difficulty":"advanced","question":"Cloze: \"Reading widely improves your writing. ______, it also builds a stronger vocabulary.\"","options":["In addition","However","Instead","Otherwise"],"correctAnswer":0,"explanationThai":"ประโยคหลังเพิ่มข้อดีอีกข้อหนึ่ง ใช้ In addition (นอกจากนี้) เพื่อเพิ่มข้อมูล","wrongAnswerExplanationsThai":["","“However” แสดงความขัดแย้ง","“Instead” = แทนที่จะ","“Otherwise” = มิฉะนั้น"],"tipThai":"เพิ่มข้อมูลในทางเดียวกัน: In addition / Moreover / Furthermore","passageId":null},{"id":"set4-q19","setId":4,"section":"cloze","skill":"cloze passage","difficulty":"advanced","question":"Cloze: \"Save your work often; ______ you might lose it if the computer suddenly turns off.\"","options":["moreover","although","because","otherwise"],"correctAnswer":3,"explanationThai":"เตือนถึงผลเสียหากไม่ทำตาม ใช้ otherwise (มิฉะนั้น)","wrongAnswerExplanationsThai":["“moreover” เพิ่มข้อมูล ไม่ใช่ผลเสียของการไม่ทำ","“although” แสดงความขัดแย้ง","“because” บอกเหตุผลของประโยคก่อน ไม่ใช่ผลของการไม่ทำตาม",""],"tipThai":"otherwise = มิฉะนั้น (ถ้าไม่ทำสิ่งนี้ จะเกิดผลเสีย)","passageId":null},{"id":"set4-q20","setId":4,"section":"cloze","skill":"error identification","difficulty":"advanced","question":"Find the error: \"Neither the manager (A) nor the workers (B) was (C) satisfied with the result. (D)\"","options":["A","B","C","D"],"correctAnswer":2,"explanationThai":"neither...nor กริยาผันตามประธานใกล้สุด (the workers = พหูพจน์) จึงต้องใช้ were ไม่ใช่ was ผิดที่ (C)","wrongAnswerExplanationsThai":["(A) Neither the manager ถูกต้อง","(B) nor the workers ถูกต้อง","","(D) satisfied with the result ถูกต้อง"],"tipThai":"neither A nor B: กริยาตาม B (ตัวที่อยู่ใกล้กริยา)","passageId":null},{"id":"set4-q21","setId":4,"section":"reading","skill":"main idea","difficulty":"advanced","question":"What is the main message of the passage?","options":["People should never use social media.","We should think carefully before posting anything online.","Deleting posts always solves the problem.","Only adults should be allowed to post online."],"correctAnswer":1,"explanationThai":"ใจความหลักคือควรคิดให้รอบคอบก่อนโพสต์สิ่งใด ๆ ออนไลน์","wrongAnswerExplanationsThai":["เรื่องไม่ได้ห้ามใช้ แต่ให้ใช้อย่างรอบคอบ","","เรื่องบอกว่าการลบอาจไม่ช่วย เพราะมีคนบันทึกภาพไว้แล้ว","เรื่องไม่ได้จำกัดเฉพาะผู้ใหญ่"],"tipThai":"ใจความหลักมักสรุปได้จากคำแนะนำที่ผู้เขียนย้ำในเรื่อง","passageId":"set4-r1"},{"id":"set4-q22","setId":4,"section":"reading","skill":"inference","difficulty":"advanced","question":"Why does the author use the example of a student writing an angry message?","options":["To show how quickly a careless post can spread and cause harm","To encourage students to write when they are angry","To prove that screenshots are illegal","To explain how to delete messages"],"correctAnswer":0,"explanationThai":"ตัวอย่างนี้แสดงให้เห็นว่าโพสต์ที่ไม่ระวังสามารถแพร่กระจายอย่างรวดเร็วและก่อผลเสีย","wrongAnswerExplanationsThai":["","ตรงข้าม เรื่องเตือนไม่ให้โพสต์ตอนโกรธ","ไม่มีการกล่าวว่า screenshot ผิดกฎหมาย","ไม่ใช่การสอนวิธีลบข้อความ"],"tipThai":"ถามว่าผู้เขียนใช้ตัวอย่างเพื่ออะไร ให้ดูว่ามันสนับสนุนแนวคิดหลักอย่างไร","passageId":"set4-r1"},{"id":"set4-q23","setId":4,"section":"reading","skill":"detail","difficulty":"advanced","question":"According to the passage, which is NOT one of the three questions users should ask before posting?","options":["Is it true?","Is it kind?","Would my teacher or parents be comfortable seeing it?","Will it get many likes?"],"correctAnswer":3,"explanationThai":"สามคำถามในเรื่องคือ จริงไหม, ใจดีไหม, และครูหรือพ่อแม่เห็นแล้วสบายใจไหม ไม่มีเรื่องยอดไลก์","wrongAnswerExplanationsThai":["“Is it true?” เป็นหนึ่งในสามคำถาม","“Is it kind?” เป็นหนึ่งในสามคำถาม","คำถามเรื่องครู/พ่อแม่เป็นหนึ่งในสามคำถาม",""],"tipThai":"คำถามแบบ NOT ให้หาตัวเลือกที่ไม่ปรากฏในเรื่อง","passageId":"set4-r1"},{"id":"set4-q24","setId":4,"section":"reading","skill":"vocabulary in context","difficulty":"advanced","question":"In the passage, the word \"consequences\" is closest in meaning to ______.","options":["rewards","questions","results","choices"],"correctAnswer":2,"explanationThai":"consequences หมายถึง ผลที่ตามมา ตรงกับ results","wrongAnswerExplanationsThai":["“rewards” = รางวัล ไม่ตรง","“questions” = คำถาม","","“choices” = ทางเลือก ไม่ใช่ผลที่ตามมา"],"tipThai":"consequences = results = outcomes (ผลที่ตามมา)","passageId":"set4-r1"},{"id":"set4-q25","setId":4,"section":"reading","skill":"inference","difficulty":"advanced","question":"What does the phrase \"Being thoughtful online does not mean being silent\" suggest?","options":["Users should stop posting completely.","Users can still share, but should do so carefully and responsibly.","Silence is the only safe choice online.","Thoughtful people never use the internet."],"correctAnswer":1,"explanationThai":"ประโยคนี้สื่อว่าการคิดรอบคอบไม่ได้แปลว่าต้องเงียบ แต่ยังแบ่งปันได้อย่างระมัดระวังและมีความรับผิดชอบ","wrongAnswerExplanationsThai":["ตรงข้าม เรื่องไม่ได้บอกให้หยุดโพสต์","","ตรงข้ามกับใจความของประโยค","เป็นการตีความเกินจริง"],"tipThai":"ตีความประโยคโดยดูบริบทรอบข้าง ไม่ตีความตามตัวอักษรเพียงอย่างเดียว","passageId":"set4-r1"},{"id":"set5-q1","setId":5,"section":"grammar","skill":"inversion (negative adverbial)","difficulty":"gifted","question":"Never before ______ such an impressive science project from a student this young.","options":["we have seen","the judges seen","the judges had seen","had the judges seen"],"correctAnswer":3,"explanationThai":"เมื่อขึ้นต้นด้วยคำปฏิเสธ Never before ต้องสลับกริยาช่วยมาก่อนประธาน (inversion): had the judges seen","wrongAnswerExplanationsThai":["“we have seen” ไม่สลับตำแหน่งและ tense ไม่สอดคล้อง","“the judges seen” ขาดกริยาช่วย","“the judges had seen” เป็นลำดับปกติ ไม่สลับตามกฎ inversion",""],"tipThai":"ขึ้นประโยคด้วย Never/Rarely/Seldom/Not until → สลับกริยาช่วยมาก่อนประธาน","passageId":null},{"id":"set5-q2","setId":5,"section":"grammar","skill":"subjunctive","difficulty":"gifted","question":"The teacher suggested that every student ______ a short summary before the discussion.","options":["write","writes","wrote","is writing"],"correctAnswer":0,"explanationThai":"หลัง suggest that ใช้ subjunctive คือกริยารูปฐาน (base form) จึงใช้ write แม้ประธานเป็นเอกพจน์","wrongAnswerExplanationsThai":["","“writes” เป็นปัจจุบันเอกพจน์ ไม่ใช่รูป subjunctive","“wrote” เป็นอดีต ไม่ใช้ในโครงสร้างนี้","Present Continuous ไม่เข้ากับ subjunctive"],"tipThai":"suggest/recommend/insist + that + ประธาน + V1 (base form)","passageId":null},{"id":"set5-q3","setId":5,"section":"grammar","skill":"mixed conditional","difficulty":"gifted","question":"If I had taken your advice last year, I ______ much less stressed now.","options":["will be","would be","would have been","am"],"correctAnswer":1,"explanationThai":"เงื่อนไขผสม: เหตุในอดีต (had taken) ส่งผลถึงปัจจุบัน (now) จึงใช้ would + V1 ในส่วนผลลัพธ์","wrongAnswerExplanationsThai":["“will be” ไม่ใช้กับเงื่อนไขที่ไม่จริง","","“would have been” ใช้กับผลในอดีต แต่ที่นี่มี now จึงเป็นผลปัจจุบัน","“am” เป็นข้อเท็จจริงปัจจุบัน ไม่เข้ากับเงื่อนไขไม่จริง"],"tipThai":"เหตุในอดีต + ผลตอนนี้ (now): If + had V3, would + V1","passageId":null},{"id":"set5-q4","setId":5,"section":"grammar","skill":"so/such...that","difficulty":"gifted","question":"It was ______ a difficult question that no one in the class could answer it.","options":["so","very","such","too"],"correctAnswer":2,"explanationThai":"โครงสร้าง such + a + adjective + noun + that; ที่นี่มี a difficult question จึงใช้ such","wrongAnswerExplanationsThai":["“so” ใช้กับ adjective เดี่ยว ๆ (so difficult) ไม่ใช้กับ a + noun","“very” ไม่เข้ากับโครงสร้าง ...that","","“too” หมายถึงมากเกินไป และตามด้วยโครงสร้างต่างออกไป"],"tipThai":"such + a + adj + noun + that; so + adj + that","passageId":null},{"id":"set5-q5","setId":5,"section":"grammar","skill":"past perfect continuous","difficulty":"gifted","question":"They were exhausted because they ______ all night to finish the model.","options":["worked","have worked","are working","had been working"],"correctAnswer":3,"explanationThai":"การกระทำต่อเนื่องยาวนานก่อนอีกเหตุการณ์ในอดีต (เหนื่อย) ใช้ Past Perfect Continuous: had been working","wrongAnswerExplanationsThai":["“worked” ไม่เน้นความต่อเนื่องก่อนหน้า","Present Perfect ไม่เข้ากับบริบทอดีตทั้งหมด","Present Continuous เป็นปัจจุบัน",""],"tipThai":"อธิบายสาเหตุในอดีตที่ต่อเนื่องมาก่อน: had been + V-ing","passageId":null},{"id":"set5-q6","setId":5,"section":"grammar","skill":"wish (past regret)","difficulty":"gifted","question":"I wish I ______ harder for the entrance exam; I might have passed.","options":["studied","study","have studied","had studied"],"correctAnswer":3,"explanationThai":"เสียใจกับอดีตที่ไม่เป็นจริง ใช้ wish + past perfect (had + V3): had studied","wrongAnswerExplanationsThai":["“studied” (past simple) ใช้กับ wish ที่หมายถึงปัจจุบัน ไม่ใช่อดีต","“study” เป็นปัจจุบัน","Present Perfect ไม่ใช้หลัง wish",""],"tipThai":"เสียใจกับอดีต: wish + had + V3","passageId":null},{"id":"set5-q7","setId":5,"section":"grammar","skill":"cleft sentence","difficulty":"gifted","question":"______ was her hard work that impressed the judges the most.","options":["It","That","There","Which"],"correctAnswer":0,"explanationThai":"ประโยคเน้น (cleft sentence) ขึ้นต้นด้วย It + be + สิ่งที่เน้น + that: It was her hard work that...","wrongAnswerExplanationsThai":["","“That” ไม่ใช้ขึ้นต้นโครงสร้าง cleft นี้","“There” ใช้กับ there is/are","“Which” ใช้ในอนุประโยค ไม่ใช่ขึ้นต้นเน้น"],"tipThai":"เน้นบางส่วนของประโยค: It + is/was + ส่วนที่เน้น + that...","passageId":null},{"id":"set5-q8","setId":5,"section":"grammar","skill":"correlative (not only...but also)","difficulty":"gifted","question":"The new app is not only easy to use ______ completely free.","options":["and","but also","or so","yet still"],"correctAnswer":1,"explanationThai":"คู่คำเชื่อม not only ต้องคู่กับ but also เสมอ","wrongAnswerExplanationsThai":["“and” ไม่ใช่คู่ของ not only","","“or so” ไม่ใช่คู่คำเชื่อม","“yet still” ไม่ใช่คู่ที่ถูกต้อง"],"tipThai":"จำคู่: not only...but also, both...and, either...or, neither...nor","passageId":null},{"id":"set5-q9","setId":5,"section":"vocabulary","skill":"vocabulary in context","difficulty":"gifted","question":"Despite the many ______ he faced, the young inventor never lost hope.","options":["rewards","holidays","festivals","obstacles"],"correctAnswer":3,"explanationThai":"“Despite... never lost hope” แสดงว่าเขาเผชิญอุปสรรค จึงตอบ obstacles","wrongAnswerExplanationsThai":["“rewards” = รางวัล เป็นบวก ไม่เข้ากับ despite","“holidays” = วันหยุด ไม่เกี่ยวข้อง","“festivals” = เทศกาล ไม่เข้ากับบริบท",""],"tipThai":"Despite + สิ่งที่เป็นอุปสรรค + ยังทำสำเร็จ: เดาว่าคำที่ขาดเป็นเชิงลบ","passageId":null},{"id":"set5-q10","setId":5,"section":"vocabulary","skill":"phrasal verbs","difficulty":"gifted","question":"Scientists refuse to ______ their research even when experiments fail repeatedly.","options":["give up","give up on","carry on with","take up"],"correctAnswer":2,"explanationThai":"carry on with = ทำต่อไป เข้ากับบริบทที่นักวิทยาศาสตร์ไม่ยอมแพ้แม้ล้มเหลว (ปฏิเสธที่จะ 'ไม่' ทำต่อ ทำให้ carry on with เหมาะสมกับความหมายว่ายังทำต่อ)","wrongAnswerExplanationsThai":["“give up” = ยอมแพ้ แต่ประโยคใช้ refuse to จึงต้องเป็นการ 'ทำต่อ' ไม่ใช่หยุด","“give up on” = เลิกล้มความหวังใน ก็ขัดกับ refuse to เช่นกัน","","“take up” = เริ่มทำ (งานอดิเรก/กิจกรรมใหม่) ไม่ใช่ทำต่อสิ่งที่มีอยู่"],"tipThai":"ระวัง refuse to + วลี: ความหมายรวมจะกลับด้าน จึงต้องเลือกวลีเชิงบวก (carry on)","passageId":null},{"id":"set5-q11","setId":5,"section":"vocabulary","skill":"academic vocabulary","difficulty":"gifted","question":"The results of the experiment were ______; the same thing happened every single time.","options":["consistent","random","doubtful","temporary"],"correctAnswer":0,"explanationThai":"“เกิดสิ่งเดียวกันทุกครั้ง” แสดงถึงความสม่ำเสมอ จึงตอบ consistent","wrongAnswerExplanationsThai":["","“random” = สุ่ม/ไม่แน่นอน ตรงข้าม","“doubtful” = น่าสงสัย ไม่เข้ากับ every single time","“temporary” = ชั่วคราว ไม่เกี่ยวข้อง"],"tipThai":"consistent = สม่ำเสมอ; ใช้อธิบายผลที่เหมือนกันทุกครั้ง","passageId":null},{"id":"set5-q12","setId":5,"section":"vocabulary","skill":"collocations","difficulty":"gifted","question":"The team managed to ______ their goal of raising 10,000 baht for charity.","options":["reach at","arrive","achieve","gain to"],"correctAnswer":2,"explanationThai":"คำที่ไปกับ goal คือ achieve: achieve a goal","wrongAnswerExplanationsThai":["“reach at” ผิด (reach ไม่ตามด้วย at), และควรเป็น reach a goal","“arrive” ต้องตามด้วย at/in และไม่ใช้กับ goal","","“gain to” ผิดไวยากรณ์"],"tipThai":"achieve/reach/meet a goal = บรรลุเป้าหมาย","passageId":null},{"id":"set5-q13","setId":5,"section":"vocabulary","skill":"word forms","difficulty":"gifted","question":"His ______ to keep trying, even after failing, inspired the whole team.","options":["determine","determined","determinedly","determination"],"correctAnswer":3,"explanationThai":"หลัง His ต้องการคำนาม จึงใช้ determination (ความมุ่งมั่น)","wrongAnswerExplanationsThai":["“determine” เป็นกริยา","“determined” เป็นคำคุณศัพท์","“determinedly” เป็นคำวิเศษณ์",""],"tipThai":"หลัง His/Her/The มักตามด้วยคำนาม (-tion, -ment, -ness)","passageId":null},{"id":"set5-q14","setId":5,"section":"conversation","skill":"diplomatic disagreement","difficulty":"gifted","question":"A: I'm sure our plan will work perfectly with no problems at all.\nB (politely doubtful): ______","options":["That may be true, but shouldn't we prepare a backup just in case?","You are completely wrong about everything.","Plans are documents written on paper.","Yes, nothing can ever go wrong."],"correctAnswer":0,"explanationThai":"การแสดงความไม่มั่นใจอย่างสุภาพพร้อมเสนอทางเลือกสำรองเป็นการตอบที่เหมาะสมและเป็นธรรมชาติ","wrongAnswerExplanationsThai":["","หยาบและไม่สุภาพเกินไป","ให้ข้อมูลทั่วไป ไม่ตอบบริบท","เห็นด้วยเกินจริง ไม่ใช่การสงสัยอย่างสุภาพ"],"tipThai":"สงสัยอย่างสุภาพ: That may be true, but... / I'm not so sure...","passageId":null},{"id":"set5-q15","setId":5,"section":"conversation","skill":"clarifying in group work","difficulty":"gifted","question":"During a group project, you don't understand your assigned task. What is the best thing to say?","options":["I'll just do something and hope it's right.","Could you explain exactly what you'd like me to do?","This project is a waste of time.","Someone else should do my part."],"correctAnswer":1,"explanationThai":"การถามให้อธิบายชัดเจนเป็นวิธีที่ดีที่สุดในการทำงานกลุ่มเมื่อไม่เข้าใจ","wrongAnswerExplanationsThai":["เดาสุ่มโดยไม่ถาม เสี่ยงต่อความผิดพลาด","","พูดเชิงลบ ไม่แก้ปัญหา","โยนงานให้ผู้อื่น ไม่รับผิดชอบ"],"tipThai":"ไม่เข้าใจ ให้ถามชัดเจน: Could you explain what you'd like me to do?","passageId":null},{"id":"set5-q16","setId":5,"section":"conversation","skill":"expressing partial agreement","difficulty":"gifted","question":"A: Students should be allowed to use phones freely in class.\nB: ______","options":["I agree to some extent, but only for learning activities.","Phones are electronic devices.","No one should ever use a phone.","I have three phones at home."],"correctAnswer":0,"explanationThai":"“I agree to some extent, but...” เป็นการเห็นด้วยบางส่วนอย่างสมเหตุสมผล เหมาะกับการอภิปราย","wrongAnswerExplanationsThai":["","ให้ข้อมูลทั่วไป ไม่แสดงจุดยืน","เห็นต่างสุดโต่งโดยไม่มีเหตุผล","ไม่เกี่ยวข้องกับประเด็น"],"tipThai":"เห็นด้วยบางส่วน: I agree to some extent, but... / That's partly true...","passageId":null},{"id":"set5-q17","setId":5,"section":"conversation","skill":"encouraging others","difficulty":"gifted","question":"Your friend is nervous before a speech contest. What is the most supportive thing to say?","options":["Don't worry, everyone will forget you soon.","You should have practised more.","You've worked really hard for this—just take a deep breath and do your best.","If you fail, it's not a big deal anyway."],"correctAnswer":2,"explanationThai":"การให้กำลังใจที่ดีคือการยอมรับความพยายามและช่วยให้เพื่อนสงบและมั่นใจ","wrongAnswerExplanationsThai":["ฟังดูเชิงลบและไม่ให้กำลังใจ","เป็นการตำหนิ ไม่ใช่การให้กำลังใจ","","ลดคุณค่าความพยายามของเพื่อน"],"tipThai":"ให้กำลังใจ: You've worked hard / You can do this / Just do your best","passageId":null},{"id":"set5-q18","setId":5,"section":"cloze","skill":"cloze passage","difficulty":"gifted","question":"Cloze: \"He practised the speech many times. ______, he still felt nervous when he stood up.\"","options":["As a result","For instance","Similarly","Nevertheless"],"correctAnswer":3,"explanationThai":"ฝึกหลายครั้งแต่ยังประหม่า เป็นความขัดแย้ง ใช้ Nevertheless (อย่างไรก็ตาม)","wrongAnswerExplanationsThai":["“As a result” บอกผลลัพธ์ ไม่ใช่ความขัดแย้ง","“For instance” ยกตัวอย่าง","“Similarly” แสดงความคล้าย",""],"tipThai":"Nevertheless / Nonetheless = อย่างไรก็ตาม (เชื่อมความขัดแย้งแบบทางการ)","passageId":null},{"id":"set5-q19","setId":5,"section":"cloze","skill":"error identification","difficulty":"gifted","question":"Find the error: \"The more you practise, (A) the better (B) you will became (C) at speaking English. (D)\"","options":["A","B","C","D"],"correctAnswer":2,"explanationThai":"หลัง will ต้องใช้กริยาช่องหนึ่ง (become) ไม่ใช่ became ดังนั้นผิดที่ (C)","wrongAnswerExplanationsThai":["(A) The more you practise ถูกต้อง","(B) the better ถูกต้อง (โครงสร้าง the more...the better)","","(D) at speaking English ถูกต้อง"],"tipThai":"will + V1 เสมอ (will become ไม่ใช่ will became)","passageId":null},{"id":"set5-q20","setId":5,"section":"cloze","skill":"error identification","difficulty":"gifted","question":"Find the error: \"Not only (A) she sings (B) beautifully, but she also (C) plays the piano. (D)\"","options":["A","B","C","D"],"correctAnswer":1,"explanationThai":"เมื่อขึ้นต้นด้วย Not only ต้องสลับกริยาช่วยมาก่อนประธาน: Not only does she sing ดังนั้นส่วน (B) she sings ต้องแก้เป็น does she sing จึงผิดที่ (B)","wrongAnswerExplanationsThai":["(A) Not only ถูกต้องในการขึ้นต้น","","(C) but she also ถูกต้อง","(D) plays the piano ถูกต้อง"],"tipThai":"ขึ้นต้นด้วย Not only → ต้องมี inversion (Not only does she sing...)","passageId":null},{"id":"set5-q21","setId":5,"section":"reading","skill":"main idea","difficulty":"gifted","question":"What is the best summary of the passage?","options":["A boy became rich by selling windmills.","A young person overcame poverty and doubt to bring electricity to his community through curiosity and determination.","A village refused to accept new technology.","Science can only be learned at a famous school."],"correctAnswer":1,"explanationThai":"ใจความหลักคือเยาวชนที่เอาชนะความยากจนและเสียงหัวเราะ ด้วยความอยากรู้และความมุ่งมั่น จนนำไฟฟ้ามาสู่ชุมชน","wrongAnswerExplanationsThai":["เรื่องไม่ได้เน้นเรื่องความร่ำรวย","","ตรงข้าม สุดท้ายหมู่บ้านได้ประโยชน์","เรื่องแสดงว่าเรียนรู้ได้แม้ไม่มีโรงเรียนดัง"],"tipThai":"สรุปเรื่องต้องรวมทั้งปัญหา วิธีแก้ และผลลัพธ์","passageId":"set5-r1"},{"id":"set5-q22","setId":5,"section":"reading","skill":"inference","difficulty":"gifted","question":"Why did the villagers laugh at William at first?","options":["Because he refused to go to school","Because they thought collecting junk to build a windmill was foolish","Because he had too much money","Because he broke their bicycles"],"correctAnswer":1,"explanationThai":"ชาวบ้านเห็นเด็กผอมเก็บของจากกองขยะและไม่เข้าใจแผนของเขา จึงคิดว่าการสร้างกังหันลมจากเศษของเป็นเรื่องไร้สาระ","wrongAnswerExplanationsThai":["เขาไม่ได้ปฏิเสธโรงเรียน แต่ครอบครัวไม่มีเงินส่ง","","ตรงข้าม ครอบครัวยากจน","เขาเก็บจักรยานที่พังแล้ว ไม่ได้ทำพัง"],"tipThai":"คำถาม inference ให้เลือกคำตอบที่สอดคล้องกับเหตุการณ์และเหตุผลในเรื่อง","passageId":"set5-r1"},{"id":"set5-q23","setId":5,"section":"reading","skill":"vocabulary in context","difficulty":"gifted","question":"In the passage, the phrase \"a lack of resources is not the same as a lack of ideas\" mainly means ______.","options":["being poor does not mean being unable to think creatively","ideas are more expensive than resources","people with no money have no ideas","resources and ideas are exactly the same"],"correctAnswer":0,"explanationThai":"ประโยคนี้สื่อว่าการขาดทรัพยากร (ยากจน) ไม่ได้แปลว่าขาดความคิดสร้างสรรค์","wrongAnswerExplanationsThai":["","ไม่ได้เปรียบเทียบราคา","ตรงข้ามกับความหมายของเรื่อง","ประโยคบอกว่าสองสิ่งนี้ต่างกัน ไม่เหมือนกัน"],"tipThai":"ตีความประโยคเชิงเปรียบเทียบโดยดูใจความรวมของเรื่อง","passageId":"set5-r1"},{"id":"set5-q24","setId":5,"section":"reading","skill":"author's purpose","difficulty":"gifted","question":"Why does the author end with the question \"What if I tried?\"","options":["To show that William was confused","To suggest that readers should never ask questions","To prove windmills are easy to build","To inspire readers to attempt things despite doubt"],"correctAnswer":3,"explanationThai":"คำถามปิดท้ายมีจุดประสงค์เพื่อสร้างแรงบันดาลใจให้ผู้อ่านกล้าลงมือทำแม้จะมีความสงสัย","wrongAnswerExplanationsThai":["ไม่ได้แสดงความสับสน","ตรงข้าม เรื่องส่งเสริมการตั้งคำถาม","ไม่ได้บอกว่ากังหันลมสร้างง่าย",""],"tipThai":"ประโยคปิดท้ายมักสรุปแนวคิดหลักหรือสร้างแรงบันดาลใจ","passageId":"set5-r1"},{"id":"set5-q25","setId":5,"section":"reading","skill":"inference","difficulty":"gifted","question":"What can we most reasonably infer about William's character?","options":["He gives up quickly when others doubt him.","He depends completely on others for ideas.","He is resourceful and refuses to be limited by his situation.","He dislikes helping other people."],"correctAnswer":2,"explanationThai":"จากการที่เขาเรียนรู้ด้วยตนเอง หาชิ้นส่วนจากของเหลือใช้ และไม่ยอมแพ้ อนุมานได้ว่าเขาเป็นคนแก้ปัญหาเก่งและไม่ยอมให้สถานการณ์จำกัดตนเอง","wrongAnswerExplanationsThai":["ตรงข้าม เขาไม่ยอมแพ้ต่อเสียงหัวเราะ","ตรงข้าม เขาเรียนรู้ด้วยตนเอง","","ตรงข้าม เขาสร้างกังหันช่วยเพื่อนบ้าน"],"tipThai":"อนุมานนิสัยจากพฤติกรรมหลาย ๆ อย่างในเรื่องรวมกัน","passageId":"set5-r1"},{"id":"set6-q1","setId":6,"section":"grammar","skill":"participle clause","difficulty":"advanced","question":"______ the exam early, she had plenty of time to check her answers twice.","options":["Finish","Having finished","To finish","Finished"],"correctAnswer":1,"explanationThai":"ใช้ perfect participle (Having + V3) เพื่อบอกเหตุการณ์ที่เกิดก่อนและเป็นเหตุให้อีกเหตุการณ์: Having finished","wrongAnswerExplanationsThai":["“Finish” เป็นกริยาฐาน ใช้ขึ้นต้นวลีแบบนี้ไม่ได้","","“To finish” เป็น infinitive ไม่แสดงว่าเกิดก่อน","“Finished” เดี่ยว ๆ สื่อ passive/adjective ไม่ตรงบริบทที่เธอเป็นผู้ทำ"],"tipThai":"เหตุการณ์เกิดก่อนและจบแล้ว ใช้ Having + V3 ขึ้นต้นวลี","passageId":null},{"id":"set6-q2","setId":6,"section":"grammar","skill":"modal perfect (deduction)","difficulty":"advanced","question":"The ground is wet this morning. It ______ during the night.","options":["must have rained","must rain","should rain","can rain"],"correctAnswer":0,"explanationThai":"สรุปเกี่ยวกับอดีตอย่างมั่นใจจากหลักฐาน ใช้ must have + V3: must have rained","wrongAnswerExplanationsThai":["","“must rain” เป็นปัจจุบัน ไม่ใช่การสรุปอดีต","“should rain” = ควรจะฝนตก ไม่ใช่การสรุป","“can rain” = สามารถฝนตกได้ ไม่ใช่การสรุปเหตุการณ์ที่เกิดแล้ว"],"tipThai":"สรุปอดีตอย่างมั่นใจ: must have + V3; อาจจะ: might/could have + V3","passageId":null},{"id":"set6-q3","setId":6,"section":"grammar","skill":"passive with reporting verb","difficulty":"advanced","question":"The ancient temple ______ to be more than a thousand years old.","options":["believes","is believing","has believed","is believed"],"correctAnswer":3,"explanationThai":"โครงสร้าง passive กับกริยารายงาน: It is believed / The temple is believed to be...","wrongAnswerExplanationsThai":["“believes” เป็น active ประธานต้องเป็นผู้เชื่อ","Present Continuous ไม่เข้ากับ state verb และความหมาย passive","Present Perfect active ไม่ตรงความหมาย",""],"tipThai":"is said/believed/thought/known + to + V1 = ว่ากันว่า/เชื่อกันว่า","passageId":null},{"id":"set6-q4","setId":6,"section":"grammar","skill":"collective nouns agreement","difficulty":"advanced","question":"The committee ______ divided over how to spend the school budget.","options":["is being","has","were being","was"],"correctAnswer":3,"explanationThai":"committee เป็นคำนามหมู่ ในความหมายเป็นหน่วยเดียว ใช้กริยาเอกพจน์อดีต was (divided = adjective บอกสภาพ)","wrongAnswerExplanationsThai":["“is being” เป็นปัจจุบันและ continuous ไม่เข้ากับสภาพ divided","“has divided” เปลี่ยนความหมายเป็น active perfect","“were being” เป็นพหูพจน์และ continuous ไม่เหมาะกับบริบทนี้",""],"tipThai":"committee/team/government มองเป็นหน่วยเดียว มักใช้กริยาเอกพจน์","passageId":null},{"id":"set6-q5","setId":6,"section":"grammar","skill":"gerund vs infinitive (meaning change)","difficulty":"advanced","question":"I'll never forget ______ the ocean for the first time; it was breathtaking.","options":["seeing","to see","to seeing","saw"],"correctAnswer":0,"explanationThai":"forget + V-ing หมายถึงจำเหตุการณ์ในอดีตได้ (ไม่ลืมความทรงจำ) จึงใช้ seeing","wrongAnswerExplanationsThai":["","forget + to V หมายถึงลืมที่จะทำ (ไม่ได้ทำ) ซึ่งขัดกับบริบทที่เธอเห็นแล้ว","“to seeing” ผิดไวยากรณ์","“saw” เป็นกริยาช่องสอง ใช้หลัง forget ไม่ได้"],"tipThai":"forget/remember + V-ing = จำอดีตได้; + to V = จำ/ลืมที่จะทำ","passageId":null},{"id":"set6-q6","setId":6,"section":"grammar","skill":"inversion (conditional)","difficulty":"advanced","question":"______ I known about the traffic, I would have left home much earlier.","options":["If","Should","When","Had"],"correctAnswer":3,"explanationThai":"เงื่อนไขที่ 3 แบบละ if ใช้ inversion: Had + ประธาน + V3 = Had I known","wrongAnswerExplanationsThai":["“If” จะต้องตามด้วย I had known ไม่ใช่ I known","“Should” ใช้กับเงื่อนไขที่ 1 แบบเป็นทางการ (Should you need...)","“When” ไม่ใช่โครงสร้างเงื่อนไขที่ 3",""],"tipThai":"Had + S + V3 = If + S + had + V3 (เงื่อนไขที่ 3 แบบละ if)","passageId":null},{"id":"set6-q7","setId":6,"section":"grammar","skill":"relative clause (quantifier + whom/which)","difficulty":"advanced","question":"She has three older brothers, all of ______ work as engineers.","options":["who","whom","which","them"],"correctAnswer":1,"explanationThai":"หลังบุพบท of ที่ขยายคน ใช้ whom: all of whom","wrongAnswerExplanationsThai":["“who” ไม่ใช้หลังบุพบท of","","“which” ใช้กับสิ่งของ ไม่ใช่คน","“them” ทำให้เกิดสองประโยคโดยไม่มีตัวเชื่อม (comma splice)"],"tipThai":"หลัง of/to/with ที่อ้างถึงคน ใช้ whom (some of whom, all of whom)","passageId":null},{"id":"set6-q8","setId":6,"section":"grammar","skill":"future continuous","difficulty":"advanced","question":"Don't call me at 8 p.m.; I ______ my online class then.","options":["will attend","attend","will be attending","have attended"],"correctAnswer":2,"explanationThai":"เหตุการณ์ที่จะกำลังดำเนินอยู่ ณ เวลาหนึ่งในอนาคต ใช้ Future Continuous: will be attending","wrongAnswerExplanationsThai":["“will attend” เป็นอนาคตธรรมดา ไม่เน้นว่ากำลังดำเนินอยู่ในช่วงเวลานั้น","“attend” เป็นปัจจุบัน","","Present Perfect ไม่เข้ากับ then (อนาคต)"],"tipThai":"at + เวลาในอนาคต + กำลังทำอยู่ ให้นึกถึง will be + V-ing","passageId":null},{"id":"set6-q9","setId":6,"section":"vocabulary","skill":"vocabulary in context","difficulty":"advanced","question":"Her explanation was so ______ that no one had any further questions.","options":["thorough","careless","brief and unclear","doubtful"],"correctAnswer":0,"explanationThai":"ไม่มีใครมีคำถามเพิ่ม แสดงว่าคำอธิบายครบถ้วนละเอียด จึงตอบ thorough","wrongAnswerExplanationsThai":["","“careless” = สะเพร่า ตรงข้าม","“brief and unclear” = สั้นและไม่ชัด ขัดกับผลลัพธ์","“doubtful” = น่าสงสัย ไม่เข้ากับ no further questions"],"tipThai":"thorough = ละเอียดครบถ้วน; ใช้ผลลัพธ์ในประโยคช่วยเดา","passageId":null},{"id":"set6-q10","setId":6,"section":"vocabulary","skill":"phrasal verbs","difficulty":"advanced","question":"The meeting was ______ until next week because the manager was ill.","options":["put up","turned down","put off","brought up"],"correctAnswer":2,"explanationThai":"put off = เลื่อนออกไป เข้ากับบริบทเลื่อนประชุมไปสัปดาห์หน้า","wrongAnswerExplanationsThai":["“put up” = สร้าง/พักค้าง","“turned down” = ปฏิเสธ/ลดเสียง","","“brought up” = เลี้ยงดู/หยิบยกประเด็น"],"tipThai":"put off = postpone = delay (เลื่อนเวลาออกไป)","passageId":null},{"id":"set6-q11","setId":6,"section":"vocabulary","skill":"academic vocabulary","difficulty":"advanced","question":"The two studies reached ______ conclusions, so scientists need more research.","options":["identical","similar","conflicting","boring"],"correctAnswer":2,"explanationThai":"“จึงต้องวิจัยเพิ่ม” แสดงว่าผลขัดแย้งกัน จึงตอบ conflicting","wrongAnswerExplanationsThai":["“identical” = เหมือนกันทุกอย่าง ไม่ต้องวิจัยเพิ่ม","“similar” = คล้ายกัน ก็ไม่ก่อความจำเป็นต้องวิจัยเพิ่มขนาดนั้น","","“boring” = น่าเบื่อ ไม่เกี่ยวกับข้อสรุป"],"tipThai":"conflicting/contradictory = ขัดแย้งกัน (คำสำคัญเชิงวิชาการ)","passageId":null},{"id":"set6-q12","setId":6,"section":"vocabulary","skill":"collocations","difficulty":"advanced","question":"Students are expected to ______ the school rules at all times.","options":["follow up","obey","respect for","agree"],"correctAnswer":1,"explanationThai":"คำที่ไปกับ rules คือ obey/follow: obey the rules","wrongAnswerExplanationsThai":["“follow up” = ติดตามผล ไม่ใช่ปฏิบัติตามกฎ","","“respect for” ผิดไวยากรณ์ (respect ไม่ตามด้วย for ในรูปกริยา)","“agree” ต้องมี with/to และความหมายไม่ตรง"],"tipThai":"obey/follow/keep the rules = ปฏิบัติตามกฎ","passageId":null},{"id":"set6-q13","setId":6,"section":"vocabulary","skill":"word forms","difficulty":"advanced","question":"The government introduced new laws to reduce air ______ in big cities.","options":["pollute","polluted","pollary","pollution"],"correctAnswer":3,"explanationThai":"หลัง air ต้องการคำนาม จึงใช้ pollution (มลพิษ)","wrongAnswerExplanationsThai":["“pollute” เป็นกริยา","“polluted” เป็นคำคุณศัพท์/กริยาช่อง 3","“pollary” ไม่มีคำนี้",""],"tipThai":"air pollution เป็นคู่คำนาม; -tion มักเป็นคำนาม","passageId":null},{"id":"set6-q14","setId":6,"section":"conversation","skill":"softening bad news","difficulty":"advanced","question":"You must tell a classmate you cannot join their team. What is the most polite way?","options":["I won't join your boring team.","No. Find someone else.","I'm really sorry, but I won't be able to join this time.","Teams are not important to me."],"correctAnswer":2,"explanationThai":"การปฏิเสธอย่างสุภาพพร้อมคำขอโทษเป็นวิธีที่เหมาะสมที่สุด","wrongAnswerExplanationsThai":["ใช้คำเชิงลบ ไม่สุภาพ","สั้นห้วนและไม่สุภาพ","","ดูถูกความสำคัญของทีม ไม่สุภาพ"],"tipThai":"ปฏิเสธสุภาพ: I'm sorry, but I won't be able to... / I'm afraid I can't...","passageId":null},{"id":"set6-q15","setId":6,"section":"conversation","skill":"managing group discussion","difficulty":"advanced","question":"In a discussion, you want to add an idea after someone finishes. What do you say?","options":["Can I just add one point to what you said?","Stop talking, it's my turn now.","Your idea is completely useless.","I wasn't listening, sorry."],"correctAnswer":0,"explanationThai":"การขอเสริมความเห็นอย่างสุภาพหลังคนอื่นพูดจบเป็นมารยาทที่ดีในการอภิปราย","wrongAnswerExplanationsThai":["","สั่งให้คนอื่นหยุด ไม่สุภาพ","ดูถูกความเห็นผู้อื่น","แสดงว่าไม่ตั้งใจฟัง ไม่เหมาะสม"],"tipThai":"เสริมความเห็นสุภาพ: Can I add...? / I'd like to build on that...","passageId":null},{"id":"set6-q16","setId":6,"section":"conversation","skill":"responding to compliments","difficulty":"advanced","question":"A: Your presentation was excellent! You explained everything so clearly.\nB: ______","options":["Yes, I am the best in the class.","No, it was terrible and I hated it.","Thank you so much. I practised a lot for it.","Presentations are given with slides."],"correctAnswer":2,"explanationThai":"การตอบคำชมอย่างสุภาพและถ่อมตนคือขอบคุณพร้อมกล่าวถึงความพยายาม","wrongAnswerExplanationsThai":["โอ้อวดเกินไป ไม่สุภาพ","ปฏิเสธคำชมแรงเกินไปและดูไม่จริงใจ","","ให้ข้อมูลทั่วไป ไม่ตอบคำชม"],"tipThai":"รับคำชม: Thank you + ความคิดเห็นสั้น ๆ (เช่น กล่าวถึงความพยายาม)","passageId":null},{"id":"set6-q17","setId":6,"section":"conversation","skill":"negotiating","difficulty":"advanced","question":"A: Can you finish the whole report by tomorrow morning?\nB (needs more time, politely): ______","options":["No way, that's impossible for anyone.","Tomorrow is a day after today.","Yes, of course, no problem at all!","Would it be possible to have until tomorrow evening instead?"],"correctAnswer":3,"explanationThai":"การขอต่อรองเวลาส่งงานอย่างสุภาพด้วย “Would it be possible...?” เหมาะสมที่สุด","wrongAnswerExplanationsThai":["ปฏิเสธห้วนเกินไป ไม่สุภาพ","ให้ข้อมูลทั่วไป ไม่ต่อรอง","รับปากทั้งที่ต้องการเวลาเพิ่ม ขัดกับสถานการณ์",""],"tipThai":"ต่อรองสุภาพ: Would it be possible to...? / Could we perhaps...?","passageId":null},{"id":"set6-q18","setId":6,"section":"cloze","skill":"cloze passage","difficulty":"advanced","question":"Cloze: \"The bridge was closed for repairs. ______, drivers had to take a much longer route.\"","options":["As a result","In contrast","For example","Meanwhile"],"correctAnswer":0,"explanationThai":"สะพานปิดเป็นเหตุ ทำให้ต้องอ้อมไกลเป็นผล ใช้ As a result (ด้วยเหตุนี้)","wrongAnswerExplanationsThai":["","“In contrast” แสดงความตรงข้าม","“For example” ยกตัวอย่าง","“Meanwhile” = ในขณะเดียวกัน ไม่ใช่เหตุ-ผล"],"tipThai":"เหตุ → ผล: As a result / Therefore / Consequently","passageId":null},{"id":"set6-q19","setId":6,"section":"cloze","skill":"error identification","difficulty":"advanced","question":"Find the error: \"The number of students (A) who join the club (B) have increased (C) sharply this year. (D)\"","options":["A","B","C","D"],"correctAnswer":2,"explanationThai":"ประธานคือ “The number of students” ซึ่งเป็นเอกพจน์ ต้องใช้ has increased ไม่ใช่ have increased ผิดที่ (C)","wrongAnswerExplanationsThai":["(A) The number of students เป็นประธานที่ถูกต้อง","(B) who join the club ถูกต้อง","","(D) sharply this year ถูกต้อง"],"tipThai":"The number of + พหูพจน์ = เอกพจน์ (ใช้ has/is); A number of = พหูพจน์","passageId":null},{"id":"set6-q20","setId":6,"section":"cloze","skill":"error identification","difficulty":"advanced","question":"Find the error: \"Despite of (A) the heavy rain, (B) the team continued (C) the match. (D)\"","options":["A","B","C","D"],"correctAnswer":0,"explanationThai":"Despite ตามด้วยคำนามโดยตรง ไม่ต้องมี of (ต่างจาก in spite of) ดังนั้นผิดที่ (A)","wrongAnswerExplanationsThai":["","(B) the heavy rain ถูกต้อง","(C) the team continued ถูกต้อง","(D) the match ถูกต้อง"],"tipThai":"Despite + คำนาม; In spite of + คำนาม (อย่าปน Despite of)","passageId":null},{"id":"set6-q21","setId":6,"section":"reading","skill":"main idea","difficulty":"advanced","question":"What is the main idea of the passage?","options":["Students should never study at night.","Sleeping eight hours is impossible for students.","Sleep is an active and essential part of learning, not wasted time.","The brain switches off completely during sleep."],"correctAnswer":2,"explanationThai":"ใจความหลักคือการนอนเป็นส่วนสำคัญและกระตือรือร้นของการเรียนรู้ ไม่ใช่เวลาที่เสียเปล่า","wrongAnswerExplanationsThai":["เรื่องไม่ได้ห้ามเรียนตอนกลางคืนโดยสิ้นเชิง แต่เน้นความสำคัญของการนอน","เรื่องไม่ได้บอกว่าเป็นไปไม่ได้","","ตรงข้าม เรื่องบอกว่าสมองยังทำงานหนักขณะหลับ"],"tipThai":"ใจความหลักคือข้อสรุปที่เรื่องย้ำหลายครั้ง","passageId":"set6-r1"},{"id":"set6-q22","setId":6,"section":"reading","skill":"detail","difficulty":"advanced","question":"In the experiment mentioned, which group remembered more words?","options":["The group that slept for eight hours","The group that stayed awake all night","Both groups remembered the same amount","Neither group remembered anything"],"correctAnswer":0,"explanationThai":"เรื่องระบุว่ากลุ่มที่นอนแปดชั่วโมงจำได้มากกว่ากลุ่มที่อดนอนอย่างชัดเจน","wrongAnswerExplanationsThai":["","ตรงข้าม กลุ่มอดนอนจำได้น้อยกว่า","เรื่องบอกว่าต่างกันชัดเจน","เรื่องบอกว่ากลุ่มที่นอนจำได้มาก"],"tipThai":"หาคำสำคัญ (experiment) แล้วอ่านผลที่เรื่องระบุ","passageId":"set6-r1"},{"id":"set6-q23","setId":6,"section":"reading","skill":"inference","difficulty":"advanced","question":"What does the passage suggest about students who say they \"can't concentrate\"?","options":["They are always lazy.","Some of them may simply need more sleep.","They should study even longer hours.","They will never improve."],"correctAnswer":1,"explanationThai":"เรื่องระบุว่านักเรียนบางคนที่บ่นว่าไม่มีสมาธิไม่ได้ขี้เกียจ แต่เพียงเหนื่อยล้า อนุมานได้ว่าบางคนอาจต้องการนอนมากขึ้น","wrongAnswerExplanationsThai":["ตรงข้าม เรื่องบอกว่าพวกเขาไม่ได้ขี้เกียจ","","ตรงข้าม การเรียนนานขึ้นโดยอดนอนยิ่งแย่","เรื่องไม่ได้บอกว่าจะไม่มีวันดีขึ้น"],"tipThai":"inference: เชื่อมข้อมูลในเรื่อง (เหนื่อยล้า) กับคำตอบที่สมเหตุสมผล","passageId":"set6-r1"},{"id":"set6-q24","setId":6,"section":"reading","skill":"vocabulary in context","difficulty":"advanced","question":"In the passage, the word \"strengthens\" is closest in meaning to ______.","options":["removes","weakens","makes stronger","copies"],"correctAnswer":2,"explanationThai":"strengthens หมายถึง ทำให้แข็งแรงขึ้น ตรงกับ makes stronger","wrongAnswerExplanationsThai":["“removes” = กำจัด ไม่ตรง","“weakens” = ทำให้อ่อนแอ ตรงข้าม","","“copies” = คัดลอก ไม่ตรง"],"tipThai":"รากศัพท์ strong → strengthen = ทำให้แข็งแรงขึ้น","passageId":"set6-r1"},{"id":"set6-q25","setId":6,"section":"reading","skill":"author's purpose","difficulty":"advanced","question":"What is the author mainly trying to persuade readers to do?","options":["Value and protect their sleep as part of studying","Stop going to school","Sleep during class time","Avoid all experiments"],"correctAnswer":0,"explanationThai":"ผู้เขียนต้องการโน้มน้าวให้ผู้อ่านเห็นคุณค่าและปกป้องการนอนในฐานะส่วนหนึ่งของการเรียน","wrongAnswerExplanationsThai":["","ไม่มีการแนะนำให้เลิกเรียน","ไม่ได้บอกให้นอนในห้องเรียน","ไม่ได้บอกให้หลีกเลี่ยงการทดลอง"],"tipThai":"จุดประสงค์โน้มน้าวดูจากข้อสรุปที่ผู้เขียนอยากให้ผู้อ่านทำตาม","passageId":"set6-r1"},{"id":"set7-q1","setId":7,"section":"grammar","skill":"inverted conditional (no if)","difficulty":"mastery","question":"______ you to arrive before nine, you would still have enough time for the interview.","options":["If","Had","Were","Should"],"correctAnswer":2,"explanationThai":"เงื่อนไขที่ 2 แบบละ if ใช้ inversion: Were + ประธาน + to + V1 = Were you to arrive","wrongAnswerExplanationsThai":["“If” ต้องตามด้วย you were to arrive ไม่ใช่ you to arrive","“Had” ใช้กับเงื่อนไขที่ 3 (Had you arrived)","","“Should” ใช้กับเงื่อนไขแบบไม่แน่นอน (Should you arrive) แต่โครงสร้างนี้มี to arrive จึงต้องใช้ Were"],"tipThai":"Were + S + to + V1 = โครงสร้างเงื่อนไขที่ 2 แบบเป็นทางการ (ละ if)","passageId":null},{"id":"set7-q2","setId":7,"section":"grammar","skill":"no sooner...than","difficulty":"mastery","question":"No sooner ______ the classroom than the fire alarm went off.","options":["had we entered","we had entered","we entered","did we entered"],"correctAnswer":0,"explanationThai":"No sooner ขึ้นต้นประโยคต้องใช้ inversion กับ Past Perfect: No sooner had we entered... than...","wrongAnswerExplanationsThai":["","ไม่มี inversion หลัง No sooner","ไม่มี inversion และผิด tense","“did we entered” ผิดหลัก (did + V1) และไม่ใช่โครงสร้างนี้"],"tipThai":"No sooner had + S + V3 + than + Past Simple","passageId":null},{"id":"set7-q3","setId":7,"section":"grammar","skill":"subjunctive (were)","difficulty":"mastery","question":"If she ______ in charge, she would organise the whole event differently.","options":["is","were","has been","will be"],"correctAnswer":1,"explanationThai":"เงื่อนไขที่ 2 ที่ไม่จริงในปัจจุบัน ใช้ were กับทุกประธาน (subjunctive): If she were","wrongAnswerExplanationsThai":["“is” เป็นข้อเท็จจริงปัจจุบัน ไม่เข้ากับเงื่อนไขไม่จริง","","Present Perfect ไม่เข้ากับโครงสร้างเงื่อนไขที่ 2","“will be” ไม่ใช้หลัง if ในเงื่อนไขนี้"],"tipThai":"เงื่อนไขที่ 2 ใช้ were กับทุกประธาน (If I were you...)","passageId":null},{"id":"set7-q4","setId":7,"section":"grammar","skill":"passive infinitive","difficulty":"mastery","question":"These rare documents are far too valuable ______ without special gloves.","options":["to touch","touching","to be touched","touched"],"correctAnswer":2,"explanationThai":"โครงสร้าง too + adjective + passive infinitive: too valuable to be touched (เอกสารเป็นสิ่งที่ถูกแตะ)","wrongAnswerExplanationsThai":["“to touch” เป็น active ทำให้ความหมายเป็นเอกสารไปแตะสิ่งอื่น","“touching” ไม่เข้ากับ too...to","","“touched” เดี่ยว ๆ ไม่ครบโครงสร้าง too...to"],"tipThai":"เมื่อประธานเป็นสิ่งที่ถูกกระทำใน too...to ใช้ to be + V3","passageId":null},{"id":"set7-q5","setId":7,"section":"grammar","skill":"mixed conditional","difficulty":"mastery","question":"If he weren't so careless, he ______ his passport at the airport yesterday.","options":["won't lose","wouldn't lose","wouldn't have lost","didn't lose"],"correctAnswer":2,"explanationThai":"เงื่อนไขผสม: เหตุเป็นลักษณะปัจจุบัน (weren't careless) แต่ผลอยู่ในอดีต (yesterday) จึงใช้ wouldn't have + V3","wrongAnswerExplanationsThai":["“won't lose” เป็นอนาคต ไม่เข้ากับ yesterday","“wouldn't lose” เป็นผลปัจจุบัน/อนาคต ไม่ใช่ผลในอดีต","","“didn't lose” เป็นข้อเท็จจริงอดีต ไม่ใช่ผลของเงื่อนไข"],"tipThai":"เหตุปัจจุบันถาวร + ผลในอดีต: If + were, would have + V3","passageId":null},{"id":"set7-q6","setId":7,"section":"grammar","skill":"emphatic do","difficulty":"mastery","question":"I know you doubt me, but I ______ finish all the exercises last night.","options":["do","am","did","have"],"correctAnswer":2,"explanationThai":"ใช้ emphatic “did” เพื่อเน้นย้ำว่าทำจริงในอดีต (last night): I did finish","wrongAnswerExplanationsThai":["“do” เป็นปัจจุบัน ไม่เข้ากับ last night","“am” ไม่ใช่กริยาช่วยที่เน้นการกระทำนี้","","“have” ต้องตามด้วย V3 (finished) จึงผิดโครงสร้างกับ finish"],"tipThai":"เน้นย้ำว่าทำจริง: do/does/did + V1 (I did do it!)","passageId":null},{"id":"set7-q7","setId":7,"section":"grammar","skill":"concord (each/every)","difficulty":"mastery","question":"Every one of the finalists ______ given three minutes to present an idea.","options":["was","were","have been","are"],"correctAnswer":0,"explanationThai":"“Every one of + พหูพจน์” ถือเป็นเอกพจน์ กริยาจึงเป็น was","wrongAnswerExplanationsThai":["","“were” เป็นพหูพจน์ ไม่เข้ากับ every one","“have been” เป็นพหูพจน์และ tense ไม่สอดคล้อง","“are” เป็นพหูพจน์ปัจจุบัน"],"tipThai":"every one of / each of + กริยาเอกพจน์","passageId":null},{"id":"set7-q8","setId":7,"section":"grammar","skill":"cleft (what-clause)","difficulty":"mastery","question":"______ impressed the judges was not his talent but his hard work.","options":["That","It","Which","What"],"correctAnswer":3,"explanationThai":"ประโยคเน้นด้วย what-cleft: What impressed the judges was... (สิ่งที่ทำให้ประทับใจคือ...)","wrongAnswerExplanationsThai":["“That” ไม่ขึ้นต้นโครงสร้าง cleft แบบนี้","“It” ต้องใช้รูป It was...that","“Which” ใช้ในอนุประโยค ไม่ขึ้นต้นประโยคเน้นนี้",""],"tipThai":"What + ประโยค + is/was + สิ่งที่เน้น (What I need is time)","passageId":null},{"id":"set7-q9","setId":7,"section":"vocabulary","skill":"vocabulary in context","difficulty":"mastery","question":"The volunteers were praised for their ______; they helped for years without asking for any reward.","options":["curiosity","generosity","confidence","honesty"],"correctAnswer":1,"explanationThai":"ช่วยเหลือหลายปีโดยไม่หวังผลตอบแทน แสดงถึงความเอื้อเฟื้อเผื่อแผ่ จึงตอบ generosity","wrongAnswerExplanationsThai":["“curiosity” = ความอยากรู้ ไม่ตรงบริบทการเสียสละ","","“confidence” = ความมั่นใจ ไม่ตรง","“honesty” = ความซื่อสัตย์ ไม่ตรงกับการให้โดยไม่หวังผล"],"tipThai":"generosity = ความเอื้อเฟื้อ/ใจกว้าง (ให้โดยไม่หวังผลตอบแทน)","passageId":null},{"id":"set7-q10","setId":7,"section":"vocabulary","skill":"phrasal verbs","difficulty":"mastery","question":"We shouldn't ______ old traditions simply because they are old; some are still valuable.","options":["do away with","look forward to","come across","catch up with"],"correctAnswer":0,"explanationThai":"do away with = กำจัด/เลิก (ประเพณี) เข้ากับบริบทที่ไม่ควรทิ้งประเพณีเก่า","wrongAnswerExplanationsThai":["","“look forward to” = ตั้งตารอ","“come across” = พบโดยบังเอิญ","“catch up with” = ตามให้ทัน"],"tipThai":"do away with = get rid of = abolish (เลิก/กำจัด)","passageId":null},{"id":"set7-q11","setId":7,"section":"vocabulary","skill":"academic vocabulary","difficulty":"mastery","question":"The report was criticised for being ______: it gave opinions as if they were proven facts.","options":["accurate","detailed","balanced","misleading"],"correctAnswer":3,"explanationThai":"นำเสนอความเห็นเหมือนเป็นข้อเท็จจริง ทำให้เข้าใจผิด จึงตอบ misleading","wrongAnswerExplanationsThai":["“accurate” = ถูกต้องแม่นยำ ตรงข้ามกับการถูกวิจารณ์","“detailed” = ละเอียด ไม่ใช่ประเด็นที่ถูกวิจารณ์","“balanced” = สมดุล/เป็นกลาง ตรงข้าม",""],"tipThai":"misleading = ทำให้เข้าใจผิด; ใช้ผลลัพธ์ในประโยคช่วยเดา","passageId":null},{"id":"set7-q12","setId":7,"section":"vocabulary","skill":"collocations","difficulty":"mastery","question":"After years of research, the team finally ______ a breakthrough in clean energy.","options":["did","took","made","gave"],"correctAnswer":2,"explanationThai":"คำที่ไปกับ breakthrough คือ make: make a breakthrough","wrongAnswerExplanationsThai":["“did a breakthrough” ไม่ใช่ collocation","“took a breakthrough” ไม่ถูก","","“gave a breakthrough” ไม่ใช่ที่นิยม"],"tipThai":"make a breakthrough/discovery/decision/mistake","passageId":null},{"id":"set7-q13","setId":7,"section":"vocabulary","skill":"word forms","difficulty":"mastery","question":"The scientist explained her findings ______, so even beginners understood them.","options":["clearly","clear","clarity","clearness"],"correctAnswer":0,"explanationThai":"ต้องการคำวิเศษณ์ขยายกริยา explained จึงใช้ clearly","wrongAnswerExplanationsThai":["","“clear” เป็นคำคุณศัพท์","“clarity” เป็นคำนาม","“clearness” เป็นคำนาม"],"tipThai":"ขยายกริยาใช้ adverb (มักลงท้าย -ly)","passageId":null},{"id":"set7-q14","setId":7,"section":"conversation","skill":"formal complaint","difficulty":"mastery","question":"You received the wrong order at a restaurant. What is the most polite way to raise it?","options":["This is completely unacceptable service!","You people never get anything right.","Excuse me, I think there may be a mistake with my order.","Just take it back, it's wrong."],"correctAnswer":2,"explanationThai":"การแจ้งปัญหาอย่างสุภาพด้วย “I think there may be a mistake” เหมาะสมและไม่ก้าวร้าว","wrongAnswerExplanationsThai":["ก้าวร้าวเกินไป","ตำหนิรวม ๆ ไม่สุภาพ","","สั่งการห้วน ไม่สุภาพ"],"tipThai":"ร้องเรียนสุภาพ: I think there may be a mistake / Sorry to bother you, but...","passageId":null},{"id":"set7-q15","setId":7,"section":"conversation","skill":"conceding a point","difficulty":"mastery","question":"A: We lost because our plan wasn't detailed enough.\nB (accepting some blame): ______","options":["It was entirely your fault, not mine.","You're right—we could have planned it more carefully.","Plans are never important anyway.","I had nothing to do with it."],"correctAnswer":1,"explanationThai":"การยอมรับความผิดพลาดบางส่วนอย่างมีวุฒิภาวะเป็นการตอบที่เหมาะสม","wrongAnswerExplanationsThai":["โยนความผิดทั้งหมดให้ผู้อื่น","","ปฏิเสธความสำคัญของแผน ไม่ตรงประเด็น","ปฏิเสธความรับผิดชอบทั้งหมด"],"tipThai":"ยอมรับบางส่วน: You're right, we could have... / That's a fair point","passageId":null},{"id":"set7-q16","setId":7,"section":"conversation","skill":"persuading politely","difficulty":"mastery","question":"You want to convince classmates to choose the library for a group project. What is most persuasive and polite?","options":["We have to go to the library, end of discussion.","The library is boring but we have no choice.","Libraries are buildings full of books.","I really think the library would help us focus—shall we give it a try?"],"correctAnswer":3,"explanationThai":"การโน้มน้าวที่ดีคือให้เหตุผลเชิงบวกและเปิดโอกาสให้ตัดสินใจร่วมกัน","wrongAnswerExplanationsThai":["บังคับ ไม่เปิดให้อภิปราย","พูดเชิงลบ ไม่โน้มน้าว","ให้ข้อมูลทั่วไป ไม่โน้มน้าว",""],"tipThai":"โน้มน้าวสุภาพ: I really think... would help—shall we try?","passageId":null},{"id":"set7-q17","setId":7,"section":"conversation","skill":"declining an invitation","difficulty":"mastery","question":"A: Would you like to join our study trip this weekend?\nB (can't go, polite): ______","options":["Thank you for asking, but I'm afraid I already have plans this weekend.","No, I don't want to.","Study trips are a waste of a weekend.","Why would I want to go with you?"],"correctAnswer":0,"explanationThai":"การปฏิเสธคำเชิญอย่างสุภาพคือขอบคุณและให้เหตุผลสั้น ๆ","wrongAnswerExplanationsThai":["","ปฏิเสธห้วนเกินไป","ดูถูกกิจกรรม ไม่สุภาพ","หยาบคาย ไม่เหมาะสม"],"tipThai":"ปฏิเสธคำเชิญสุภาพ: Thank you for asking, but I'm afraid I can't...","passageId":null},{"id":"set7-q18","setId":7,"section":"cloze","skill":"cloze passage","difficulty":"mastery","question":"Cloze: \"The plan looked perfect on paper. ______, it proved very difficult to carry out in real life.\"","options":["Therefore","In practice","As a function aggregateSkills(){
  var agg={};Object.keys(SECTIONS).forEach(function(k){agg[k]={c:0,t:0};});
  for(var i=1;i<=7;i++){var p=STATE.progress[i];if(p.status==='completed'&&p.skills){for(var k in p.skills){agg[k].c+=p.skills[k].c;agg[k].t+=p.skills[k].t;}}}
  return agg;
}

var session=null; // runtime
function app_launch(setId,mode){
  var useTimer=true;var tg=document.getElementById('timerToggle');if(tg)useTimer=tg.classList.contains('on');
  var p=STATE.progress[setId];
  // fresh start
  p.status='inprogress';p.mode=mode;p.answers={};p.flagged=[];p.index=0;p.timeSpent=0;
  save();
  startSession(setId,mode,useTimer,{},[],0,0);
  go('#/quiz/'+setId+'/'+mode);
}
function app_resume(setId){
  var p=STATE.progress[setId];if(p.status!=='inprogress'){go('#/intro/'+setId);return;}
  startSession(setId,p.mode,p.mode==='exam',Object.assign({},p.answers),p.flagged.slice(),p.index||0,p.timeSpent||0);
  go('#/quiz/'+setId+'/'+p.mode);
}
function startSession(setId,mode,useTimer,answers,flagged,index,timeSpent){
  var qs=qsOf(setId);var m=SET_META[setId-1];
  session={setId:setId,mode:mode,qs:qs,index:index||0,answers:answers||{},flagged:flagged||[],
    tried:{},revealed:{},useTimer:mode==='exam'&&useTimer,remaining:m.mins*60-(timeSpent||0),
    startStamp:Date.now(),baseTime:timeSpent||0,m:m};
  if(session.index>=qs.length)session.index=0;
  clearInterval(window._qtimer);
  if(session.mode==='exam'&&session.useTimer){
    window._qtimer=setInterval(function(){
      session.remaining--;var t=document.getElementById('timer');
      if(t){t.textContent='⏱ '+fmtTime(session.remaining);if(session.remaining<=60)t.classList.add('warn');}
      if(session.remaining<=0){clearInterval(window._qtimer);finishQuiz(true);}
    },1000);
  }
}
function persistSession(){
  if(!session)return;var p=STATE.progress[session.setId];
  p.answers=session.answers;p.flagged=session.flagged;p.index=session.index;
  p.mode=session.mode;p.timeSpent=session.baseTime+(Date.now()-session.startStamp)/1000;
  save();
}
function quiz(setId,mode){
  if(!session||session.setId!==setId){
    var p=STATE.progress[setId];
    if(p.status==='inprogress'&&Object.keys(p.answers||{}).length){startSession(setId,p.mode,p.mode==='exam',Object.assign({},p.answers),p.flagged.slice(),p.index||0,p.timeSpent||0);mode=p.mode;}
    else{app_launch(setId,mode||'practice');return;}
  }
  renderQuiz();
}
function renderQuiz(){
  var s=session,q=s.qs[s.index],m=s.m;
  var answered=Object.keys(s.answers).length;
  var progW=Math.round((s.index+1)/s.qs.length*100);
  var flagged=s.flagged.indexOf(q.id)>=0;
  var isReading=!!q.passageId;

  var html=nav('')
   +'<div class="quiz-top"><div class="wrap">'
   +'<button class="btn btn-ghost btn-sm" onclick="app_exitQuiz()">← Exit</button>'
   +'<span class="qcount">Q '+(s.index+1)+' / '+s.qs.length+'</span>'
   +'<div class="progress" role="progressbar" aria-valuenow="'+progW+'" aria-valuemin="0" aria-valuemax="100"><i style="width:'+progW+'%"></i></div>'
   +'<span class="pill '+(s.mode==='exam'?'pill-sky':'pill-mint')+'">'+(s.mode==='exam'?'Exam Mode':'Practice Mode')+'</span>'
   +(s.mode==='exam'&&s.useTimer?'<span class="timer" id="timer">⏱ '+fmtTime(s.remaining)+'</span>':'')
   +'</div></div>';

  html+='<div class="page" style="padding-top:22px"><div class="wrap">';
  html+='<div class="quiz-main'+(isReading?' reading':'')+'">';
  if(isReading){var pas=PASSAGES[q.passageId];
    html+='<div class="passage collapsible open" id="passagePane"><button class="passage-toggle" onclick="document.getElementById(\'passagePane\').classList.toggle(\'open\')">📖 Reading Passage <span>▼</span></button>'
      +'<div class="p-body"><h3>'+esc(pas.title)+'</h3><p>'+esc(pas.text)+'</p></div></div>';
  }
  // question card
  html+='<div><div class="qcard"><div class="labels">'
   +'<span class="pill pill-lav">'+SECTIONS[q.section]+'</span>'
   +'<span class="pill pill-yellow">'+esc(cap(q.skill))+'</span>'
   +'<span class="pill pill-coral">'+esc(m.diff.split('·')[0].trim())+'</span>'

   +'</div>';
  html+='<div class="qtext">'+esc(q.question)+'</div>';

  var showFeedback=(s.mode==='practice'&&s.revealed[q.id]);
  html+='<div class="opts" role="radiogroup" aria-label="Answer choices">';
  q.options.forEach(function(opt,i){

      cls+=' disabled';
      if(i===q.correctAnswer)cls+=' correct';
      else if(i===chosen)cls+=' wrong';
      else cls+=' dim';
    }else if(chosen===i){cls+=' selected';aria='aria-checked="true"';}
    html+='<button class="'+cls+'" '+aria+' role="radio" onclick="app_pick('+i+')"><span class="key">'+LETTERS[i]+'</span><span>'+esc(opt)+'</span></button>';
  });
  html+='</div>';

  // feedback (practice)
  if(showFeedback){
    var correct=chosen===q.correctAnswer;
    html+='<div class="feedback '+(correct?'ok':'no')+'">'
     +'<h4>'+(correct?'✅ '+pickPraise():'💡 Not quite—let’s learn it')+'</h4>';
    if(!correct)html+='<div><b>Your answer:</b> '+LETTERS[chosen]+'. '+esc(q.options[chosen])+'</div>';
    html+='<div><b>Correct answer:</b> '+LETTERS[q.correctAnswer]+'. '+esc(q.options[q.correctAnswer])+'</div>';
    html+='<div class="thai">'+esc(q.explanationThai)+'</div>';
    if(!correct&&q.wrongAnswerExplanationsThai[chosen])html+='<div class="thai"><b>ทำไม '+LETTERS[chosen]+' ไม่ถูก:</b> '+esc(q.wrongAnswerExplanationsThai[chosen])+'</div>';
    html+='<div class="skill-tag">Skill: '+esc(cap(q.skill))+'</div>';
    if(q.tipThai)html+='<div class="tip thai"><b>💡 เคล็ดลับ:</b> '+esc(q.tipThai)+'</div>';
    if(!correct&&!s.tried[q.id])html+='<div style="margin-top:12px"><button class="btn btn-ghost btn-sm" onclick="app_tryAgain()">🔄 Try again (one chance)</button></div>';
    html+='</div>';
  }

  // actions
  html+='<div class="quiz-actions"><div class="left">'
   +'<button class="btn btn-ghost" onclick="app_nav(-1)" '+(s.index===0?'disabled':'')+'>← Previous</button></div>'
   +'<div class="right">';
  if(s.mode==='practice'){
    if(!showFeedback)html+='<button class="btn btn-primary" onclick="app_submitAnswer()" '+(chosen==null?'disabled':'')+'>Check Answer</button>';
    html+='<button class="btn '+(showFeedback?'btn-primary':'btn-soft')+'" onclick="app_nav(1)">'+(s.index===s.qs.length-1?'Finish →':'Next →')+'</button>';
  }else{
    html+='<button class="btn btn-soft" onclick="app_nav(1)">'+(s.index===s.qs.length-1?'Review →':'Next →')+'</button>';
    html+='<button class="btn btn-primary" onclick="app_confirmSubmit()">Submit Test</button>';
  }
  html+='</div></div></div>';

  // navigator
  html+='<div class="navigator"><h4>Question Navigator</h4>'
   +'<div class="nav-legend"><span><i style="background:var(--sky-soft);border:2px solid var(--sky)"></i>Answered</span>'
   +'<span><i style="background:#fff;border:2px solid var(--line)"></i>Unanswered</span>'
   +'<span><i style="background:var(--coral)"></i>Flagged</span></div><div class="nav-dots">';
  s.qs.forEach(function(qq,i){
    var c='nav-dot';if(s.answers[qq.id]!=null)c+=' answered';if(i===s.index)c+=' current';if(s.flagged.indexOf(qq.id)>=0)c+=' flagged';
    html+='<button class="'+c+'" onclick="app_goto('+i+')" aria-label="Go to question '+(i+1)+'">'+(i+1)+'</button>';
  });
  html+='</div></div>';

  html+='</div>';// end question column wrapper
  html+='</div></div></div>';// close quiz-main,wrap,page
  app.innerHTML=html;
  persistSession();
}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}
var PRAISE=['Excellent!','Correct!','Great reasoning!','Well done!','Perfect!','Nicely done!'];
function pickPraise(){return PRAISE[Math.floor(Math.random()*PRAISE.length)];}

/* quiz actions (global) */
window.app_pick=function(i){var s=session,q=s.qs[s.index];
  if(s.mode==='practice'&&s.revealed[q.id])return; // locked after reveal
  s.answers[q.id]=i;
  if(s.mode==='exam')persistSession();
  renderQuiz();
};
window.app_submitAnswer=function(){var s=session,q=s.qs[s.index];if(s.answers[q.id]==null)return;s.revealed[q.id]=true;renderQuiz();};
window.app_tryAgain=function(){var s=session,q=s.qs[s.index];s.tried[q.id]=true;s.revealed[q.id]=false;delete s.answers[q.id];renderQuiz();};
window.app_nav=function(d){var s=session;var ni=s.index+d;
  if(ni<0)return;
  if(ni>=s.qs.length){if(s.mode==='practice'){app_confirmSubmit();}return;}
  s.index=ni;persistSession();renderQuiz();window.scrollTo({top:0,behavior:'smooth'});
};
window.app_goto=function(i){session.index=i;persistSession();renderQuiz();window.scrollTo({top:0,behavior:'smooth'});};
window.app_flag=function(){var s=session,q=s.qs[s.index];var idx=s.flagged.indexOf(q.id);if(idx>=0)s.flagged.splice(idx,1);else s.flagged.push(q.id);persistSession();renderQuiz();};
window.app_exitQuiz=function(){
  modal('Exit this quiz?','Your progress is saved. You can resume from the Dashboard whenever you like.',
    [['Keep practising','btn-ghost','app_closeModal()'],['Exit to Dashboard','btn-primary','app_doExit()']]);
};
window.app_doExit=function(){app_closeModal();persistSession();clearInterval(window._qtimer);go('#/dashboard');};
window.app_confirmSubmit=function(){
  var s=session;var unanswered=s.qs.filter(function(q){return s.answers[q.id]==null;}).length;
  var msg=unanswered>0?('You have <b>'+unanswered+'</b> unanswered question'+(unanswered===1?'':'s')+'. Unanswered questions are marked incorrect.'):'Great—every question is answered! Ready to see your results?';
  modal('Submit your test?',msg,[['Keep working','btn-ghost','app_closeModal()'],['Submit now','btn-primary','app_doSubmit()']]);
};
window.app_doSubmit=function(){app_closeModal();finishQuiz(false);};
function finishQuiz(auto){
  clearInterval(window._qtimer);var s=session;var p=STATE.progress[s.setId];
  var elapsed=s.baseTime+(Date.now()-s.startStamp)/1000;
  // compute skills
  var skills={};Object.keys(SECTIONS).forEach(function(k){skills[k]={c:0,t:0};});
  var correct=0;
  s.qs.forEach(function(q){skills[q.section].t++;if(s.answers[q.id]===q.correctAnswer){correct++;skills[q.section].c++;}});
  var score=pct(correct,s.qs.length);
  p.answers=Object.assign({},s.answers);p.flagged=s.flagged.slice();
  p.status='completed';p.lastScore=score;p.bestScore=p.bestScore==null?score:Math.max(p.bestScore,score);
  p.attempts=(p.attempts||0)+1;p.skills=skills;p.completedAt=Date.now();p.timeSpent=elapsed;p.lastTime=elapsed;p.lastCorrect=correct;
  STATE.totalTimeSec+=Math.max(0,elapsed - (s._counted||0));
  updateStreak();refreshBadges();recomputePoints();save();
  go('#/results/'+s.setId);
}
function updateStreak(){var t=today();var st=STATE.streak;
  if(st.last===t)return;
  var y=new Date();y.setDate(y.getDate()-1);var yStr=y.getFullYear()+'-'+(y.getMonth()+1)+'-'+y.getDate();
  st.count=(st.last===yStr)?st.count+1:1;st.last=t;
}
function recomputePoints(){var pts=0;for(var i=1;i<=7;i++){var p=STATE.progress[i];if(p.status==='completed'){
  var bestCorrect=Math.round((p.bestScore/100)*25);pts+=bestCorrect*10+50;if(p.bestScore===100)pts+=100;if(p.bestScore>=90)pts+=30;}}
  pts+=STATE.streak.count*20;STATE.points=pts;}
function refreshBadges(){var agg=aggregateSkills();var b=STATE.badges;function add(id){if(b.indexOf(id)<0)b.push(id);}
  if(agg.grammar.t&&pct(agg.grammar.c,agg.grammar.t)>=85)add('grammar-guardian');
  if(agg.vocabulary.t&&pct(agg.vocabulary.c,agg.vocabulary.t)>=85)add('vocab-explorer');
  if(agg.reading.t&&pct(agg.reading.c,agg.reading.t)>=85)add('reading-detective');
  if(agg.conversation.t&&pct(agg.conversation.c,agg.conversation.t)>=85)add('conversation-star');
  var any90=false,any100=false,allDone=true;
  for(var i=1;i<=7;i++){var p=STATE.progress[i];if(p.status==='completed'){if(p.bestScore>=90)any90=true;if(p.bestScore===100)any100=true;}else allDone=false;}
  if(any90)add('accuracy-ace');if(any100)add('full-marks');if(allDone)add('exam-ready');
  if(STATE.streak.count>=5)add('streak-5');
  save();
}

  var score=p.lastScore;var band=BANDS.find(function(b){return score>=b.min;});

  if(isHigh)setTimeout(confetti,250);

  var html=nav('')+'<div class="page"><div class="wrap" style="max-width:900px">';

  // skill analysis
  html+='<div class="card" style="padding:26px;margin-top:8px"><h2 style="margin-bottom:16px">Skill-by-skill analysis</h2><div class="skill-analysis">';
  Object.keys(SECTIONS).forEach(function(k){var sk=p.skills[k];var v=pct(sk.c,sk.t);
    var col=v>=80?'var(--mint)':v>=60?'var(--sky)':v>=40?'var(--yellow)':'var(--coral)';
    html+='<div class="skill-row"><span class="nm">'+SECTION_SHORT[k]+'</span><div class="bar"><i style="width:'+v+'%;background:'+col+'"></i></div><b>'+sk.c+'/'+sk.t+'</b></div>';});
  html+='</div>';
  // recommendation
  var weakest=null;Object.keys(SECTIONS).forEach(function(k){var v=pct(p.skills[k].c,p.skills[k].t);if(weakest===null||v<weakest.v)weakest={k:k,v:v};});
  html+='<div class="rev-expl thai" style="margin-top:18px"><b>📌 คำแนะนำขั้นต่อไป:</b> ';
  if(score>=90)html+='เยี่ยมมาก! ลองทำชุดถัดไปเพื่อท้าทายตัวเองในระดับที่ยากขึ้น';
  else html+='ลองทบทวนส่วน '+SECTION_SHORT[weakest.k]+' ให้มากขึ้น แล้วลองทำชุดนี้อีกครั้งเพื่อเพิ่มคะแนน';
  html+=' กด "Review Answers" เพื่อดูคำอธิบายภาษาไทยทุกข้อ</div>';
  html+='</div>';

  html+='<div class="result-actions">'
   +'<button class="btn btn-primary btn-lg" onclick="location.hash=\'#/review/'+setId+'\'">🔍 Review Answers</button>'
   +'<button class="btn btn-mint btn-lg" onclick="location.hash=\'#/intro/'+setId+'\'">🔁 Retry Set</button>'
   +'<button class="btn btn-ghost btn-lg" onclick="location.hash=\'#/dashboard\'">🏠 Dashboard</button></div>';
  // next set
  if(setId<7)html+='<div class="center" style="margin-top:18px"><a href="#/intro/'+(setId+1)+'">Next: '+esc(SET_META[setId].name)+' →</a></div>';
  html+='</div></div>'+footer();

var reviewFilter='all';
function review(setId){
  var p=STATE.progress[setId];var m=SET_META[setId-1];
  if(p.status!=='completed'){go('#/intro/'+setId);return;}
  var qs=qsOf(setId);
  var filters=[['all','All'],['incorrect','Incorrect'],['correct','Correct'],['grammar','Grammar'],['vocabulary','Vocabulary'],['conversation','Conversation'],['reading','Reading'],['cloze','Cloze / Error']];
  var html=nav('')+'<div class="page"><div class="wrap" style="max-width:900px">'
   +'<div class="page-head"><div><button class="btn btn-soft btn-sm" onclick="location.hash=\'#/results/'+setId+'\'">← Results</button>'
   +'<h1 style="margin-top:12px">Review — '+esc(m.name)+'</h1><p>English questions with Thai explanations. Best score: '+p.bestScore+'%.</p></div></div>';
  html+='<div class="filters">'+filters.map(function(f){return '<button class="'+(reviewFilter===f[0]?'active':'')+'" onclick="app_setFilter(\''+f[0]+'\',this)">'+f[1]+'</button>';}).join('')+'</div>';
  html+='<div id="revList">'+reviewList(qs,p)+'</div>';
  html+='<div class="result-actions" style="justify-content:flex-start"><button class="btn btn-mint" onclick="location.hash=\'#/intro/'+setId+'\'">🔁 Retry Set</button><button class="btn btn-ghost" onclick="location.hash=\'#/dashboard\'">Dashboard</button></div>';
  html+='</div></div>'+footer();
  app.innerHTML=html;
}
function reviewList(qs,p){
  var out='',shown=0;
  qs.forEach(function(q,i){
    var chosen=p.answers[q.id];var isCorrect=chosen===q.correctAnswer;var isBlank=chosen==null;
    if(reviewFilter==='incorrect'&&(isCorrect))return;
    if(reviewFilter==='correct'&&!isCorrect)return;
    if(['grammar','vocabulary','conversation','reading','cloze'].indexOf(reviewFilter)>=0&&q.section!==reviewFilter)return;
    shown++;
    var cls=isBlank?'skip':(isCorrect?'ok':'no');
    var statusTxt=isBlank?'⚠️ Unanswered':(isCorrect?'✅ Correct':'❌ Incorrect');
    out+='<div class="rev-item '+cls+'"><div class="qn"><span>Q'+(i+1)+'</span><span class="pill pill-lav" style="font-size:.7rem">'+SECTION_SHORT[q.section]+'</span><span class="pill pill-yellow" style="font-size:.7rem">'+esc(cap(q.skill))+'</span><span style="margin-left:auto">'+statusTxt+'</span></div>';
    if(q.passageId)out+='<details style="margin-bottom:8px"><summary style="cursor:pointer;color:var(--royal);font-weight:600">📖 Show reading passage</summary><div class="rev-expl" style="white-space:pre-line;margin-top:8px"><b>'+esc(PASSAGES[q.passageId].title)+'</b>\n'+esc(PASSAGES[q.passageId].text)+'</div></details>';
    out+='<div class="qq">'+esc(q.question)+'</div>';
    q.options.forEach(function(opt,oi){
      var tag='';if(oi===q.correctAnswer)tag=' ← correct';
      var style=oi===q.correctAnswer?'color:var(--mint-ink);font-weight:700':(oi===chosen&&!isCorrect?'color:var(--rose-ink)':'color:var(--muted)');
      out+='<div class="rev-line"><span style="'+style+'">'+LETTERS[oi]+'. '+esc(opt)+esc(tag)+(oi===chosen?'  (your choice)':'')+'</span></div>';
    });
    out+='<div class="rev-expl thai"><b>คำอธิบาย:</b> '+esc(q.explanationThai);
    if(!isCorrect&&!isBlank&&q.wrongAnswerExplanationsThai[chosen])out+='<br><b>ทำไม '+LETTERS[chosen]+' ไม่ถูก:</b> '+esc(q.wrongAnswerExplanationsThai[chosen]);
    if(q.tipThai)out+='<br><b>💡 เคล็ดลับ:</b> '+esc(q.tipThai);
    out+='</div>';
    if(!isCorrect)out+='<span class="review-topic">📖 Review this topic: '+esc(cap(q.skill))+'</span>';
    out+='</div>';
  });
  if(shown===0)out='<div class="card" style="padding:30px;text-align:center;color:var(--muted)">No questions match this filter. 🎉</div>';
  return out;
}
window.app_setFilter=function(f,el){reviewFilter=f;var setId=route.setId;var p=STATE.progress[setId];
  document.getElementById('revList').innerHTML=reviewList(qsOf(setId),p);
  var btns=document.querySelectorAll('.filters button');btns.forEach(function(b){b.classList.remove('active');});
  if(el&&el.classList)el.classList.add('active');
};

window.app_confirmReset=function(){modal('Reset all progress?','This will permanently erase all your scores, badges and saved answers on this device. This cannot be undone.',
  [['Cancel','btn-ghost','app_closeModal()'],['Yes, reset everything','btn-accent','app_doReset()']]);};
window.app_doReset=function(){resetAll();app_closeModal();toast('All progress has been reset');go('#/dashboard');dashboard();};
function toast(msg){var old=document.getElementById('toast');if(old)old.remove();
  var t=document.createElement('div');t.className='toast';t.id='toast';t.innerHTML='✨ '+esc(msg);document.body.appendChild(t);
  setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .4s';setTimeout(function(){t.remove();},400);},2600);}
function confetti(){
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches)return;
  var c=document.createElement('canvas');c.id='confetti';document.body.appendChild(c);
  var ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;
  var cols=['#2a46c0','#3ba3f7','#41c48c','#ffc93c','#ff7a59','#7b6ff0','#f0576f'];
  var parts=[];for(var i=0;i<130;i++)parts.push({x:Math.random()*c.width,y:-20-Math.random()*c.height,r:5+Math.random()*7,
    col:cols[Math.floor(Math.random()*cols.length)],vy:2+Math.random()*4,vx:-2+Math.random()*4,rot:Math.random()*6,vr:-.2+Math.random()*.4});
  var frames=0;
  (function anim(){frames++;ctx.clearRect(0,0,c.width,c.height);
    parts.forEach(function(p){p.y+=p.vy;p.x+=p.vx;p.rot+=p.vr;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.col;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*.6);ctx.restore();});
    if(frames<200)requestAnimationFrame(anim);else c.remove();
  })();
}

/* ============================================================
   keyboard
   ============================================================ */
document.addEventListener('keydown',function(e){
  if(route.view==='quiz'&&session){
    if(document.getElementById('modalBg'))return;
    var k=e.key.toLowerCase();
    if(['1','2','3','4'].indexOf(k)>=0){app_pick(+k-1);e.preventDefault();}
    else if(['a','b','c','d'].indexOf(k)>=0){app_pick(LETTERS.indexOf(k.toUpperCase()));e.preventDefault();}
    else if(e.key==='ArrowRight'){app_nav(1);e.preventDefault();}
    else if(e.key==='ArrowLeft'){app_nav(-1);e.preventDefault();}
    else if(k==='f'){app_flag();e.preventDefault();}
    else if(k==='enter'&&session.mode==='practice'){var q=session.qs[session.index];if(session.answers[q.id]!=null&&!session.revealed[q.id])app_submitAnswer();}
  }
  if(route.view==='teacher'&&tState){
    if(e.key==='ArrowRight')app_tNext();else if(e.key==='ArrowLeft')app_tPrev();
    else if(e.key.toLowerCase()==='a')app_tToggle('showAnswer');else if(e.key==='Escape')app_exitTeacher();
  }
});

/* ============================================================
   render dispatch
   ============================================================ */
function render(){
  route=parseHash();
  var kill=(route.view!=='quiz');if(kill){clearInterval(window._qtimer);}
  app_closeModal();
  window.scrollTo(0,0);
  switch(route.view){
    case 'landing':landing();break;
    case 'dashboard':dashboard();break;
    case 'sets':setsPage();break;
    case 'intro':intro(route.setId);break;
    case 'quiz':quiz(route.setId,route.mode);break;
    case 'results':results(route.setId);break;
    case 'review':reviewFilter='all';review(route.setId);break;
    case 'teacher':teacher(route.setId);break;
    case 'tips':tipsPage();break;
    default:landing();
  }
}
/* expose handlers used by inline onclick (global scope) */
window.app_launch=app_launch;
window.app_resume=app_resume;

window.addEventListener('beforeunload',function(){if(session&&route.view==='quiz')persistSession();});
render();
})();
</script>
